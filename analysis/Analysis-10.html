<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10期生 進路データ分析レポート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&family=Shippori+Mincho:wght@400;600;700&display=swap');

  :root {
    --navy: #1a2744;
    --navy-light: #243360;
    --accent: #4a90d9;
    --accent2: #e8a838;
    --bg: #f4f6fb;
    --surface: #ffffff;
    --text: #1a2744;
    --text-muted: #6b7a99;
    --border: #dde3f0;
    --sidebar-w: 280px;
    --header-h: 60px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--navy);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  header .badge {
    background: var(--accent2);
    color: var(--navy);
    font-weight: 700;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.08em;
  }
  header .slide-counter {
    margin-left: auto;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 300;
    white-space: nowrap;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    margin-top: var(--header-h);
    min-height: calc(100vh - var(--header-h));
  }

  /* ── Sidebar ── */
  aside {
    position: fixed;
    top: var(--header-h); bottom: 0; left: 0;
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 50;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .toc-header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .toc-header p {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .toc-list { list-style: none; padding: 8px 0; }

  .toc-item a {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 20px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.5;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .toc-item a:hover {
    background: var(--bg);
    color: var(--text);
    border-left-color: var(--accent);
  }
  .toc-item a.active {
    background: #eef4fc;
    color: var(--navy);
    font-weight: 600;
    border-left-color: var(--accent);
  }
  .toc-item a .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; min-width: 22px;
    background: var(--border);
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.2s;
    margin-top: 1px;
  }
  .toc-item a.active .num,
  .toc-item a:hover .num {
    background: var(--accent);
    color: #fff;
  }

  /* ── Main content ── */
  main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 40px 48px;
  }

  .slide-section {
    margin-bottom: 80px;
    scroll-margin-top: calc(var(--header-h) + 24px);
  }

  .slide-label {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .slide-label .n {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .slide-label h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 0.04em;
  }

  .slide-card {
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(26,39,68,0.08), 0 0 0 1px var(--border);
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .slide-card:hover {
    box-shadow: 0 8px 32px rgba(26,39,68,0.14), 0 0 0 1px var(--border);
    transform: translateY(-2px);
  }
  .slide-card img {
    width: 100%;
    display: block;
  }

  /* ── Back to top ── */
  .back-to-top {
    position: fixed; bottom: 28px; right: 28px;
    width: 44px; height: 44px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(26,39,68,0.3);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 200;
  }
  .back-to-top.visible { opacity: 1; transform: translateY(0); }
  .back-to-top:hover { background: var(--accent); }

  /* ── Divider ── */
  .slide-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
    margin: 0 0 80px;
  }

  @media (max-width: 900px) {
    :root { --sidebar-w: 220px; }
    main { padding: 24px; }
  }
  @media (max-width: 640px) {
    aside { display: none; }
    main { margin-left: 0; padding: 16px; }
    header h1 { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <span class="badge">10期生</span>
  <h1>進路データ分析レポート</h1>
  <span class="slide-counter" id="counterDisplay">1 / 8</span>
</header>

<div class="layout">
  <aside>
    <div class="toc-header">
      <p>目次</p>
    </div>
    <ul class="toc-list" id="tocList"></ul>
  </aside>

  <main id="mainContent">
    <div id="slidesContainer"></div>
  </main>
</div>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

];

// Build TOC and slides
const tocList = document.getElementById('tocList');
const container = document.getElementById('slidesContainer');

slides.forEach((slide, idx) => {
  // TOC item
  const li = document.createElement('li');
  li.className = 'toc-item';
  li.innerHTML = `<a href="#${slide.id}" data-id="${slide.id}">
    <span class="num">${idx + 1}</span>
    <span>${slide.title}</span>
  </a>`;
  tocList.appendChild(li);

  // Slide section
  const section = document.createElement('section');
  section.className = 'slide-section';
  section.id = slide.id;
  section.innerHTML = `
    <div class="slide-label">
      <span class="n">Slide ${idx + 1}</span>
      <h2>${slide.title}</h2>
    </div>
    <div class="slide-card">
      <img src="${slide.img}" alt="スライド ${idx + 1}: ${slide.title}" loading="lazy">
    </div>
  `;
  if (idx < slides.length - 1) {
    const divider = document.createElement('div');
    divider.className = 'slide-divider';
    section.appendChild(divider);
  }
  container.appendChild(section);
});

// Smooth scroll for TOC links
tocList.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.getElementById(a.dataset.id);
    if (target) target.scrollIntoView({ behavior: 'smooth' });
  });
});

// Active TOC on scroll + counter
const sections = document.querySelectorAll('.slide-section');
const tocLinks = document.querySelectorAll('.toc-item a');
const backToTop = document.getElementById('backToTop');
const counter = document.getElementById('counterDisplay');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      const idx = [...sections].findIndex(s => s.id === id);
      tocLinks.forEach(a => a.classList.remove('active'));
      const activeLink = tocList.querySelector(`[data-id="${id}"]`);
      if (activeLink) {
        activeLink.classList.add('active');
        activeLink.scrollIntoView({ block: 'nearest' });
      }
      counter.textContent = `${idx + 1} / ${slides.length}`;
    }
  });
}, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

sections.forEach(s => observer.observe(s));

window.addEventListener('scroll', () => {
  backToTop.classList.toggle('visible', window.scrollY > 300);
});

// Activate first on load
if (tocLinks[0]) tocLinks[0].classList.add('active');
