<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職種・適性＆性格診断 | 曽於高等学校</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f7f5f0;
    --accent: #2e7d5e;
    --accent-light: #e8f5f0;
    --accent2: #d4700a;
    --accent2-light: #fdf1e3;
    --line: #d8d4cc;
    --muted: #6b6760;
    --white: #ffffff;
    --card-shadow: 0 2px 16px rgba(26,26,46,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    padding: 20px 24px 18px;
    text-align: center;
  }
  header .label {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #8fa8d0;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.25;
  }
  header h1 span {
    color: #6fcf97;
  }
  header .sub {
    margin-top: 8px;
    font-size: 12px;
    color: #8fa8d0;
  }

  /* ─── PROGRESS BAR ─── */
  #progress-wrap {
    background: var(--ink);
    padding: 0 24px 16px;
  }
  #progress-bar-outer {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #6fcf97, #27ae60);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }
  #progress-text {
    margin-top: 6px;
    font-size: 11px;
    color: #8fa8d0;
    text-align: right;
  }

  /* ─── MAIN CONTAINER ─── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ─── INTRO SCREEN ─── */
  #intro {
    text-align: center;
    padding: 24px 0 12px;
  }
  #intro .big-q {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(36px, 10vw, 72px);
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 16px;
  }
  #intro h2 {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    margin-bottom: 12px;
  }
  #intro p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .intro-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1.5px solid var(--accent);
  }
  .btn-start {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 16px 48px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 16px rgba(46,125,94,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46,125,94,0.4); }
  .btn-start:active { transform: translateY(0); }

  /* ─── QUESTION CARD ─── */
  .screen { display: none; }
  .screen.active { display: block; }

  #quiz-section {
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: clamp(16px, 3.5vw, 20px);
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--ink);
  }

  .options {
    display: grid;
    gap: 10px;
  }
  .opt-btn {
    background: var(--white);
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.12s;
    line-height: 1.5;
    box-shadow: var(--card-shadow);
  }
  .opt-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(4px);
  }
  .opt-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .opt-btn .opt-icon {
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--line);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    line-height: 24px;
    margin-right: 10px;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .opt-btn.selected .opt-icon {
    background: var(--accent);
    color: #fff;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    align-items: center;
  }
  .btn-back {
    background: none;
    border: 2px solid var(--line);
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-back:hover { border-color: var(--muted); color: var(--ink); }
  .btn-next {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-next.enabled {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-next.enabled:hover { transform: translateY(-2px); }

  /* ─── RESULT ─── */
  #result-section {
    animation: fadeUp 0.4s ease both;
  }

  .result-hero {
    background: var(--ink);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(111,207,151,0.08);
    border-radius: 50%;
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #8fa8d0;
    margin-bottom: 12px;
  }
  .result-type-name {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 900;
    color: #6fcf97;
    margin-bottom: 8px;
    line-height: 1.15;
  }
  .result-type-sub {
    font-size: 14px;
    color: #c5c2ba;
    line-height: 1.7;
  }
  .result-emoji {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }

  .result-cards {
    display: grid;
    gap: 16px;
    margin-bottom: 24px;
  }
  .r-card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--card-shadow);
  }
  .r-card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .r-card-body {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.8;
  }
  .trait-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .trait {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 99px;
  }
  .job-list {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }
  .job-item {
    background: var(--accent2-light);
    border-left: 4px solid var(--accent2);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    font-weight: 500;
  }

  /* score bars */
  .score-section {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    margin-bottom: 16px;
  }
  .score-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .score-name {
    font-size: 13px;
    font-weight: 500;
    width: 90px;
    flex-shrink: 0;
    color: var(--ink);
  }
  .score-bar-outer {
    flex: 1;
    background: var(--line);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .score-bar-inner {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), #27ae60);
    width: 0%;
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .score-pct {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

  .advice-box {
    background: linear-gradient(135deg, var(--accent-light), #fff);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .advice-box p {
    font-size: 14px;
    line-height: 1.85;
    color: var(--ink);
  }
  .advice-box strong { color: var(--accent); }

  /* ─── JOB MATCH (求人情報) ─── */
  .job-match-box {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--card-shadow);
  }
  .job-match-title {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .job-match-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .job-match-group {
    margin-bottom: 14px;
  }
  .job-match-group:last-child {
    margin-bottom: 0;
  }
  .job-match-group-label {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 8px;
  }
  .job-match-item {
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .job-match-item:last-child {
    margin-bottom: 0;
  }
  .job-match-company {
    font-weight: 700;
    color: var(--ink);
  }
  .job-match-no {
    color: var(--muted);
    font-size: 12px;
    margin-left: 6px;
  }
  .job-match-jobname {
    color: var(--accent2);
    font-size: 12px;
    margin-top: 2px;
  }
  .job-match-empty {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 8px 0;
  }

  .btn-retry {
    display: block;
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .btn-retry:hover { opacity: 0.85; }

  @media (max-width: 480px) {
    .opt-btn { font-size: 13px; padding: 14px 16px; }
    .result-hero { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="label">曽於高等学校 進路支援ツール</div>
  <h1>職種・適性 &amp; <span>性格診断</span></h1>
  <div class="sub">21問で分かる、あなたの強みと向いている仕事</div>
</header>

<div id="progress-wrap">
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <div id="progress-text">0 / 21</div>
</div>

<main>

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="big-q">?</div>
    <h2>自分に合った仕事、見つけよう</h2>
    <p>この診断は、高校生の就職データと企業からの声をもとに作られています。<br>21問に正直に答えるだけで、あなたの性格タイプと向いている職種・職業がわかります。</p>
    <div class="intro-badges">
      <span class="badge">約5分で完了</span>
      <span class="badge">21問</span>
      <span class="badge">6つの職業タイプ</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">診断をはじめる →</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-section" class="screen">
    <div class="q-num" id="q-num">Q1 / 21</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="prevQ()">← 戻る</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()">次へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-section" class="screen">
    <div class="result-hero">
      <div class="result-label">あなたの診断結果</div>
      <span class="result-emoji" id="r-emoji"></span>
      <div class="result-type-name" id="r-type-name"></div>
      <div class="result-type-sub" id="r-type-sub"></div>
    </div>

    <div class="score-section">
      <div class="score-label">タイプ別スコア</div>
      <div id="score-bars"></div>
    </div>

    <div class="result-cards" id="result-cards"></div>

    <div class="advice-box" id="advice-box"></div>

    <div class="job-match-box" id="job-match-box"></div>

    <button class="btn-retry" onclick="retryQuiz()">もう一度診断する</button>
  </div>

</main>

<script>
// ─── 6 CAREER TYPES ───────────────────────────────────────────
const TYPES = {
  craft: {
    name: "ものづくり職人タイプ",
    emoji: "🔧",
    sub: "手と技術で価値を生み出す。現場でどんどん成長できる人。",
    traits: ["丁寧・慎重","集中力が高い","責任感が強い","コツコツ努力","物事を具体的に考える"],
    jobs: ["製造業・生産ライン","機械・設備メンテナンス","電気工事士","自動車整備士","溶接・板金加工","建設・土木工事"],
    advice: "<strong>あなたの強み</strong>は、丁寧さと集中力です。技術や資格を積み上げることで、現場のリーダーや技術の専門家として活躍できます。機械電子科で学んだスキルや危険物・溶接の資格は、企業から高く評価されます。夜勤やシフトがある職場も多いので、<strong>勤務形態の確認</strong>を忘れずに！"
  },
  nature: {
    name: "自然・いのちタイプ",

  },
  office: {
    name: "サポート事務タイプ",
    emoji: "📋",
    sub: "人を支え、組織を整える縁の下の力持ち。確実さが武器。",

    jobs: ["一般事務・経理","銀行・金融機関","JA・農業関連事務","医療事務・病院受付","公務員（一般行政）","営業事務・総務"],
    advice: "<strong>あなたの強み</strong>は、正確さと計画性です。商業科で取得した簿記・情報処理の資格は事務職採用で非常に有利です。女子に人気の「事務職」は競争率が高いですが、<strong>職場見学で雰囲気を確かめる</strong>ことが満足度アップのカギ。手取り額と休日体系は事前にしっかり確認しましょう。"
  },
  people: {
    name: "対人コミュ力タイプ",
    emoji: "🤝",
    sub: "人と話し、つながり、信頼を積み上げることが自然にできる人。",

    jobs: ["営業・販売職","接客・サービス業","医療・介護・福祉","観光・ホテル","保育補助・教育サポート","カスタマーサービス"],
    advice: "<strong>あなたの強み</strong>は、コミュニケーション力と共感力です。「社風・職場の雰囲気」を重視する高校生が多い中、あなたはどんな職場でも人間関係を築ける力があります。サービス業はシフト制が多いので、<strong>休日パターン</strong>を事前に確認しておきましょう。"
  },
  leader: {
    name: "リーダー・企画タイプ",

    jobs: ["総合職・幹部候補","営業企画・マーケティング","公務員（管理・行政）","店長・マネージャー候補","地域おこし・まちづくり","スタートアップ・新規事業"],
    advice: "<strong>あなたの強み</strong>は、主体性と行動力です。企業が最も求めているのが「分からないことを質問できる力」と「失敗を恐れない姿勢」で、あなたはまさにその資質を持っています。地域の中小企業で<strong>若いうちから裁量を持って</strong>働くことが、キャリアを大きく飛躍させる近道です。"
  },
  expert: {
    name: "専門スペシャリストタイプ",
    emoji: "🎓",
    sub: "一つのことを深く極める。専門知識や資格で勝負する人。",
    traits: ["探究心が強い","論理的に考える","集中して学べる","独立心がある","努力を惜しまない"],
    jobs: ["IT・情報処理・SE","医療技術職","建築・設計","公認会計士・税理士補助","研究・開発","資格活用専門職（危険物・電気等）"],
    advice: "<strong>あなたの強み</strong>は、専門性を深める力と論理思考です。資格取得を通じて「自分の役割が明確」になることで満足度も高くなります。在学中に取れる資格を最大限に活かし、専門職として着実にキャリアを積みましょう。<strong>IT・情報系</strong>への潜在的な関心も伸ばしていけます。"

// ─── 「向いている職種・職業」 ⇔ 求人データ マッチング ──────────
// 結果タイプの jobs（向いている職種・職業）に含まれる語句を、
// 「・」「、」「（」「）」「(」「)」「/」などで区切ってキーワード化し、
// 求人データの職種・仕事内容・各種職業分類を全検索して一致するものを抽出する。
function getKeywords(jobLabel) {
  return jobLabel
    .split(/[・、,\/()（）]/)
    .map(s => s.trim())
    .filter(s => s.length >= 2);
}

function findMatchingJobs(jobLabel) {
  const keywords = getKeywords(jobLabel);
  const matches = [];
  JOBS_DATA.forEach(rec => {
    const hit = keywords.find(kw => rec.text.includes(kw));
    if (hit) {
      matches.push({ no: rec.no, company: rec.company, job: rec.job, keyword: hit });
    }
  });
  return matches;
}

function renderJobMatches(t) {
  const seenOverall = new Set();
  let groupsHTML = '';
  let anyMatch = false;

  t.jobs.forEach(jobLabel => {
    const matches = findMatchingJobs(jobLabel);
    if (matches.length === 0) return;
    anyMatch = true;

    const itemsHTML = matches.map(m => {
      seenOverall.add(m.no);
      return `<div class="job-match-item">
        <div><span class="job-match-company">${m.company}</span><span class="job-match-no">求人番号: ${m.no}</span></div>
        <div class="job-match-jobname">職種: ${m.job}（一致キーワード: ${m.keyword}）</div>
      </div>`;
    }).join('');

    groupsHTML += `<div class="job-match-group">
      <div class="job-match-group-label">▶ ${jobLabel}</div>
      ${itemsHTML}
    </div>`;
  });

  if (!anyMatch) {
    groupsHTML = `<div class="job-match-empty">現在、この求人データの中には一致する求人情報が見つかりませんでした。</div>`;
  }

  document.getElementById('job-match-box').innerHTML = `
    <div class="job-match-title">🔎 関連する求人情報</div>
    <div class="job-match-sub">「向いている職種・職業」に基づき、求人データ（kyujin2026.csv）を全検索した結果です。気になる求人は学校の進路指導の先生に詳細を確認してみましょう。</div>
    ${groupsHTML}
  `;
}

// ─── STATE ────────────────────────────────────────────────────
let current = 0;
let answers = new Array(21).fill(null); // selected option index per question
let scores = {};

function resetScores() {
  scores = {craft:0, nature:0, office:0, people:0, leader:0, expert:0};
}

// ─── NAVIGATION ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0;
  answers = new Array(21).fill(null);
  resetScores();
  showScreen('quiz-section');
  renderQuestion();
}

function retryQuiz() {
  showScreen('intro');
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((current / 21) * 100);
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${current} / 21`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('q-num').textContent = `Q${current+1} / 21`;
  document.getElementById('q-text').textContent = q.text;

  const labels = ['A','B','C','D'];
  const container = document.getElementById('options');
  container.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-icon">${labels[i]}</span>${opt.label}`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  // nav
  document.getElementById('btn-back').style.display = current === 0 ? 'none' : 'block';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current === 20 ? '結果を見る →' : '次へ →';
  nextBtn.classList.toggle('enabled', answers[current] !== null);

  updateProgress();

  // re-animate
  const qs = document.getElementById('quiz-section');
  qs.style.animation = 'none';
  qs.offsetHeight;
  qs.style.animation = '';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
    const icon = b.querySelector('.opt-icon');
    icon.style.background = idx === i ? 'var(--accent)' : '';
    icon.style.color = idx === i ? '#fff' : '';
  });
  document.getElementById('btn-next').classList.add('enabled');
}

function nextQ() {
  if (answers[current] === null) return;
  current++;
  if (current >= 21) { showResult(); return; }
  renderQuestion();
}

function prevQ() {
  if (current === 0) return;
  current--;
  renderQuestion();
}

// ─── CALCULATE RESULT ─────────────────────────────────────────
function showResult() {
  resetScores();
  answers.forEach((ans, qi) => {
    if (ans === null) return;
    const s = QUESTIONS[qi].opts[ans].scores;
    Object.keys(s).forEach(k => scores[k] += s[k]);
  });

  // find winner
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const winner = sorted[0][0];
  const maxScore = sorted[0][1];
  const t = TYPES[winner];

  // hero
  document.getElementById('r-emoji').textContent = t.emoji;
  document.getElementById('r-type-name').textContent = t.name;
  document.getElementById('r-type-sub').textContent = t.sub;

  // score bars
  const typeNames = {craft:'ものづくり',nature:'自然・農業',office:'事務サポート',people:'対人コミュ',leader:'リーダー',expert:'専門スペシャリスト'};
  const barHTML = sorted.map(([key, val]) => {
    const pct = Math.round((val / maxScore) * 100);
    return `<div class="score-row">
      <div class="score-name">${typeNames[key]}</div>
      <div class="score-bar-outer"><div class="score-bar-inner" data-pct="${pct}"></div></div>
      <div class="score-pct">${pct}%</div>
    </div>`;
  }).join('');
  document.getElementById('score-bars').innerHTML = barHTML;

  // cards
  const cards = `
    <div class="r-card">
      <div class="r-card-title">🌟 あなたの性格特徴</div>
      <div class="r-card-body">
        <div class="trait-list">${t.traits.map(tr=>`<span class="trait">${tr}</span>`).join('')}</div>
      </div>
    </div>
    <div class="r-card">
      <div class="r-card-title">💼 向いている職種・職業</div>
      <div class="r-card-body">
        <div class="job-list">${t.jobs.map(j=>`<div class="job-item">▶ ${j}</div>`).join('')}</div>
      </div>
    </div>
  `;
  document.getElementById('result-cards').innerHTML = cards;

  // advice
  document.getElementById('advice-box').innerHTML = `<p>📝 <strong>進路アドバイス</strong><br><br>${t.advice}</p>`;

  // 求人情報マッチング
  renderJobMatches(t);

  document.getElementById('progress-bar-inner').style.width = '100%';
  document.getElementById('progress-text').textContent = '21 / 21';

  showScreen('result-section');

  // animate bars after paint
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.score-bar-inner').forEach(bar => {
        bar.style.width = bar.dataset.pct + '%';
      });
    }, 100);
  });
}
</script>
