<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職種・適性＆性格診断 | 曽於高等学校</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f7f5f0;
    --accent: #2e7d5e;
    --accent-light: #e8f5f0;
    --accent2: #d4700a;
    --accent2-light: #fdf1e3;
    --line: #d8d4cc;
    --muted: #6b6760;
    --white: #ffffff;
    --card-shadow: 0 2px 16px rgba(26,26,46,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    padding: 20px 24px 18px;
    text-align: center;
  }
  header .label {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #8fa8d0;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.25;
  }
  header h1 span {
    color: #6fcf97;
  }
  header .sub {
    margin-top: 8px;
    font-size: 12px;
    color: #8fa8d0;
  }

  /* ─── PROGRESS BAR ─── */
  #progress-wrap {
    background: var(--ink);
    padding: 0 24px 16px;
  }
  #progress-bar-outer {
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #6fcf97, #27ae60);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }
  #progress-text {
    margin-top: 6px;
    font-size: 11px;
    color: #8fa8d0;
    text-align: right;
  }

  /* ─── MAIN CONTAINER ─── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ─── INTRO SCREEN ─── */
  #intro {
    text-align: center;
    padding: 24px 0 12px;
  }
  #intro .big-q {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(36px, 10vw, 72px);
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 16px;
  }
  #intro h2 {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    margin-bottom: 12px;
  }
  #intro p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .intro-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1.5px solid var(--accent);
  }
  .intro-filters {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .intro-filters select {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    min-width: 120px;
  }
  .intro-filters select:focus { outline: 2px solid var(--accent2); }
  @media (max-width: 480px) {
    .intro-filters select { min-width: 44%; font-size: 12px; padding: 9px 8px; }
  }
  .btn-start {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 16px 48px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 16px rgba(46,125,94,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46,125,94,0.4); }
  .btn-start:active { transform: translateY(0); }

  /* ─── QUESTION CARD ─── */
  .screen { display: none; }
  .screen.active { display: block; }

  #quiz-section {
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: clamp(16px, 3.5vw, 20px);
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--ink);
  }

  .options {
    display: grid;
    gap: 10px;
  }
  .opt-btn {
    background: var(--white);
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.12s;
    line-height: 1.5;
    box-shadow: var(--card-shadow);
  }
  .opt-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(4px);
  }
  .opt-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
  }
  .opt-btn .opt-icon {
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--line);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    line-height: 24px;
    margin-right: 10px;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .opt-btn.selected .opt-icon {
    background: var(--accent);
    color: #fff;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    align-items: center;
  }
  .btn-back {
    background: none;
    border: 2px solid var(--line);
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-back:hover { border-color: var(--muted); color: var(--ink); }
  .btn-next {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-next.enabled {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-next.enabled:hover { transform: translateY(-2px); }

  /* ─── RESULT ─── */
  #result-section {
    animation: fadeUp 0.4s ease both;
  }

  .result-hero {
    background: var(--ink);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(111,207,151,0.08);
    border-radius: 50%;
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #8fa8d0;
    margin-bottom: 12px;
  }
  .result-type-name {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 900;
    color: #6fcf97;
    margin-bottom: 8px;
    line-height: 1.15;
  }
  .result-type-sub {
    font-size: 14px;
    color: #c5c2ba;
    line-height: 1.7;
  }
  .result-emoji {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }

  .result-cards {
    display: grid;
    gap: 16px;
    margin-bottom: 24px;
  }
  .r-card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--card-shadow);
  }
  .r-card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .r-card-body {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.8;
  }
  .trait-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .trait {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 99px;
  }
  .job-list {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }
  .job-item {
    background: var(--accent2-light);
    border-left: 4px solid var(--accent2);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    font-weight: 500;
  }

  /* score bars */
  .score-section {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    margin-bottom: 16px;
  }
  .score-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .score-name {
    font-size: 13px;
    font-weight: 500;
    width: 90px;
    flex-shrink: 0;
    color: var(--ink);
  }
  .score-bar-outer {
    flex: 1;
    background: var(--line);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .score-bar-inner {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), #27ae60);
    width: 0%;
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .score-pct {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    width: 36px;
    text-align: right;
  }

  .advice-box {
    background: linear-gradient(135deg, var(--accent-light), #fff);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .advice-box p {
    font-size: 14px;
    line-height: 1.85;
    color: var(--ink);
  }
  .advice-box strong { color: var(--accent); }

  /* ─── JOB MATCH (求人情報) ─── */
  .job-match-section {
    background: var(--white);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    margin-bottom: 20px;
  }
  .job-match-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .job-match-loading {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 16px 0;
  }
  .job-match-filter-summary {
    font-size: 12px;
    color: var(--muted);
    background: var(--accent-light);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 14px;
  }
  .job-match-filter-summary:empty { display: none; }
  .job-match-group {
    margin-bottom: 18px;
  }
  .job-match-group:last-child { margin-bottom: 0; }
  .job-match-group-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--line);
  }
  .job-match-filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .job-match-filter-row label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .job-match-filter {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .job-match-filter:focus {
    outline: none;
    border-color: var(--accent);
  }
  .job-match-list {
    display: grid;
    gap: 10px;
  }
  .job-match-item {
    background: var(--accent-light);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
  }
  .job-match-office {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .job-match-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .job-match-keywords {
    font-size: 12px;
    color: var(--muted);
    line-height: 2;
  }
  .kw-tag {
    display: inline-block;
    background: var(--accent2-light);
    color: var(--accent2);
    border-radius: 99px;
    padding: 2px 10px;
    margin: 2px 4px 2px 0;
    font-weight: 700;
    font-size: 11px;
  }
  .job-match-none {
    font-size: 13px;
    color: var(--muted);
    padding: 6px 0 2px;
  }

  .btn-retry {
    display: block;
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .btn-retry:hover { opacity: 0.85; }

  .btn-download-result {
    display: block;
    width: 100%;
    background: var(--accent2);
    color: #fff;
    border: none;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 14px rgba(212,112,10,0.25);
  }
  .btn-download-result:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-download-result:active { transform: translateY(0); }

  @media (max-width: 480px) {
    .opt-btn { font-size: 13px; padding: 14px 16px; }
    .result-hero { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="label">曽於高等学校 進路支援ツール</div>
  <h1>職種・適性 &amp; <span>性格診断</span></h1>
  <div class="sub">21問で分かる、あなたの強みと向いている仕事<br>[AIが求人票より提案します。]</div>
</header>

<div id="progress-wrap">
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <div id="progress-text">0 / 21</div>
</div>

<main>

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="big-q">?</div>
    <h2>自分に合った仕事、見つけよう</h2>
    <p>この診断は、高校生の就職データと企業からの声をもとに作られています。<br>21問に正直に答えるだけで、あなたの性格タイプと向いている職種・職業がわかります。<br>【ＡＩが求人票よりあなたに合った企業を検索して提案します。】</p>
    <div class="intro-badges">
      <span class="badge">約5分で完了</span>
      <span class="badge">21問</span>
      <span class="badge">6つの職業タイプ</span>
    </div>
    <div class="intro-filters">
      <select id="filter-pref" aria-label="都道府県"></select>
      <select id="filter-salary" aria-label="月給">
        <option value="">月給（指定なし）</option>
        <option value="0-200000">20万円以下</option>
        <option value="200001-230000">20万円～23万円</option>
        <option value="230001-250000">23万円～25万円</option>
        <option value="250001-299999">25万円～30万円</option>
        <option value="300000-">30万円以上</option>
      </select>
      <select id="filter-holiday" aria-label="年間休日">
        <option value="">年間休日（指定なし）</option>
        <option value="0-100">100日以下</option>
        <option value="101-110">100日～110日</option>
        <option value="111-115">110日～115日</option>
        <option value="116-119">115日～120日</option>
        <option value="120-">120日以上</option>
      </select>
      <select id="filter-bonus" aria-label="賞与">
        <option value="">賞与（指定なし）</option>
        <option value="なし">なし</option>
        <option value="あり">あり</option>
      </select>
    </div>
    <button class="btn-start" onclick="startQuiz()">診断をはじめる →</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-section" class="screen">
    <div class="q-num" id="q-num">Q1 / 21</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="prevQ()">← 戻る</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()">次へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-section" class="screen">
    <div class="result-hero">
      <div class="result-label">あなたの診断結果</div>
      <span class="result-emoji" id="r-emoji"></span>
      <div class="result-type-name" id="r-type-name"></div>
      <div class="result-type-sub" id="r-type-sub"></div>
    </div>

    <div class="score-section">
      <div class="score-label">タイプ別スコア</div>
      <div id="score-bars"></div>
    </div>

    <div class="result-cards" id="result-cards"></div>

    <div class="advice-box" id="advice-box"></div>

    <div class="job-match-section" id="job-match-section" style="display:none;">
      <div class="job-match-title">🔎 関連する求人情報</div>
      <div class="job-match-filter-summary" id="job-match-filter-summary"></div>
      <div class="job-match-loading" id="job-match-loading">求人情報を確認しています…</div>
      <div id="job-match-results"></div>
    </div>

    <div id="download-result-wrap" style="display:none; margin-bottom:16px;">
      <button class="btn-download-result" id="btn-download-result" onclick="downloadResultTxt()">
        📄 診断結果をテキストファイルで保存する
      </button>
    </div>

    <button class="btn-retry" onclick="retryQuiz()">もう一度診断する</button>
  </div>

</main>

<script>
// ─── 6 CAREER TYPES ───────────────────────────────────────────
const TYPES = {
  craft: {
    name: "ものづくり職人タイプ",
    emoji: "🔧",
    sub: "手と技術で価値を生み出す。現場でどんどん成長できる人。",
    traits: ["丁寧・慎重","集中力が高い","責任感が強い","コツコツ努力","物事を具体的に考える"],
    jobs: ["製造業・生産ライン","機械・設備メンテナンス","電気工事士","自動車整備士","溶接・板金加工","建設・土木工事"],
    advice: "<strong>あなたの強み</strong>は、丁寧さと集中力です。技術や資格を積み上げることで、現場のリーダーや技術の専門家として活躍できます。機械電子科で学んだスキルや危険物・溶接の資格は、企業から高く評価されます。夜勤やシフトがある職場も多いので、<strong>勤務形態の確認</strong>を忘れずに！"
  },
  nature: {
    name: "自然・いのちタイプ",
    emoji: "🌿",
    sub: "生き物や食・大地とつながる仕事に本当のやりがいを感じる人。",

let current = 0;
let answers = new Array(21).fill(null); // selected option index per question
let scores = {};

function resetScores() {
  scores = {craft:0, nature:0, office:0, people:0, leader:0, expert:0};
}

// ─── NAVIGATION ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0;
  answers = new Array(21).fill(null);
  resetScores();
  showScreen('quiz-section');
  renderQuestion();
}

function retryQuiz() {
  showScreen('intro');
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((current / 21) * 100);
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${current} / 21`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('q-num').textContent = `Q${current+1} / 21`;
  document.getElementById('q-text').textContent = q.text;

  const labels = ['A','B','C','D'];
  const container = document.getElementById('options');
  container.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-icon">${labels[i]}</span>${opt.label}`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  // nav
  document.getElementById('btn-back').style.display = current === 0 ? 'none' : 'block';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current === 20 ? '結果を見る →' : '次へ →';
  nextBtn.classList.toggle('enabled', answers[current] !== null);

  updateProgress();

  // re-animate
  const qs = document.getElementById('quiz-section');
  qs.style.animation = 'none';
  qs.offsetHeight;
  qs.style.animation = '';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.opt-btn').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
    const icon = b.querySelector('.opt-icon');
    icon.style.background = idx === i ? 'var(--accent)' : '';
    icon.style.color = idx === i ? '#fff' : '';
  });
  document.getElementById('btn-next').classList.add('enabled');
}

function nextQ() {
  if (answers[current] === null) return;
  current++;
  if (current >= 21) { showResult(); return; }
  renderQuestion();
}

function prevQ() {
  if (current === 0) return;
  current--;
  renderQuestion();
}

// ─── CALCULATE RESULT ─────────────────────────────────────────
function showResult() {
  resetScores();
  answers.forEach((ans, qi) => {
    if (ans === null) return;
    const s = QUESTIONS[qi].opts[ans].scores;
    Object.keys(s).forEach(k => scores[k] += s[k]);
  });

  // find winner
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const winner = sorted[0][0];
  const maxScore = sorted[0][1];
  const t = TYPES[winner];

  // hero
  document.getElementById('r-emoji').textContent = t.emoji;
  document.getElementById('r-type-name').textContent = t.name;
  document.getElementById('r-type-sub').textContent = t.sub;

  // score bars
  const typeNames = {craft:'ものづくり',nature:'自然・農業',office:'事務サポート',people:'対人コミュ',leader:'リーダー',expert:'専門スペシャリスト'};
  const barHTML = sorted.map(([key, val]) => {
    const pct = Math.round((val / maxScore) * 100);
    return `<div class="score-row">
      <div class="score-name">${typeNames[key]}</div>
      <div class="score-bar-outer"><div class="score-bar-inner" data-pct="${pct}"></div></div>
      <div class="score-pct">${pct}%</div>
    </div>`;
  }).join('');
  document.getElementById('score-bars').innerHTML = barHTML;

  // cards
  const cards = `
    <div class="r-card">
      <div class="r-card-title">🌟 あなたの性格特徴</div>
      <div class="r-card-body">
        <div class="trait-list">${t.traits.map(tr=>`<span class="trait">${tr}</span>`).join('')}</div>
      </div>
    </div>
    <div class="r-card">
      <div class="r-card-title">💼 向いている職種・職業</div>
      <div class="r-card-body">
        <div class="job-list">${t.jobs.map(j=>`<div class="job-item">▶ ${j}</div>`).join('')}</div>
      </div>
    </div>
  `;
  document.getElementById('result-cards').innerHTML = cards;

  // advice
  document.getElementById('advice-box').innerHTML = `<p>📝 <strong>進路アドバイス</strong><br><br>${t.advice}</p>`;

  // 診断結果をグローバルに保存（テキスト出力用）
  window._diagResult = { winner, t, sorted, typeNames, scores };

  // 求人情報マッチング（向いている職種・職業をキーワード化してCSVから検索）
  loadJobMatches(t.jobs);

  document.getElementById('progress-bar-inner').style.width = '100%';
  document.getElementById('progress-text').textContent = '21 / 21';

  showScreen('result-section');

  // ダウンロードボタンを表示
  document.getElementById('download-result-wrap').style.display = 'block';

  // IPアドレスを非同期取得してキャッシュ
  fetchUserIP();

  // animate bars after paint
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.score-bar-inner').forEach(bar => {
        bar.style.width = bar.dataset.pct + '%';
      });
    }, 100);
  });
}

// ─── 求人情報マッチング ────────────────────────────────────────
const KYUJIN_CSV_URL = 'https://soo-hs.github.io/soohs/kyujin/kyujin2026.csv';

// 検索対象の項目（求人票の各列）
const SEARCH_COLUMNS = [
  '求人番号',
  '事業所名',
  '職種',
  '仕事の内容',
  '補足事項',
  '職業分類（ハローワーク）大分類',
  '職業分類（ハローワーク）中分類',
  '職業分類（ハローワーク）小分類',
  '職業分類2（ハローワーク）大分類',
  '職業分類2（ハローワーク）中分類',
  '職業分類2（ハローワーク）小分類'
];

// CSVから読み込む項目（検索対象 + 表示用に追加する項目 + 絞り込み条件用の項目）
const KYUJIN_COLUMNS = [
  ...SEARCH_COLUMNS,
  '就業場所住所（市区町村）',
  '月給（基本給+手当+残業代）',
  '年間休日数',
  '賞与有無（新卒）'
];

let KYUJIN_DATA_CACHE = null; // 一度読み込んだCSVをキャッシュ（非表示で読込）

// ─── 検索条件（都道府県・月給・年間休日・賞与） ────────────────────
const PREFECTURES = [
  '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
  '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
  '新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県',
  '三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県',
  '鳥取県','島根県','岡山県','広島県','山口県',
  '徳島県','香川県','愛媛県','高知県',
  '福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'
];

(function initFilterSelects() {
  const prefSelect = document.getElementById('filter-pref');
  prefSelect.innerHTML = PREFECTURES.map(p =>
    `<option value="${p}"${p === '鹿児島県' ? ' selected' : ''}>${p}</option>`
  ).join('');
})();

// "min-max" 形式の範囲文字列をパースする（末尾が空なら上限なし、先頭が0なら下限なし扱い）
function parseRange(rangeStr) {
  if (!rangeStr) return null;
  const [minStr, maxStr] = rangeStr.split('-');
  return {
    min: minStr === '' ? -Infinity : Number(minStr),
    max: (maxStr === undefined || maxStr === '') ? Infinity : Number(maxStr)
  };
}

// 現在選択されている検索条件を取得（空欄の項目は条件に含めない）
function getSearchFilters() {
  return {
    pref: document.getElementById('filter-pref').value,
    salary: parseRange(document.getElementById('filter-salary').value),
    holiday: parseRange(document.getElementById('filter-holiday').value),
    bonus: document.getElementById('filter-bonus').value
  };
}

// 求人1件（row）が現在の検索条件をすべて満たすか判定
function matchesSearchFilters(row, filters) {
  if (filters.pref) {
    const loc = row['就業場所住所（市区町村）'] || '';
    if (!loc.startsWith(filters.pref)) return false;
  }
  if (filters.salary) {
    const salary = Number(String(row['月給（基本給+手当+残業代）'] || '').replace(/[^\d]/g, ''));
    if (!Number.isFinite(salary) || salary <= 0) return false;
    if (salary < filters.salary.min || salary > filters.salary.max) return false;
  }
  if (filters.holiday) {
    const holiday = Number(String(row['年間休日数'] || '').replace(/[^\d]/g, ''));
    if (!Number.isFinite(holiday) || holiday <= 0) return false;
    if (holiday < filters.holiday.min || holiday > filters.holiday.max) return false;
  }
  if (filters.bonus) {
    if ((row['賞与有無（新卒）'] || '').trim() !== filters.bonus) return false;
  }
  return true;
}

// CSVテキストを2次元配列にパース（引用符・改行・カンマを含むフィールドに対応）
function parseCSVText(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // BOM除去
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if (c === '"') {
        inQuotes = true;
      } else if (c === ',') {
        row.push(field); field = '';
      } else if (c === '\r') {
        // 無視
      } else if (c === '\n') {
        row.push(field); field = '';
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
  }
  if (field.length > 0 || row.length > 0) {
    row.push(field);
    rows.push(row);
  }
  return rows;
}

// CSVを取得して、必要な項目だけのオブジェクト配列に変換（一時的に非表示で読込）
async function fetchKyujinData() {
  if (KYUJIN_DATA_CACHE) return KYUJIN_DATA_CACHE;

  const res = await fetch(KYUJIN_CSV_URL);
  if (!res.ok) throw new Error('CSV取得に失敗しました: ' + res.status);
  const text = await res.text();
  const rows = parseCSVText(text);
  if (rows.length === 0) { KYUJIN_DATA_CACHE = []; return KYUJIN_DATA_CACHE; }

  const header = rows[0].map(h => h.trim());
  const colIndex = {};
  header.forEach((h, i) => { colIndex[h] = i; });

  const data = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (r.length < 2) continue; // 空行スキップ
    const obj = {};
    KYUJIN_COLUMNS.forEach(col => {
      const idx = colIndex[col];
      obj[col] = (idx !== undefined && r[idx] !== undefined) ? r[idx] : '';
    });
    data.push(obj);
  }
  KYUJIN_DATA_CACHE = data;
  return data;
}

// 「向いている職種・職業」の1項目をキーワード化
// 例: "JA（農業協同組合）" → ["農業協同組合", "JA"]
//     "製造業・生産ライン" → ["製造業", "生産ライン"]
function extractKeywords(jobLabel) {
  const keywords = [];

  // 括弧内の語句を取り出してキーワード化
  const main = jobLabel.replace(/[（(]([^）)]*)[）)]/g, (m, inner) => {
    inner.split(/[・,、\s]+/).forEach(part => {
      let k = part.trim().replace(/(等|など)$/u, '');
      if (k) keywords.push(k);
    });
    return '';
  });

  // 残りの本文を「・」で分割してキーワード化
  main.split(/[・]/).forEach(part => {
    const k = part.trim();
    if (k) keywords.push(k);
  });

  // 重複除去・空要素除去
  return [...new Set(keywords.filter(k => k.length > 0))];
}

// HTMLエスケープ
function escapeHTML(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 「向いている職種・職業」をキーワード化し、CSVの全項目から一致するものを抽出して表示
async function loadJobMatches(jobs) {
  const section = document.getElementById('job-match-section');
  const loadingEl = document.getElementById('job-match-loading');
  const resultsEl = document.getElementById('job-match-results');

  section.style.display = 'block';
  loadingEl.style.display = 'block';
  loadingEl.textContent = '求人情報を確認しています…';
  resultsEl.innerHTML = '';

  try {
    const data = await fetchKyujinData(); // 一時的に非表示で読込済み
    const filters = getSearchFilters(); // 検索条件（都道府県・月給・年間休日・賞与、空欄は条件に含めない）

    const summaryParts = [];
    if (filters.pref) summaryParts.push(`都道府県：${filters.pref}`);
    if (filters.salary) summaryParts.push(`月給：${document.getElementById('filter-salary').selectedOptions[0].textContent}`);
    if (filters.holiday) summaryParts.push(`年間休日：${document.getElementById('filter-holiday').selectedOptions[0].textContent}`);
    if (filters.bonus) summaryParts.push(`賞与：${filters.bonus}`);
    document.getElementById('job-match-filter-summary').textContent =
      summaryParts.length > 0 ? `検索条件：${summaryParts.join('／')}` : '';

    let html = '';
    const seenJobNo = new Set(); // 「向いている職種・職業」全体で求人番号の重複を防ぐ
    const jobMatchGroups = []; // TXT出力用

    jobs.forEach((job, groupIndex) => {
      const keywords = extractKeywords(job);
      const matches = [];

      data.forEach(row => {
        if (!matchesSearchFilters(row, filters)) return; // 検索条件を満たさない求人は除外

        // 指定された全項目を結合して全検索の対象とする
        const searchText = SEARCH_COLUMNS.map(col => row[col] || '').join('\n');
        const matchedKeywords = keywords.filter(kw => kw && searchText.includes(kw));

        if (matchedKeywords.length > 0) {
          const jobNo = row['求人番号'];
          if (seenJobNo.has(jobNo)) return; // 重複した求人番号は表示しない
          seenJobNo.add(jobNo);
          matches.push({
            office: row['事業所名'],
            jobNo: jobNo,
            shokushu: row['職種'],
            location: row['就業場所住所（市区町村）'] || '未設定',
            keywords: matchedKeywords
          });
        }
      });

      // TXT用データ蓄積
      jobMatchGroups.push({ job, matches });

      const groupId = `job-match-group-${groupIndex}`;

      html += `<div class="job-match-group">
        <div class="job-match-group-title">▶ ${escapeHTML(job)}</div>`;

      if (matches.length > 0) {
        // 30件以上ある場合は「就業場所」で絞り込めるようにする
        if (matches.length >= 30) {
          const locations = [...new Set(matches.map(m => m.location))].sort((a, b) => a.localeCompare(b, 'ja'));
          html += `<div class="job-match-filter-row">
            <label for="${groupId}-filter">就業場所で絞り込み：</label>
            <select id="${groupId}-filter" class="job-match-filter" onchange="filterJobMatches('${groupId}', this.value)">
              <option value="">すべて表示（${matches.length}件）</option>
              ${locations.map(loc => `<option value="${escapeHTML(loc)}">${escapeHTML(loc)}</option>`).join('')}
            </select>
          </div>`;
        }

        html += `<div class="job-match-list" id="${groupId}-list">${matches.map(m => `
          <div class="job-match-item" data-location="${escapeHTML(m.location)}">
            <div class="job-match-office">${escapeHTML(m.office)}</div>
            <div class="job-match-meta">求人番号：${escapeHTML(m.jobNo)} ／ 職種：${escapeHTML(m.shokushu)}</div>
            <div class="job-match-meta">就業場所：${escapeHTML(m.location)}</div>
            <div class="job-match-keywords">一致キーワード：${m.keywords.map(k => `<span class="kw-tag">${escapeHTML(k)}</span>`).join('')}</div>
          </div>
        `).join('')}</div>`;
      } else {
        html += `<div class="job-match-none">一致する求人情報が見つかりませんでした</div>`;
      }

      html += `</div>`;
    });

    loadingEl.style.display = 'none';
    resultsEl.innerHTML = html;

    // TXTダウンロード用にマッチング結果を保存
    window._jobMatchGroups = jobMatchGroups;

  } catch (err) {
    console.error(err);
    loadingEl.textContent = '求人情報の取得に失敗しました。時間をおいて再度お試しください。';
    window._jobMatchGroups = null;
  }
}

// ─── IPアドレス取得 ────────────────────────────────────────────
let _cachedIP = null;

async function fetchUserIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    _cachedIP = data.ip;
  } catch (e) {
    _cachedIP = '取得失敗';
  }
}

// ─── 診断結果テキストファイル生成・ダウンロード ──────────────────
async function downloadResultTxt() {
  const btn = document.getElementById('btn-download-result');
  btn.textContent = '⏳ 生成中…';
  btn.disabled = true;

  // IPがまだ取得されていない場合は待機
  if (!_cachedIP) {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      _cachedIP = data.ip;
    } catch (e) {
      _cachedIP = '取得失敗';
    }
  }

  const r = window._diagResult;
  if (!r) { btn.textContent = '📄 診断結果をテキストファイルで保存する'; btn.disabled = false; return; }

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const fileDateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;

  // アドバイス文のHTMLタグ除去
  const adviceText = r.t.advice.replace(/<[^>]+>/g, '');

  const lines = [
    '================================================================',
    '　　　　　　職種・適性＆性格診断　診断結果',
    '　　　　　曽於高等学校 進路支援ツール',
    '================================================================',
    '',
    `診断日時　：${dateStr} ${timeStr}`,
    `IPアドレス：${_cachedIP}`,
    '',
    '----------------------------------------------------------------',
    '【あなたの診断結果】',
    '----------------------------------------------------------------',
    `タイプ　　：${r.t.emoji} ${r.t.name}`,
    `サブタイトル：${r.t.sub}`,
    '',
    '----------------------------------------------------------------',
    '【タイプ別スコア】',
    '----------------------------------------------------------------',
    ...r.sorted.map(([key, val]) => {
      const pct = Math.round((val / r.sorted[0][1]) * 100);
      const bar = '█'.repeat(Math.round(pct / 5)) + '░'.repeat(20 - Math.round(pct / 5));
      return `  ${(r.typeNames[key] + '　　　　　').slice(0, 9)}　${bar}　${pct}%`;
    }),
    '',
    '----------------------------------------------------------------',
    '【あなたの性格特徴】',
    '----------------------------------------------------------------',
    r.t.traits.map(tr => `  ・${tr}`).join('\n'),
    '',
    '----------------------------------------------------------------',
    '【向いている職種・職業】',
    '----------------------------------------------------------------',
    r.t.jobs.map(j => `  ▶ ${j}`).join('\n'),
    '',
    '----------------------------------------------------------------',
    '【進路アドバイス】',
    '----------------------------------------------------------------',
    adviceText.split('。').filter(s => s.trim()).map(s => `  ${s.trim()}。`).join('\n'),
    '',
  ];

  // 求人情報マッチング結果
  const groups = window._jobMatchGroups;
  if (groups && groups.length > 0) {
    lines.push('----------------------------------------------------------------');
    lines.push('【関連する求人情報】');
    lines.push('----------------------------------------------------------------');
    groups.forEach(g => {
      lines.push(`▶ ${g.job}`);
      if (g.matches.length === 0) {
        lines.push('  一致する求人情報が見つかりませんでした');
      } else {
        g.matches.forEach((m, idx) => {
          lines.push(`  [${idx + 1}] ${m.office}`);
          lines.push(`      求人番号：${m.jobNo}　職種：${m.shokushu}`);
          lines.push(`      就業場所：${m.location}`);
          lines.push(`      一致キーワード：${m.keywords.join('・')}`);
        });
      }
      lines.push('');
    });
  } else if (groups === null) {
    lines.push('----------------------------------------------------------------');
    lines.push('【関連する求人情報】');
    lines.push('----------------------------------------------------------------');
    lines.push('  求人情報の取得に失敗しました。');
    lines.push('');
  } else {
    lines.push('----------------------------------------------------------------');
    lines.push('【関連する求人情報】');
    lines.push('----------------------------------------------------------------');
    lines.push('  求人情報を読み込み中です。少し待ってから再度保存してください。');
    lines.push('');
  }

  lines.push('================================================================');
  lines.push('　※この結果はあくまで参考です。先生や保護者と相談しながら');
  lines.push('　　自分に合った進路を選択してください。');
  lines.push('================================================================');

  const text = lines.join('\n');
  const blob = new Blob(['\uFEFF' + text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `career_diagnosis_${fileDateStr}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  btn.textContent = '✅ 保存しました！';
  setTimeout(() => {
    btn.textContent = '📄 診断結果をテキストファイルで保存する';
    btn.disabled = false;
  }, 2500);
}

function filterJobMatches(groupId, location) {
  const list = document.getElementById(groupId + '-list');
  if (!list) return;
  list.querySelectorAll('.job-match-item').forEach(item => {
    item.style.display = (!location || item.dataset.location === location) ? '' : 'none';
  });
}
