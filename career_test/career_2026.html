<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職業診断テスト 2026 | 求人票データ分析</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --accent1: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .label-badge {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent1);
    border: 1px solid var(--accent1);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
    box-shadow: var(--glow);
  }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent1) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  /* Progress bar */
  .progress-wrap {
    margin: 28px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--card);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: var(--glow);
  }

  .progress-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent1);
    min-width: 60px;
    text-align: right;
    letter-spacing: 1px;
  }

  /* Question Card */
  .q-card {
    background: var(--card);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 16px;
    padding: 32px 28px;
    margin-bottom: 20px;
    animation: slideIn 0.4s ease forwards;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
  }

  @keyframes slideIn {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }

  .q-num {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--accent1);
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 24px;
    color: #fff;
  }

  .q-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Options */
  .options {
    display: grid;
    gap: 10px;
  }

  .opt {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .opt::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .opt:hover {
    border-color: var(--accent1);
    transform: translateX(4px);
    box-shadow: -3px 0 0 var(--accent1);
  }

  .opt.selected {
    border-color: var(--accent1);
    background: rgba(0,212,255,0.12);
    box-shadow: -3px 0 0 var(--accent1), var(--glow);
    color: #fff;
  }

  .opt-icon {
    font-size: 22px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .opt-text {
    position: relative;
    z-index: 1;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: #fff;
    box-shadow: var(--glow);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,212,255,0.4);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    transform: none;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
  }

  .btn-secondary:hover {
    border-color: var(--text);
    color: var(--text);
  }

  /* Start Screen */
  #start-screen {
    text-align: center;
    padding: 20px 0 40px;
  }

  .intro-card {
    background: var(--card);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 16px;
    padding: 40px 32px;
    margin: 32px 0;
    position: relative;
    overflow: hidden;
  }

  .intro-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  }

  .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 28px 0;
  }

  .feature {
    background: var(--surface);
    border-radius: 12px;
    padding: 20px 12px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .feature-icon { font-size: 28px; margin-bottom: 8px; }
  .feature-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .feature-val { font-size: 15px; font-weight: 700; color: var(--text); }

  /* Result Screen */
  #result-screen { display: none; }

  .result-hero {
    background: var(--card);
    border-radius: 20px;
    padding: 36px 28px;
    margin-bottom: 24px;
    border: 1px solid rgba(0,212,255,0.2);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center top, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .trophy { font-size: 56px; margin-bottom: 12px; }

  .result-industry {
    font-size: 26px;
    font-weight: 900;
    color: var(--accent1);
    margin-bottom: 8px;
    text-shadow: var(--glow);
  }

  .result-tagline {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .match-score {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 50px;
    padding: 8px 20px;
    font-weight: 700;
    color: var(--accent1);
    font-size: 15px;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 20px 0;
  }

  .stat-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s;
  }

  .stat-card:hover {
    border-color: rgba(0,212,255,0.3);
    transform: translateY(-2px);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent1);
  }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Job types */
  .section-title {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .job-tag {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.35);
    color: #c4b5fd;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 500;
  }

  /* Rank list */
  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .rank-item {
    background: var(--surface);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.2s;
  }

  .rank-item:hover {
    border-color: rgba(0,212,255,0.25);
    transform: translateX(4px);
  }

  .rank-num {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    min-width: 28px;
    text-align: center;
  }

  .rank-1 .rank-num { color: #fbbf24; }
  .rank-2 .rank-num { color: #94a3b8; }
  .rank-3 .rank-num { color: #b45309; }

  .rank-info { flex: 1; }
  .rank-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .rank-detail { font-size: 12px; color: var(--muted); }
  
  .rank-bar-wrap {
    width: 80px;
  }

  .rank-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .rank-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
  }

  .rank-score {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 2px;
  }

  /* Advice box */
  .advice-box {
    background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(0,212,255,0.08));
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: 12px;
    padding: 20px 22px;
    margin-top: 20px;
  }

  .advice-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent3);
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .advice-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }

  /* Company cards */
  .company-section {
    margin-top: 32px;
  }

  .company-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }

  .company-card {
    background: var(--surface);
    border: 1px solid rgba(0,212,255,0.12);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: all 0.25s;
    cursor: default;
  }

  .company-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent1), var(--accent2));
    border-radius: 3px 0 0 3px;
  }

  .company-card:hover {
    border-color: rgba(0,212,255,0.35);
    transform: translateX(4px);
    box-shadow: -4px 0 0 var(--accent1), 0 4px 24px rgba(0,212,255,0.08);
  }

  .company-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .company-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }

  .company-job {
    font-size: 12px;
    color: var(--accent1);
    font-weight: 600;
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  .company-badge {
    flex-shrink: 0;
    font-size: 10px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent1);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .company-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .company-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .company-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }

  .company-stat span:first-child {
    font-size: 13px;
  }

  .company-loading {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 14px;
  }

  .company-loading .mini-spin {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(0,212,255,0.2);
    border-top-color: var(--accent1);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  .company-addr {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Retry btn */
  .btn-retry {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 28px;
    padding: 16px;
    background: transparent;
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 10px;
    color: var(--accent1);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-retry:hover {
    background: rgba(0,212,255,0.08);
    box-shadow: var(--glow);
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(0,212,255,0.2);
    border-top-color: var(--accent1);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* Dots indicator */
  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }

  .dot.active {
    background: var(--accent1);
    width: 20px;
    border-radius: 3px;
    box-shadow: var(--glow);
  }

  .dot.done { background: var(--accent2); }

  @media (max-width: 480px) {
    .features { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="label-badge">2026年度 求人票データ分析</div>
    <h1>職業適性<br>診断テスト</h1>
    <p class="subtitle">2025年度 2,949件 求人データをもとに<br>2026年度の求人票よりあなたに合った職種を提案します</p>
  </header>

  <!-- Start Screen -->
  <div id="start-screen">
    <div class="intro-card">
      <div class="features">
        <div class="feature">
          <div class="feature-icon">📊</div>
          <div class="feature-val">2,949件</div>
          <div class="feature-label">元になった求人票数</div>
        </div>
        <div class="feature">
          <div class="feature-icon">❓</div>
          <div class="feature-val">12問</div>
          <div class="feature-label">診断質問数</div>
        </div>
        <div class="feature">
          <div class="feature-icon">💼</div>
          <div class="feature-val">8業種</div>
          <div class="feature-label">対象業種数</div>
        </div>
      </div>
      <p style="color:var(--muted);font-size:14px;line-height:1.8;">
        12の質問に答えるだけで、あなたの興味・適性・価値観から<br>
        最適な業種・職種をAIが分析してアドバイスします。
      </p>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()" style="font-size:17px;padding:16px 48px;">
      診断スタート →
    </button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 / 12</div>
    </div>
    <div class="dots" id="dots"></div>
    <div id="q-container"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-back" onclick="goBack()" style="display:none;">← 戻る</button>
      <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>次の質問 →</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">診断中...データ分析中...</div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen"></div>
</div>

<script>
const QUESTIONS = [
  {
    id: 1,
    text: "どんな作業スタイルが好きですか？",
    sub: "日々の仕事のイメージを選んでください",
    options: [
      { icon: "🔧", text: "手を動かして物を作ったり整備する", weights: { 製造: 3, 建築: 3, 販売: 0, 運輸: 1, 飲食: 0, その他: 1, 医療: 0, 理美容: 1 } },
      { icon: "🤝", text: "人と話して接客・サービスをする", weights: { 製造: 0, 建築: 0, 販売: 2, 運輸: 1, 飲食: 3, その他: 1, 医療: 2, 理美容: 3 } },
      { icon: "📋", text: "書類処理・計算・管理などのデスクワーク", weights: { 製造: 0, 建築: 0, 販売: 1, 運輸: 1, 飲食: 0, その他: 2, 医療: 1, 理美容: 0 } },
      { icon: "🚗", text: "外に出てフィールドワークや運搬をする", weights: { 製造: 1, 建築: 2, 販売: 1, 運輸: 3, 飲食: 0, その他: 2, 医療: 0, 理美容: 0 } },
    ]
  },
  {
    id: 2,
    text: "仕事で一番大切にしたいことは何ですか？",
    sub: "複数思い当たっても、最も重要なものを1つ選んでください",

  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const container = document.getElementById('q-container');
  
  const pct = (currentQ / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentQ} / ${QUESTIONS.length}`;
  
  // Update dots
  QUESTIONS.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    d.className = 'dot';
    if (i < currentQ) d.classList.add('done');
    else if (i === currentQ) d.classList.add('active');
  });
  
  const selectedVal = answers[currentQ];
  
  container.innerHTML = `
    <div class="q-card">
      <div class="q-num">QUESTION ${String(currentQ + 1).padStart(2, '0')} / 12</div>
      <div class="q-text">${q.text}${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <div class="opt ${selectedVal === i ? 'selected' : ''}" onclick="selectOption(${i})">
            <span class="opt-icon">${opt.icon}</span>
            <span class="opt-text">${opt.text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  
  const nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = (selectedVal === null);
  nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? '診断結果を見る 🎯' : '次の質問 →';
  
  document.getElementById('btn-back').style.display = currentQ > 0 ? 'block' : 'none';
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (answers[currentQ] === null) return;
  
  if (currentQ === QUESTIONS.length - 1) {
    calculateResult();
    return;
  }
  
  currentQ++;
  renderQuestion();
}

function goBack() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function calculateResult() {
  // Show loading
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  
  setTimeout(() => {
    // Calculate scores
    const totals = { 製造: 0, 建築: 0, 販売: 0, 運輸: 0, 飲食: 0, その他: 0, 医療: 0, 理美容: 0 };
    
    QUESTIONS.forEach((q, qi) => {
      const selectedIdx = answers[qi];
      if (selectedIdx !== null) {
        const weights = q.options[selectedIdx].weights;
        for (const [key, val] of Object.entries(weights)) {
          totals[key] += val;
        }
      }
    });
    
    // Normalize to percentage
    const maxScore = Math.max(...Object.values(totals));
    const normalized = {};
    for (const [key, val] of Object.entries(totals)) {
      normalized[key] = Math.round((val / maxScore) * 100);
    }
    
    // Rank
    const ranked = Object.entries(normalized)
      .sort((a, b) => b[1] - a[1])
      .map(([k, v]) => ({ key: k, score: v, fullKey: KEY_MAP[k] }));
    
    showResult(ranked, totals);
  }, 1800);
}

    </div>

    <div class="section-title">代表的な職種</div>

      ${data.job_types.map(j => `<span class="job-tag">${j}</span>`).join('')}
    </div>

    <div class="advice-box">

// Industry → CSV category mapping
const INDUSTRY_CSV_MAP = {
  製造: ['製造に関わる', '製造/加工/軽作業に関わる'],
  建築: ['建設/建築/土木に関わる'],
  販売: ['販売に関わる', '営業に関わる'],
  運輸: ['運輸/倉庫に関わる', '運輸に関わる'],
  飲食: ['飲食/調理に関わる', 'サービスに関わる'],
  その他: ['事務に関わる', '農林水産業に関わる', 'その他'],
  医療: ['医療/福祉に関わる', '医療に関わる'],
  理美容: ['サービスに関わる', '理美容に関わる']
};

async function loadMatchedCompanies(industryKey, industryFullKey) {
  const companyList = document.getElementById('company-list');
  try {
    const res = await fetch('https://soo-hs.github.io/soohs/kyujin/kyujin2026.csv');
    const text = await res.text();
    const rows = parseCSV(text);

    if (rows.length === 0) {
      companyList.innerHTML = '<div class="company-loading">求人データが見つかりませんでした。</div>';
      return;
    }

    // Try to find matching companies by category
    const targetCats = INDUSTRY_CSV_MAP[industryKey] || [];
    let matched = rows.filter(r => {
      const cat1 = r['職業分類（handy）大分類'] || '';
      const cat2 = r['職業分類2（handy）大分類'] || '';
      return targetCats.some(t => cat1.includes(t.split('/')[0]) || cat2.includes(t.split('/')[0]));
    });

    // If no match, show all companies
    if (matched.length === 0) matched = rows;

    // Show up to 4 companies
    const selected = matched.slice(0, 4);

    companyList.innerHTML = selected.map(r => {
      const name = r['事業所名'] || '';
      const job = r['職種'] || '';
      const salary = r['月給（基本給+手当+残業代）'];
      const holidays = r['年間休日数'];
      const bonus = r['賞与有無（新卒）'];
      const desc = (r['仕事の内容'] || '').replace(/[\r\n◎○●]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 70);
      const addr = (r['住所（所在地）'] || '').replace(/\r\n/g, ' ').trim().slice(0, 20);
      const cat = r['職業分類（handy）大分類'] || '';
      const salaryFmt = salary ? Math.round(parseInt(salary) / 10000) + '万円' : '—';

      return `
        <div class="company-card">
          <div class="company-header">
            <div>
              <div class="company-name">${name}</div>
              <div class="company-job">${job}</div>
            </div>
            <div class="company-badge">${cat}</div>
          </div>
          <div class="company-desc">${desc}…</div>
          <div class="company-stats">
            <div class="company-stat"><span>💴</span>${salaryFmt}/月</div>
            <div class="company-stat"><span>📅</span>年休${holidays || '—'}日</div>
            <div class="company-stat"><span>🎁</span>賞与${bonus === 'あり' ? 'あり✓' : bonus || '—'}</div>
          </div>
          ${addr ? `<div class="company-addr">📍 ${addr}</div>` : ''}
        </div>
      `;
    }).join('');

  } catch (e) {
    companyList.innerHTML = '<div class="company-loading">求人データの読み込みに失敗しました。</div>';
  }
}

function parseCSV(text) {
  // Remove BOM
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/);
  if (lines.length < 2) return [];

  // Parse header
  const headers = parseCSVLine(lines[0]);
  const rows = [];

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = vals[idx] || ''; });
    rows.push(obj);
  }
  return rows;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else { inQuote = !inQuote; }
    } else if (ch === ',' && !inQuote) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function retryQuiz() {
  currentQ = 0;
  answers = new Array(12).fill(null);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('result-screen').innerHTML = '';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
