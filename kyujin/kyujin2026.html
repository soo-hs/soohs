<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求人一覧ビューア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #d29922;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --tag-bg: #1f2937;
    --row-hover: #1e2a3a;
    --header-bg: #13181e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* ========== HEADER ========== */
  .app-header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header-main {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 52px;
  }
  .file-toggle-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .file-toggle-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
  .file-toggle-btn.active { background: #1a2a40; color: var(--accent); border-color: var(--accent); }

  /* ===== ヘッダー内クイック検索 ===== */
  .header-searches {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .qs-group {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    background: var(--surface);
    transition: border-color 0.2s;
  }
  .qs-group:focus-within { border-color: var(--accent); }
  .qs-label {
    padding: 0 8px;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    height: 30px;
    display: flex;
    align-items: center;
    letter-spacing: 0.02em;
    user-select: none;
  }
  .qs-input {
    background: transparent;
    border: none;
    color: var(--text);
    padding: 0 8px;
    height: 30px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    outline: none;
    width: 120px;
  }
  .qs-input::placeholder { color: var(--text-dim); font-size: 11px; }
  .qs-clear {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0 6px;
    font-size: 13px;
    height: 30px;
    display: none;
    align-items: center;
    line-height: 1;
  }
  .qs-clear.visible { display: flex; }
  .qs-clear:hover { color: var(--accent); }
  .qs-select {
    background: transparent;
    border: none;
    color: var(--text);
    padding: 0 6px 0 8px;
    height: 30px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    cursor: pointer;
    min-width: 80px;
    max-width: 180px;
  }
  .qs-select option { background: var(--surface2); color: var(--text); }

  /* 全検索クリアボタン */
  .clear-all-btn {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid #f85149;
    background: rgba(248,81,73,0.1);
    color: #f85149;
    cursor: pointer;
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .clear-all-btn.visible { display: flex; }
  .clear-all-btn:hover { background: rgba(248,81,73,0.22); }
  .qs-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 8px;
    margin-right: 4px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .qs-badge.forward  { background: #162032; color: #58a6ff; border: 1px solid #1f3a5f; }
  .qs-badge.partial  { background: #1a2a1a; color: #56d364; border: 1px solid #2a4a2a; }
  .app-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  /* file-zone: アコーディオン */
  .file-zone-wrap {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1), padding 0.2s;
    padding: 0 0;
    border-top: 0px solid transparent;
  }
  .file-zone-wrap.open {
    max-height: 60px;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .file-zone {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 600px;
  }
  .file-path-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .file-path-input:focus { border-color: var(--accent); }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn:hover { opacity: 0.85; }

  label.btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .stats-bar {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1.2;
  }
  .stat-label { font-size: 10px; color: var(--text-muted); }
  .stat-value { font-size: 14px; font-weight: 700; color: var(--accent2); font-family: 'IBM Plex Mono', monospace; }

  /* ========== TOOLBAR ========== */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px;
    flex: 0 0 210px;
  }
  .search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 6px 0;
    width: 100%;
  }
  .search-icon { color: var(--text-muted); font-size: 14px; }

  .col-toggle-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .col-toggle-btn:hover { border-color: var(--accent); }

  /* ===== 評価ボタン ===== */
  .eval-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .eval-btn:hover { border-color: var(--warn); color: var(--warn); }
  .eval-btn.active {
    background: rgba(210,153,34,0.15);
    border-color: var(--warn);
    color: var(--warn);
    font-weight: 700;
  }

  .page-info {
    margin-left: auto;
    color: #ff69b4;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ===== 検索ヒット情報 ===== */
  .search-hit-info {
    display: none;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding: 4px 0;
    font-size: 11px;
    color: var(--text-muted);
    max-width: 700px;
  }
  .search-hit-info.visible { display: flex; }
  .hit-label { color: var(--text-muted); white-space: nowrap; font-size: 11px; }
  .hit-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 10px;
    background: #1a2a40;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    white-space: nowrap;
    font-weight: 500;
  }
  .hit-tag.no-match {
    background: #2a1a1a;
    border-color: #f85149;
    color: #f85149;
  }
  .hit-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    margin-left: 4px;
    opacity: 0.8;
  }

  /* ========== COLUMN PANEL ========== */
  .col-panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
  }
  .col-panel-overlay.open { display: block; }
  .col-panel {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }
  .col-panel-overlay.open .col-panel { transform: translateX(0); }
  .col-panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }
  .col-panel-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
  .col-panel-actions {
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .col-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  .col-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .col-item:hover { background: var(--surface2); }
  .col-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
  .col-item-names { display: flex; flex-direction: column; line-height: 1.3; }
  .col-item-short { font-weight: 500; font-size: 13px; }
  .col-item-orig { font-size: 11px; color: var(--text-muted); }

  /* ========== TABLE ========== */
  .table-wrap {
    overflow: auto;
    flex: 1;
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE/Edge */
  }
  .table-wrap::-webkit-scrollbar {
    display: none; /* Chrome/Safari */
  }
  .main-content {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
  }
  table {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  th {
    background: var(--header-bg);
    border-bottom: 2px solid var(--accent);
    border-right: 1px solid var(--border);
    padding: 9px 12px;
    text-align: left;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.03em;
    position: relative;
    overflow: hidden;
  }
  th:hover { background: var(--surface); }
  th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 10px; }
  th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity: 1; color: var(--accent2); }

  /* ===== 列リサイズハンドル ===== */
  .col-resizer {
    position: absolute;
    top: 0; right: 0;
    width: 6px;
    height: 100%;
    cursor: col-resize;
    z-index: 1;
    background: transparent;
    transition: background 0.15s;
  }
  .col-resizer:hover,
  .col-resizer.dragging { background: var(--accent); opacity: 0.7; }
  table.resizing { cursor: col-resize; user-select: none; }

  td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 7px 12px;
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    vertical-align: middle;
    font-size: 12px;
  }
  tr:hover td { background: var(--row-hover); }
  tr:nth-child(even) td { background: var(--surface2); }
  tr:nth-child(even):hover td { background: var(--row-hover); }

  td.num { text-align: right; font-family: 'IBM Plex Mono', monospace; color: var(--accent2); }
  td.bool-yes { color: var(--accent2); font-weight: 500; }
  td.bool-no { color: var(--text-muted); }

  /* ========== EMPTY / LOADING STATE ========== */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .state-box .icon { font-size: 48px; opacity: 0.4; }
  .state-box .msg { font-size: 16px; }
  .state-box .sub { font-size: 12px; color: var(--text-dim); }

  /* ========== PAGINATION ========== */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .pg-btn {
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .pg-btn:disabled { opacity: 0.3; cursor: default; }
  .pg-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .pg-btn:not(:disabled):hover:not(.active) { border-color: var(--accent); }
  .pg-sep { color: var(--text-dim); padding: 0 4px; }

  /* ========== DETAIL MODAL ========== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: flex-start; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 1060px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-title { font-weight: 700; font-size: 15px; color: var(--accent); }
  .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; line-height: 1; }
  .modal-body { overflow-y: auto; padding: 16px 24px; scrollbar-width: none; -ms-overflow-style: none; }
  .modal-body::-webkit-scrollbar { display: none; }
  .detail-grid {
    /* single-card はこの中に描画されるため、padding のみ残す */
  }
  /* modal 内の single-card は max-width 制限なしで全幅使用 */
  .modal-body .single-card {
    max-width: 100%;
  }
  .detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }
  .detail-item.full { grid-column: 1 / -1; }
  .detail-label-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .detail-label { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.05em; white-space: nowrap; }
  .detail-orig { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
  .detail-value { font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .detail-value.empty { color: var(--text-dim); font-style: italic; }
  .detail-item.focus-target {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(88,166,255,0.35);
    animation: focusPulse 0.5s ease;
  }
  @keyframes focusPulse {
    0%   { box-shadow: 0 0 0 0px rgba(88,166,255,0.6); }
    60%  { box-shadow: 0 0 0 6px rgba(88,166,255,0.2); }
    100% { box-shadow: 0 0 0 2px rgba(88,166,255,0.35); }
  }
  mark.hit {
    background: rgba(88,166,255,0.25);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
    font-weight: 600;
  }

  /* ========== ROW NUM ========== */
  td.row-num {
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-align: right;
    min-width: 40px;
  }
  th.row-num-h { color: var(--text-dim) !important; cursor: default !important; }
  tr.clickable-row { cursor: pointer; }
  tr.clickable-row:hover td { background: var(--row-hover) !important; }
  tr.clickable-row:hover td.row-num { color: var(--accent); }

  .error-msg { color: #f85149; font-size: 12px; padding: 8px 16px; }
  body.col-resizing * { cursor: col-resize !important; user-select: none !important; }

  /* ========== 単票モード ========== */
  .app-title {
    cursor: pointer;
    user-select: none;
    transition: color 0.15s, opacity 0.15s;
  }
  .app-title:hover { opacity: 0.75; }
  .app-title.single-mode {
    color: var(--accent2);
  }
  .app-title.single-mode::after {
    content: ' ［単票］';
    font-size: 11px;
    font-weight: 500;
    color: var(--accent2);
    opacity: 0.8;
    letter-spacing: 0.02em;
  }

  /* 単票ビュー全体 */
  .single-view {
    display: none;
    flex-direction: column;
    height: calc(100vh - 120px);
  }
  .single-view.open { display: flex; }

  /* 単票ナビゲーションバー */
  .single-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .single-nav-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .single-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .single-nav-btn:not(:disabled):hover { background: var(--row-hover); border-color: var(--accent); color: var(--accent); }
  .single-nav-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 90px;
    text-align: center;
  }
  .single-nav-counter strong { color: var(--accent2); font-size: 15px; }
  .single-nav-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .single-jump-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .single-jump-input {
    width: 70px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  .single-jump-input:focus { border-color: var(--accent); }
  .single-jump-label { font-size: 11px; color: var(--text-muted); }

  /* 単票本体 */
  .single-body {
    overflow-y: auto;
    flex: 1;
    padding: 16px 24px;
    scrollbar-width: none;

};

// 表示列の順序定義（簡易名称 or '求人数'=合算仮想列）
const DISPLAY_ORDER = [
  '管理No',
  '求人番号',
  '事業所',
  '所在地住所',
  '全体従業員数',
  '資本金',
  '雇用形態',

  '職種',
  '求人数',        // 通勤求人数+住込求人数+不問求人数 の合算仮想列
  '月給',
  '賞与',
  '年間休日',
  '就業市区町村',
  '受付所',
];
// 仮想列「求人数」のソース列（簡易名称）
const KYUJINSU_COLS = ['通勤求人数', '住込求人数', '不問求人数'];
// 仮想列「標準職業分類」のソース列（簡易名称）
const SHOKUGYO_COLS = ['標準職業分類', '標準職業2分類'];

// ========== 状態 ==========
let allRows = [];
let headers = [];         // 元のフィールド名配列
let filteredRows = [];
let visibleCols = new Set();
let sortCol = -1;
let sortDir = 1;
let evalSortMode = false;  // 評価順ソートモード
let currentPage = 1;
let PAGE_SIZE = 50;
let searchQ = '';

// ========== 列幅 (localStorage 永続化) ==========
const COL_WIDTH_KEY = 'kyujin_col_widths';
let colWidths = {};  // { colKey: px数 }
try {
  const saved = localStorage.getItem(COL_WIDTH_KEY);
  if (saved) colWidths = JSON.parse(saved);
} catch(e) { colWidths = {}; }

function saveColWidths() {
  try { localStorage.setItem(COL_WIDTH_KEY, JSON.stringify(colWidths)); } catch(e) {}
}

// colDef から一意キーを返す
function colKey(def) {
  return def.type === 'virtual' ? '__v__' + def.key : '__r__' + def.short;
}

// ========== CSV パーサ ==========
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  let inQuote = false;
  let field = '';
  const fields = [];

  function pushField() {
    fields.push(field);
    field = '';
  }

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    if (li > 0 && !inQuote) { result.push(fields.splice(0)); }
    for (let ci = 0; ci < line.length; ci++) {
      const ch = line[ci];
      if (inQuote) {
        if (ch === '"') {
          if (line[ci+1] === '"') { field += '"'; ci++; }
          else { inQuote = false; }
        } else { field += ch; }
      } else {
        if (ch === '"') { inQuote = true; }
        else if (ch === ',') { pushField(); }
        else { field += ch; }
      }
    }
    if (inQuote) field += '\n';
    else if (li === lines.length - 1) pushField();
  }
  if (fields.length > 0) result.push(fields);
  return result;
}

// ========== ファイル読み込み ==========
const DEFAULT_URL = 'https://soo-hs.github.io/soohs/kyujin/kyujin2026.csv';

async function loadFromPath() {
  const url = document.getElementById('filePath').value.trim();
  if (!url) return setErr('URLを入力してください');
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    return setErr('※ ブラウザのセキュリティ制限により、ローカルパスは読み込めません。「ファイル選択」をご利用ください。');
  }
  await loadFromURL(url);
}

async function loadFromURL(url) {
  setErr('');
  showLoading(url);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    // 文字コード判定：Shift-JIS or UTF-8
    const buf = await res.arrayBuffer();
    let text;
    try {
      text = new TextDecoder('utf-8', { fatal: true }).decode(buf);
    } catch {
      text = new TextDecoder('shift-jis').decode(buf);
    }
    processCSV(text);
  } catch (e) {
    showLoadError(url, e.message);
  }
}

function showLoading(url) {
  document.getElementById('emptyState').style.display = '';
  document.getElementById('mainTable').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('emptyIcon').textContent = '⏳';
  document.getElementById('emptyMsg').textContent = 'CSVを読み込んでいます...';
  document.getElementById('emptySub').textContent = url;
}

function showLoadError(url, msg) {
  document.getElementById('emptyState').style.display = '';
  document.getElementById('mainTable').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('emptyIcon').textContent = '❌';
  document.getElementById('emptyMsg').textContent = '読み込みに失敗しました';
  document.getElementById('emptySub').textContent = msg + ' ／ ' + url;
  setErr('エラー: ' + msg);
}

function loadFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('filePath').value = file.name;
  setErr('');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      processCSV(e.target.result);
    } catch(ex) {
      setErr('読み込みエラー: ' + ex.message);
    }
  };
  // Shift-JIS / UTF-8 自動判定
  reader.readAsText(file, 'UTF-8');
  reader.onerror = () => {
    // 失敗時は Shift-JIS で再試行
    const r2 = new FileReader();
    r2.onload = e => processCSV(e.target.result);
    r2.readAsText(file, 'Shift_JIS');
  };
}

function processCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) { setErr('データが見つかりません'); return; }
  headers = rows[0];
  const kyujinNumIdx = rows[0].findIndex(h => h.trim() === '求人番号');
  allRows = rows.slice(1).filter(r => {
    if (!r.some(c => c && c.trim() && c.trim() !== 'NaN')) return false; // 完全空行を除外
    if (kyujinNumIdx >= 0) {
      const val = r[kyujinNumIdx];
      if (!val || !val.trim() || val.trim() === 'NaN') return false; // 求人番号なしを除外
    }
    return true;
  });

  // 表示列を DISPLAY_ORDER 順に初期化
  // 仮想列のソース実列はvisibleColsに入れない（末尾に流れるのを防ぐ）
  const VIRTUAL_SRC_COLS = new Set([...KYUJINSU_COLS, ...SHOKUGYO_COLS]);
  visibleCols = new Set();
  DISPLAY_ORDER.forEach(short => {
    if (short === '求人数' || short === '標準職業分類') return; // 仮想列はSet管理不要
    const idx = headers.findIndex(h => (FIELD_MAP[h] || h) === short);
    if (idx >= 0) visibleCols.add(idx);
  });
  if (visibleCols.size === 0) headers.forEach((_, i) => visibleCols.add(i));

  sortCol = -1; sortDir = 1; searchQ = ''; currentPage = 1;
  qsJobNum = ''; qsOffice = ''; qsPlace = ''; qsSalary = ''; qsBonus = '';
  document.getElementById('searchInput').value = '';
  ['qsJobNum','qsOffice','qsPlace'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
    const cl = document.getElementById(id + 'Clear');
    if (cl) cl.classList.remove('visible');
  });
  ['qsSalary','qsBonus'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('totalCount').textContent = allRows.length.toLocaleString();
  applyFilter();
  buildColPanel();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mainTable').style.display = '';
  document.getElementById('pagination').style.display = '';
}

// ========== フィルタ / ソート ==========

// クイック検索の状態
let qsJobNum = '';   // 管理番号・求人番号（前方一致）
let qsOffice = '';   // 事業所・事業所カナ（部分一致）
let qsPlace  = '';   // 所在地・就業場所（部分一致）
let qsSalary = '';   // 月給範囲（プルダウン）
let qsBonus  = '';   // 賞与（プルダウン）

// クイック検索対象列の定義
// ※ CSV ロード後、headers から動的に解決する
function resolveQsCols() {
  const jobNumCols   = ['管理番号', '求人番号'];
  const officeCols   = ['事業所名', '事業所名 カナ'];
  const placeCols    = ['住所（所在地）', '就業場所'];

  function idxs(names) {
    return names.map(n => headers.indexOf(n)).filter(i => i >= 0);
  }
  return {
    jobNum: idxs(jobNumCols),
    office: idxs(officeCols),
    place:  idxs(placeCols),
  };
}

function onQsInput(id) {
  const val = document.getElementById(id).value;
  const clearBtn = document.getElementById(id + 'Clear');
  if (id === 'qsJobNum') qsJobNum = val.toLowerCase();
  if (id === 'qsOffice') qsOffice = val.toLowerCase();
  if (id === 'qsPlace')  qsPlace  = val.toLowerCase();
  clearBtn.classList.toggle('visible', val.length > 0);
  currentPage = 1;
  updateClearAllBtn();
  applyFilter();
}

function onQsSelect(id) {
  const val = document.getElementById(id).value;
  if (id === 'qsSalary') qsSalary = val;
  if (id === 'qsBonus')  qsBonus  = val;
  currentPage = 1;
  updateClearAllBtn();
  applyFilter();
}

function clearQs(id) {
  document.getElementById(id).value = '';
  document.getElementById(id + 'Clear').classList.remove('visible');
  if (id === 'qsJobNum') qsJobNum = '';
  if (id === 'qsOffice') qsOffice = '';
  if (id === 'qsPlace')  qsPlace  = '';

}

function updateClearAllBtn() {

                 document.getElementById('searchInput').value;
  document.getElementById('clearAllBtn').classList.toggle('visible', !!active);
}

function clearAllFilters() {
  qsJobNum = ''; qsOffice = ''; qsPlace = ''; qsSalary = ''; qsBonus = '';
  searchQ = '';

  ['qsJobNum','qsOffice','qsPlace'].forEach(id => {

  });

function onSearch() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  currentPage = 1;

function applyFilter() {
  const hitInfo = document.getElementById('searchHitInfo');
  const hitTags = document.getElementById('hitTags');

  // ===== クイック検索フィルタ =====
  const qsCols = resolveQsCols();
  let baseRows = allRows;

  if (qsJobNum) {
    baseRows = baseRows.filter(r =>
      qsCols.jobNum.some(ci => {
        const v = (r[ci] || '').toLowerCase();
        return v.startsWith(qsJobNum);          // 前方一致
      })
    );
  }
  if (qsOffice) {
    baseRows = baseRows.filter(r =>
      qsCols.office.some(ci => {
        const v = (r[ci] || '').toLowerCase();
        return v.includes(qsOffice);            // 部分一致
      })
    );
  }
  if (qsPlace) {
    baseRows = baseRows.filter(r =>
      qsCols.place.some(ci => {
        const v = (r[ci] || '').toLowerCase();
        return v.includes(qsPlace);             // 部分一致
      })
    );
  }

  // ===== 月給フィルタ =====
  if (qsSalary) {
    const salaryColIdx = headers.findIndex(h => h === '月給（基本給+手当+残業代）');
    if (salaryColIdx >= 0) {
      const [minStr, maxStr] = qsSalary.split('-');
      const minVal = parseInt(minStr, 10);
      const maxVal = maxStr === '' ? Infinity : parseInt(maxStr, 10);
      baseRows = baseRows.filter(r => {
        const raw = (r[salaryColIdx] || '').replace(/[,，\s]/g, '');
        const num = parseInt(raw, 10);
        if (isNaN(num)) return false;
        return num >= minVal && num <= maxVal;
      });
    }
  }

  // ===== 賞与フィルタ =====
  if (qsBonus) {
    const bonusColIdx = headers.findIndex(h => h === '賞与有無（新卒）');
    if (bonusColIdx >= 0) {
      baseRows = baseRows.filter(r => {
        const v = (r[bonusColIdx] || '').trim();
        if (qsBonus === 'あり') return v === 'あり' || v === '有' || v === '可';
        if (qsBonus === 'なし') return v === 'なし' || v === '無' || v === '不可' || v === '';
        return true;
      });
    }
  }

  if (searchQ) {
    // ヒット列カウント集計
    const colHitCount = new Array(headers.length).fill(0);
    filteredRows = baseRows.filter(r => {
      let hit = false;
      r.forEach((c, ci) => {
        if (c && c.toLowerCase().includes(searchQ)) {
          colHitCount[ci]++;
          hit = true;
        }
      });
      return hit;
    });

    // ヒットした列を件数降順でソート
    const hitCols = colHitCount
      .map((cnt, ci) => ({ ci, cnt, short: FIELD_MAP[headers[ci]] || headers[ci] }))
      .filter(x => x.cnt > 0)
      .sort((a, b) => b.cnt - a.cnt);

    // タグ生成
    hitInfo.classList.add('visible');
    if (hitCols.length === 0) {
      hitTags.innerHTML = '<span class="hit-tag no-match">一致なし</span>';
    } else {
      hitTags.innerHTML = hitCols.map(x =>
        `<span class="hit-tag" data-colci="${x.ci}" onclick="openDetailByCol(${x.ci})" title="${x.short}列のヒット件を表示" style="cursor:pointer;">${x.short}<span class="hit-count">${x.cnt}</span></span>`
      ).join('');
    }
  } else {
    filteredRows = baseRows.slice();
    hitInfo.classList.remove('visible');
    hitTags.innerHTML = '';
  }

  if (evalSortMode) {
    // 評価スコアで降順ソート
    const scored = calcEvalScores(filteredRows);
    scored.sort((a, b) => b.score - a.score);
    filteredRows = scored.map(s => s.row);
  } else if (sortCol >= 0) {
    filteredRows.sort((a, b) => {
      const av = a[sortCol] || '', bv = b[sortCol] || '';
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return av.localeCompare(bv, 'ja') * sortDir;
    });
  }
  renderTable();
  renderPagination();
}

// ========== 評価ソート ==========
// 重み設定
const EVAL_WEIGHTS = {
  salary:   0.35,   // 月給（基本給+手当+残業代）
  holiday:  0.30,   // 年間休日数
  bonus:    0.15,   // 賞与有無（新卒）：あり=1, なし=0
  capital:  0.10,   // 資本金
  staff:    0.10,   // 従業員数（企業全体）
};

function calcEvalScores(rows) {
  const hi = k => headers.findIndex(h => h === k);
  const idxSalary  = hi('月給（基本給+手当+残業代）');
  const idxHoliday = hi('年間休日数');
  const idxBonus   = hi('賞与有無（新卒）');
  const idxCapital = hi('資本金');
  const idxStaff   = hi('従業員数（企業全体）');

  function parseNum(row, idx) {
    if (idx < 0) return NaN;
    const v = (row[idx] || '').replace(/[,，\s]/g, '');
    return parseFloat(v);
  }

  // 各指標の有効値リストからmin/maxを取得（正規化用）
  function minMax(idx) {
    const vals = rows.map(r => parseNum(r, idx)).filter(v => !isNaN(v) && v > 0);
    if (vals.length === 0) return { min: 0, max: 1 };
    return { min: Math.min(...vals), max: Math.max(...vals) };
  }

  const mmSalary  = minMax(idxSalary);
  const mmHoliday = minMax(idxHoliday);
  const mmCapital = minMax(idxCapital);
  const mmStaff   = minMax(idxStaff);

  function norm(val, mm) {
    if (isNaN(val) || val <= 0) return 0;
    if (mm.max === mm.min) return 1;
    return (val - mm.min) / (mm.max - mm.min);
  }

  return rows.map(row => {
    const salary  = norm(parseNum(row, idxSalary),  mmSalary);
    const holiday = norm(parseNum(row, idxHoliday), mmHoliday);
    const capital = norm(parseNum(row, idxCapital), mmCapital);
    const staff   = norm(parseNum(row, idxStaff),   mmStaff);
    const bonusV  = (row[idxBonus] || '').trim();
    const bonus   = (bonusV === 'あり' || bonusV === '有' || bonusV === '可') ? 1 : 0;

    const score =
      salary  * EVAL_WEIGHTS.salary  +
      holiday * EVAL_WEIGHTS.holiday +
      bonus   * EVAL_WEIGHTS.bonus   +
      capital * EVAL_WEIGHTS.capital +
      staff   * EVAL_WEIGHTS.staff;

    return { row, score };
  });
}

function toggleEvalSort() {
  evalSortMode = !evalSortMode;
  const btn = document.getElementById('evalBtn');
  if (evalSortMode) {
    btn.classList.add('active');
    btn.textContent = '⭐ 評価中';
    // 列ソートをリセット
    sortCol = -1; sortDir = 1;
  } else {
    btn.classList.remove('active');
    btn.textContent = '⭐ 評価';
  }
  applyFilter();
}

function sortBy(colIdx) {
  // 列ヘッダーソート時は評価モードを解除
  if (evalSortMode) {
    evalSortMode = false;
    const btn = document.getElementById('evalBtn');
    if (btn) { btn.classList.remove('active'); btn.textContent = '⭐ 評価'; }
  }
  if (sortCol === colIdx) sortDir = -sortDir;
  else { sortCol = colIdx; sortDir = 1; }
  applyFilter();
}

// ========== テーブル描画 ==========
// 表示列定義を DISPLAY_ORDER 順に構築して返す
// 戻り値: [{type:'real', ci, short, orig} | {type:'virtual', key, short, srcIdx:[...]}]
function buildVisColDefs() {
  const defs = [];
  DISPLAY_ORDER.forEach(short => {
    if (short === '求人数') {
      const src = KYUJINSU_COLS.map(s => headers.findIndex(h => (FIELD_MAP[h]||h) === s));
      if (src.some(i => i >= 0)) defs.push({ type:'virtual', key:'求人数', short:'求人数', srcIdx:src });
    } else if (short === '標準職業分類') {
      const src = SHOKUGYO_COLS.map(s => headers.findIndex(h => (FIELD_MAP[h]||h) === s));
      if (src.some(i => i >= 0)) defs.push({ type:'virtual', key:'標準職業分類', short:'標準職業分類', srcIdx:src });
    } else {
      const ci = headers.findIndex(h => (FIELD_MAP[h]||h) === short);
      if (ci >= 0 && visibleCols.has(ci)) defs.push({ type:'real', ci, short, orig: headers[ci] });
    }
  });
  // DISPLAY_ORDER 外で visibleCols にある列を末尾に追加（仮想列ソースは除外）
  const virtualSrcSet = new Set([...KYUJINSU_COLS, ...SHOKUGYO_COLS]
    .map(s => headers.findIndex(h => (FIELD_MAP[h]||h) === s)).filter(i => i >= 0));
  const orderedCi = new Set(defs.filter(d=>d.type==='real').map(d=>d.ci));
  [...visibleCols].sort((a,b)=>a-b).forEach(ci => {
    if (!orderedCi.has(ci) && !virtualSrcSet.has(ci)) {
      const orig = headers[ci]||'';
      defs.push({ type:'real', ci, short: FIELD_MAP[orig]||orig, orig });
    }
  });
  return defs;
}

function renderTable() {
  const colDefs = buildVisColDefs();
  document.getElementById('visibleColCount').textContent = colDefs.length;

  // ヘッダ
  const thead = document.getElementById('tableHead');
  let thHtml = '<tr><th class="row-num-h">#</th>';
  colDefs.forEach((def, idx) => {
    const ck = colKey(def);
    const wStyle = colWidths[ck] ? ` style="width:${colWidths[ck]}px;min-width:${colWidths[ck]}px;max-width:${colWidths[ck]}px;"` : '';
    if (def.type === 'virtual') {
      if (def.key === '求人数') {
        thHtml += `<th data-colidx="${idx}" title="通勤求人数＋住込求人数＋不問求人数"${wStyle}>求人数 <span class="sort-icon">-</span><span class="col-resizer" onmousedown="startResize(event,${idx})"></span></th>`;
      } else if (def.key === '標準職業分類') {
        thHtml += `<th data-colidx="${idx}" title="標準職業分類／標準職業2分類"${wStyle}>標準職業分類 <span class="sort-icon">-</span><span class="col-resizer" onmousedown="startResize(event,${idx})"></span></th>`;
      }
    } else {
      const sortIcon = sortCol === def.ci ? (sortDir === 1 ? '▲' : '▼') : '⇅';
      const sortClass = sortCol === def.ci ? (sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
      thHtml += `<th data-colidx="${idx}" class="${sortClass}" onclick="sortBy(${def.ci})" title="${def.orig}"${wStyle}>${def.short} <span class="sort-icon">${sortIcon}</span><span class="col-resizer" onmousedown="startResize(event,${idx})"></span></th>`;
    }
  });
  thHtml += '</tr>';
  thead.innerHTML = thHtml;

  // ボディ
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = filteredRows.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');
  let tbHtml = '';
  pageRows.forEach((row, ri) => {
    const globalIdx = start + ri;
    tbHtml += `<tr class="clickable-row" ondblclick="openDetailFromRow(event,${globalIdx})" ontouchend="handleRowTouch(event,${globalIdx})" title="ダブルタップ／ダブルクリックで詳細表示">`;
    tbHtml += `<td class="row-num">${start + ri + 1}</td>`;
    colDefs.forEach(def => {
      if (def.type === 'virtual') {
        if (def.key === '求人数') {
          const total = def.srcIdx.reduce((sum, ci) => {
            if (ci < 0) return sum;
            const n = parseInt(row[ci], 10);
            return sum + (isNaN(n) ? 0 : n);
          }, 0);
          tbHtml += `<td class="num">${total}</td>`;
        } else if (def.key === '標準職業分類') {
          const parts = def.srcIdx
            .map(ci => (ci >= 0 && row[ci] && row[ci].trim() && row[ci].trim() !== 'NaN') ? row[ci].trim() : '')
            .filter(v => v);
          const combined = parts.join(' / ');
          const dispVal = combined.length > 50 ? combined.slice(0, 50) + '\u2026' : combined;
          tbHtml += `<td title="${combined.replace(/"/g,'&quot;')}">${escH(dispVal)}</td>`;
        }
      } else {
        const raw = row[def.ci] !== undefined ? row[def.ci] : '';
        const val = (raw.trim() === 'NaN' || raw.trim() === 'nan') ? '' : raw;
        const cleanVal = val.replace(/\\r\\n/g, ' ').replace(/\r\n|\r|\n/g, ' ');
        // 月給・基本給はカンマ区切り表示
        const COMMA_COLS = new Set(['基本給', '月給（基本給+手当+残業代）']);
        let dispVal;
        if (COMMA_COLS.has(def.orig) && /^\d+(\.\d+)?$/.test(val.trim())) {
          const num = parseInt(val.trim(), 10);
          dispVal = isNaN(num) ? cleanVal : num.toLocaleString('ja-JP');
        } else {
          dispVal = cleanVal.length > 50 ? cleanVal.slice(0,50) + '\u2026' : cleanVal;
        }
        let tdClass = '';
        if (/^[\d,.]+$/.test(val.trim()) && val.trim() !== '') tdClass = 'num';
        else if (val === '可' || val === 'あり' || val === '有') tdClass = 'bool-yes';
        else if (val === '不可' || val === 'なし' || val === '無') tdClass = 'bool-no';
        tbHtml += `<td class="${tdClass}" title="${val.replace(/"/g,'&quot;')}">${escH(dispVal)}</td>`;
      }
    });
    tbHtml += '</tr>';
  });
  tbody.innerHTML = tbHtml;

  // ページ情報
  const total = filteredRows.length;
  const end = Math.min(start + PAGE_SIZE, total);
  document.getElementById('pageInfo').textContent = `${start+1}\u2013${end} / ${total.toLocaleString()} 件`;
}


// ========== 列リサイズ ==========
let _resizeDef = null;
let _resizeStartX = 0;
let _resizeStartW = 0;
let _resizeColDefs = null;

function startResize(e, colIdx) {
  e.stopPropagation();
  e.preventDefault();
  _resizeColDefs = buildVisColDefs();
  _resizeDef = _resizeColDefs[colIdx];
  const th = document.querySelector(`#tableHead th[data-colidx="${colIdx}"]`);
  _resizeStartX = e.clientX;
  _resizeStartW = th ? th.offsetWidth : 120;
  document.body.classList.add('col-resizing');
  document.getElementById('mainTable').classList.add('resizing');
  const resizer = th ? th.querySelector('.col-resizer') : null;
  if (resizer) resizer.classList.add('dragging');

  function onMove(ev) {
    if (!_resizeDef) return;
    const dx = ev.clientX - _resizeStartX;
    const newW = Math.max(40, _resizeStartW + dx);
    const ck = colKey(_resizeDef);
    colWidths[ck] = newW;
    // その列のthにインラインスタイルを即時反映
    if (th) {
      th.style.width = newW + 'px';
      th.style.minWidth = newW + 'px';
      th.style.maxWidth = newW + 'px';
    }
    // 各行の対応するtdも幅を合わせる
    const tds = document.querySelectorAll(`#tableBody tr td:nth-child(${colIdx + 2})`);
    tds.forEach(td => { td.style.maxWidth = newW + 'px'; td.style.minWidth = newW + 'px'; td.style.width = newW + 'px'; });
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.classList.remove('col-resizing');
    document.getElementById('mainTable').classList.remove('resizing');
    if (resizer) resizer.classList.remove('dragging');
    saveColWidths();
    _resizeDef = null;
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ========== 件/ページ切替 ==========
function changePageSize(val) {
  PAGE_SIZE = parseInt(val, 10);
  currentPage = 1;
  renderTable();
  renderPagination();
}

// ========== ページネーション ==========
function renderPagination() {
  const total = filteredRows.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');

  // ツールバーのページ送りUI更新
  const tbPrev = document.getElementById('tbPrevBtn');
  const tbNext = document.getElementById('tbNextBtn');
  const tbInfo = document.getElementById('tbPageInfo');
  if (tbPrev) tbPrev.disabled = (currentPage <= 1);
  if (tbNext) tbNext.disabled = (currentPage >= totalPages || totalPages === 0);
  if (tbInfo) tbInfo.textContent = totalPages > 0 ? `${currentPage} / ${totalPages}` : '-';

  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  html += `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  const pages = buildPageRange(currentPage, totalPages);
  pages.forEach(p => {
    if (p === '...') html += `<span class="pg-sep">…</span>`;
    else html += `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });

  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function buildPageRange(cur, total) {
  const pages = [];
  if (total <= 7) { for(let i=1;i<=total;i++) pages.push(i); return pages; }
  pages.push(1);
  if (cur > 3) pages.push('...');
  for (let i = Math.max(2,cur-1); i <= Math.min(total-1,cur+1); i++) pages.push(i);
  if (cur < total-2) pages.push('...');
  pages.push(total);
  return pages;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  renderPagination();
  document.getElementById('tableWrap').scrollTop = 0;
}

// ========== 列パネル ==========
function buildColPanel() {
  const list = document.getElementById('colList');
  let html = '';
  headers.forEach((orig, i) => {
    const short = FIELD_MAP[orig] || orig;
    const checked = visibleCols.has(i) ? 'checked' : '';
    html += `<label class="col-item">
      <input type="checkbox" ${checked} onchange="toggleCol(${i}, this.checked)">
      <div class="col-item-names">
        <span class="col-item-short">${short}</span>
        <span class="col-item-orig">${orig}</span>
      </div>
    </label>`;
  });
  list.innerHTML = html;
}

function toggleCol(idx, show) {
  if (show) visibleCols.add(idx);
  else visibleCols.delete(idx);
  currentPage = 1;
  renderTable();
  renderPagination();
  document.getElementById('visibleColCount').textContent = visibleCols.size;
}

function selectAllCols(show) {
  if (show) headers.forEach((_,i) => visibleCols.add(i));
  else visibleCols.clear();
  buildColPanel();
  currentPage = 1;
  renderTable();
  renderPagination();
  document.getElementById('visibleColCount').textContent = visibleCols.size;
}

function openColPanel() {
  document.getElementById('colPanelOverlay').classList.add('open');
}
function closeColPanel(e) {
  if (!e || e.target === document.getElementById('colPanelOverlay')) {
    document.getElementById('colPanelOverlay').classList.remove('open');
  }
}

// ========== タッチ：ダブルタップで詳細表示（スマホ対応） ==========
let _lastTouchTime = 0;
let _lastTouchIdx  = -1;
function handleRowTouch(event, globalIdx) {
  const now = Date.now();
  if (now - _lastTouchTime < 400 && _lastTouchIdx === globalIdx) {
    event.preventDefault();
    openDetailFromRow(event, globalIdx);
    _lastTouchTime = 0;
    _lastTouchIdx  = -1;
  } else {
    _lastTouchTime = now;
    _lastTouchIdx  = globalIdx;
  }
}

// ========== 詳細モーダル ==========
// テーブル行のダブルクリック：クリックされたtdの列からfocusColIdxを解決してopenDetailへ渡す
function openDetailFromRow(event, globalIdx) {
  const td = event.target.closest('td');
  let focusColIdx;
  if (td) {
    const tr = td.closest('tr');
    const tdIndex = Array.from(tr.children).indexOf(td) - 1; // #列を除くオフセット
    if (tdIndex >= 0) {
      const colDefs = buildVisColDefs();
      const def = colDefs[tdIndex];
      if (def && def.type !== 'virtual') focusColIdx = def.ci;
    }
  }
  openDetail(globalIdx, focusColIdx);
}

// focusColIdx: 開いた後スクロール＆ハイライトする列インデックス（省略可）
function openDetail(globalIdx, focusColIdx) {
  const row = filteredRows[globalIdx];
  if (!row) return;

  const jobNum = row[headers.indexOf('求人番号')] || '';
  const company = row[headers.indexOf('事業所名')] || '';
  document.getElementById('modalTitle').textContent = `${company || '求人詳細'} ／ ${jobNum}`;

  const grid = document.getElementById('detailGrid');
  const longFields = new Set(['事業内容','会社の特長','仕事の内容','必要な知識・技能等','補足事項','特記事項','休日等']);

  // 検索語ハイライト用
  function highlightVal(text) {
    if (!searchQ || !text) return escH(text);
    const escaped = escH(text);
    const re = new RegExp(searchQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    return escaped.replace(re, m => `<mark class="hit">${m}</mark>`);
  }

  const MODAL_HIDDEN_FIELDS = new Set(['求人年度']);
  let html = '<div class="single-card">';
  headers.forEach((orig, i) => {
    if (MODAL_HIDDEN_FIELDS.has(orig)) return;
    const short = FIELD_MAP[orig] || orig;
    const val = row[i] !== undefined ? row[i] : '';
    const clean = val.replace(/\\r\\n/g, '\n');
    const isEmpty = !clean || clean.trim() === '' || clean === 'NaN' || clean === 'nan';
    const isLong = longFields.has(orig) || clean.length > 60;
    html += `<div class="detail-item ${isLong ? 'full' : ''}" data-ci="${i}">
      <div class="detail-label-row"><div class="detail-label">${short}</div><div class="detail-orig">${orig}</div></div>
      <div class="detail-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '（なし）' : highlightVal(clean)}</div>
    </div>`;
  });
  html += '</div>';
  grid.innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');

  // フォーカス列へスクロール
  if (focusColIdx !== undefined) {
    requestAnimationFrame(() => {
      const target = grid.querySelector(`[data-ci="${focusColIdx}"]`);
      if (target) {
        target.classList.add('focus-target');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  }
}

// ヒットタグクリック：その列でヒットした最初の行を開いてその列へジャンプ
function openDetailByCol(colIdx) {
  const firstHitIdx = filteredRows.findIndex(r => {
    const c = r[colIdx];
    return c && c.toLowerCase().includes(searchQ);
  });
  if (firstHitIdx < 0) return;
  openDetail(firstHitIdx, colIdx);
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ========== エラー ==========
function setErr(msg) {
  document.getElementById('errMsg').textContent = msg;
}

// ========== 起動時：URL から自動読み込み ==========
window.addEventListener('load', () => {
  loadFromURL(DEFAULT_URL);
});

// ========== 単票ビュー ==========
let singleMode = false;
let singleIdx  = 0;   // filteredRows 内のインデックス

function toggleSingleView() {
  if (allRows.length === 0) return; // データ未ロード時は何もしない
  singleMode = !singleMode;
  document.getElementById('appTitle').classList.toggle('single-mode', singleMode);

  const mainContent  = document.querySelector('.main-content');
  const toolbar      = document.querySelector('.toolbar');
  const singleView   = document.getElementById('singleView');
  const pagination   = document.getElementById('pagination');

  if (singleMode) {
    mainContent.style.display  = 'none';
    toolbar.style.display      = 'none';
    pagination.style.display   = 'none';
    singleView.classList.add('open');
    singleIdx = 0;
    renderSingle();
  } else {
    mainContent.style.display  = '';
    toolbar.style.display      = '';
    pagination.style.display   = '';
    singleView.classList.remove('open');
  }
}

function renderSingle() {
  if (filteredRows.length === 0) {
    document.getElementById('singleBody').innerHTML =
      '<div class="single-empty-notice">表示できるデータがありません</div>';
    document.getElementById('singleCounter').innerHTML = '0 / 0';
    document.getElementById('singleNavTitle').textContent = '';
    document.getElementById('singlePrevBtn').disabled = true;
    document.getElementById('singleNextBtn').disabled = true;
    return;
  }

  const row     = filteredRows[singleIdx];
  const total   = filteredRows.length;
  const jobNum  = row[headers.indexOf('求人番号')]  || '';
  const company = row[headers.indexOf('事業所名')]  || '';

  // カウンター・タイトル更新
  document.getElementById('singleCounter').innerHTML =
    `<strong>${singleIdx + 1}</strong> / ${total.toLocaleString()}`;
  document.getElementById('singleNavTitle').textContent =
    `${company}　${jobNum}`;

  // ナビボタン有効／無効
  document.getElementById('singlePrevBtn').disabled = (singleIdx === 0);
  document.getElementById('singleNextBtn').disabled = (singleIdx === total - 1);

  // jump input
  document.getElementById('singleJump').value = singleIdx + 1;

  // カード描画（detailGridと同じ構造を流用）
  const longFields = new Set(['事業内容','会社の特長','仕事の内容','必要な知識・技能等','補足事項','特記事項','休日等']);
  const SINGLE_HIDDEN_FIELDS = new Set(['求人年度']);
  let html = '<div class="single-card">';
  headers.forEach((orig, i) => {
    if (SINGLE_HIDDEN_FIELDS.has(orig)) return;
    const short   = FIELD_MAP[orig] || orig;
    const val     = row[i] !== undefined ? row[i] : '';
    const clean   = val.replace(/\\r\\n/g, '\n');
    const isEmpty = !clean || clean.trim() === '' || clean === 'NaN' || clean === 'nan';
    const isLong  = longFields.has(orig) || clean.length > 60;
    html += `<div class="detail-item ${isLong ? 'full' : ''}">
      <div class="detail-label-row"><div class="detail-label">${short}</div><div class="detail-orig">${orig}</div></div>
      <div class="detail-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '（なし）' : escH(clean)}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('singleBody').innerHTML = html;
  document.getElementById('singleBody').scrollTop = 0;
}

function singleGo(delta) {
  const next = singleIdx + delta;
  if (next < 0 || next >= filteredRows.length) return;
  singleIdx = next;
  renderSingle();
}

function singleJumpTo() {
  const val = parseInt(document.getElementById('singleJump').value, 10);
  if (isNaN(val)) return;
  const idx = Math.max(0, Math.min(filteredRows.length - 1, val - 1));
  singleIdx = idx;
  renderSingle();
}


document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeColPanel();
    if (singleMode) toggleSingleView();
  }
  // 単票モード中：左右矢印キーでナビ
  if (singleMode && !e.target.matches('input')) {
    if (e.key === 'ArrowLeft')  singleGo(-1);
    if (e.key === 'ArrowRight') singleGo(1);
  }
});
</script>
</body>
