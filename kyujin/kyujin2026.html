<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求人一覧ビューア</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #d29922;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --tag-bg: #1f2937;
    --row-hover: #1e2a3a;
    --header-bg: #13181e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* ========== HEADER ========== */
  .app-header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .file-zone {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 500px;
  }
  .file-path-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .file-path-input:focus { border-color: var(--accent); }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn:hover { opacity: 0.85; }

  label.btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .stats-bar {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1.2;
  }
  .stat-label { font-size: 10px; color: var(--text-muted); }
  .stat-value { font-size: 14px; font-weight: 700; color: var(--accent2); font-family: 'IBM Plex Mono', monospace; }

  /* ========== TOOLBAR ========== */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px;
    flex: 0 0 260px;
  }
  .search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 6px 0;
    width: 100%;
  }
  .search-icon { color: var(--text-muted); font-size: 14px; }

  .col-toggle-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .col-toggle-btn:hover { border-color: var(--accent); }

  .page-info {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ========== COLUMN PANEL ========== */
  .col-panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
  }
  .col-panel-overlay.open { display: block; }
  .col-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .col-panel-overlay.open .col-panel { transform: translateX(0); }
  .col-panel-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }
  .col-panel-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
  .col-panel-actions {
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .col-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  .col-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .col-item:hover { background: var(--surface2); }
  .col-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
  .col-item-names { display: flex; flex-direction: column; line-height: 1.3; }
  .col-item-short { font-weight: 500; font-size: 13px; }
  .col-item-orig { font-size: 11px; color: var(--text-muted); }

  /* ========== TABLE ========== */
  .table-wrap {
    overflow: auto;
    flex: 1;
  }
  .main-content {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
  }
  table {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
  }
  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  th {
    background: var(--header-bg);
    border-bottom: 2px solid var(--accent);
    border-right: 1px solid var(--border);
    padding: 9px 12px;
    text-align: left;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.03em;
  }
  th:hover { background: var(--surface); }
  th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 10px; }
  th.sort-asc .sort-icon, th.sort-desc .sort-icon { opacity: 1; color: var(--accent2); }

  td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 7px 12px;
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    vertical-align: middle;
    font-size: 12px;
  }
  tr:hover td { background: var(--row-hover); }
  tr:nth-child(even) td { background: var(--surface2); }
  tr:nth-child(even):hover td { background: var(--row-hover); }

  td.num { text-align: right; font-family: 'IBM Plex Mono', monospace; color: var(--accent2); }
  td.bool-yes { color: var(--accent2); font-weight: 500; }
  td.bool-no { color: var(--text-muted); }

  /* ========== EMPTY / LOADING STATE ========== */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .state-box .icon { font-size: 48px; opacity: 0.4; }
  .state-box .msg { font-size: 16px; }
  .state-box .sub { font-size: 12px; color: var(--text-dim); }

  /* ========== PAGINATION ========== */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .pg-btn {
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .pg-btn:disabled { opacity: 0.3; cursor: default; }
  .pg-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .pg-btn:not(:disabled):hover:not(.active) { border-color: var(--accent); }
  .pg-sep { color: var(--text-dim); padding: 0 4px; }

  /* ========== DETAIL MODAL ========== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 760px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-title { font-weight: 700; font-size: 15px; color: var(--accent); }
  .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; line-height: 1; }
  .modal-body { overflow-y: auto; padding: 16px 20px; }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }
  .detail-item.full { grid-column: 1 / -1; }
  .detail-label { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 3px; }
  .detail-orig { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .detail-value { font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .detail-value.empty { color: var(--text-dim); font-style: italic; }

  /* ========== ROW NUM ========== */
  td.row-num {
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-align: right;
    min-width: 40px;
    cursor: pointer;
  }
  td.row-num:hover { color: var(--accent); }
  th.row-num-h { color: var(--text-dim) !important; cursor: default !important; }

  .error-msg { color: #f85149; font-size: 12px; padding: 8px 16px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <span class="app-title">📋 求人一覧ビューア</span>
  <div class="file-zone">
    <input class="file-path-input" id="filePath" type="text"
      value="https://soo-hs.github.io/soohs/kyujin/kyujin.csv"
      placeholder="CSVのURLまたはファイルパスを入力...">
    <button class="btn btn-primary" onclick="loadFromPath()">再読込</button>
    <label class="btn btn-secondary">
      📂 ファイル選択
      <input type="file" id="fileInput" accept=".csv" style="display:none" onchange="loadFromFile(this)">
    </label>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-label">総件数</span>
      <span class="stat-value" id="totalCount">-</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">表示列数</span>

</div>

<!-- TOOLBAR -->
<div class="toolbar">

    <span class="search-icon">🔍</span>

  </div>

  <div id="errMsg" class="error-msg"></div>

</div>

<!-- MAIN -->
<div class="main-content">

    <table id="mainTable" style="display:none">

      <tbody id="tableBody"></tbody>

  </div>

</div>

<!-- COLUMN PANEL -->
<div class="col-panel-overlay" id="colPanelOverlay" onclick="closeColPanel(event)">
  <div class="col-panel">
    <div class="col-panel-header">
      <span>列の表示設定</span>
      <button class="col-panel-close" onclick="closeColPanel()">×</button>
    </div>
    <div class="col-panel-actions">
      <button class="btn btn-secondary" onclick="selectAllCols(true)">すべて表示</button>
      <button class="btn btn-secondary" onclick="selectAllCols(false)">すべて非表示</button>
    </div>
    <div class="col-list" id="colList"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">求人詳細</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="detailGrid"></div>
    </div>
  </div>
</div>

// デフォルト表示列（簡易名称）
const DEFAULT_VISIBLE = new Set([
  '求人番号', '事業所', '雇用形態', '職種', '所在地住所',
  '基本給', '月給', '賞与', '年間休日', '募集人数',

// ========== 状態 ==========
let allRows = [];
let headers = [];         // 元のフィールド名配列
let filteredRows = [];
let visibleCols = new Set();
let sortCol = -1;
let sortDir = 1;
let currentPage = 1;
const PAGE_SIZE = 50;
let searchQ = '';

// ========== CSV パーサ ==========
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  let inQuote = false;
  let field = '';
  const fields = [];

  function pushField() {
    fields.push(field);
    field = '';
  }

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    if (li > 0 && !inQuote) { result.push(fields.splice(0)); }
    for (let ci = 0; ci < line.length; ci++) {
      const ch = line[ci];
      if (inQuote) {
        if (ch === '"') {
          if (line[ci+1] === '"') { field += '"'; ci++; }
          else { inQuote = false; }
        } else { field += ch; }
      } else {
        if (ch === '"') { inQuote = true; }
        else if (ch === ',') { pushField(); }
        else { field += ch; }
      }
    }
    if (inQuote) field += '\n';
    else if (li === lines.length - 1) pushField();
  }
  if (fields.length > 0) result.push(fields);
  return result;
}

// ========== ファイル読み込み ==========
const DEFAULT_URL = 'https://soo-hs.github.io/soohs/kyujin/kyujin.csv';

async function loadFromPath() {
  const url = document.getElementById('filePath').value.trim();
  if (!url) return setErr('URLを入力してください');
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    return setErr('※ ブラウザのセキュリティ制限により、ローカルパスは読み込めません。「ファイル選択」をご利用ください。');
  }
  await loadFromURL(url);
}

async function loadFromURL(url) {
  setErr('');
  showLoading(url);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    // 文字コード判定：Shift-JIS or UTF-8
    const buf = await res.arrayBuffer();
    let text;
    try {
      text = new TextDecoder('utf-8', { fatal: true }).decode(buf);
    } catch {
      text = new TextDecoder('shift-jis').decode(buf);
    }
    processCSV(text);
  } catch (e) {
    showLoadError(url, e.message);
  }
}

function showLoading(url) {
  document.getElementById('emptyState').style.display = '';
  document.getElementById('mainTable').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('emptyIcon').textContent = '⏳';
  document.getElementById('emptyMsg').textContent = 'CSVを読み込んでいます...';
  document.getElementById('emptySub').textContent = url;
}

function showLoadError(url, msg) {
  document.getElementById('emptyState').style.display = '';
  document.getElementById('mainTable').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('emptyIcon').textContent = '❌';
  document.getElementById('emptyMsg').textContent = '読み込みに失敗しました';
  document.getElementById('emptySub').textContent = msg + ' ／ ' + url;
  setErr('エラー: ' + msg);
}

function loadFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('filePath').value = file.name;
  setErr('');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      processCSV(e.target.result);
    } catch(ex) {
      setErr('読み込みエラー: ' + ex.message);
    }
  };
  // Shift-JIS / UTF-8 自動判定
  reader.readAsText(file, 'UTF-8');
  reader.onerror = () => {
    // 失敗時は Shift-JIS で再試行
    const r2 = new FileReader();
    r2.onload = e => processCSV(e.target.result);
    r2.readAsText(file, 'Shift_JIS');
  };
}

function processCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) { setErr('データが見つかりません'); return; }
  headers = rows[0];
  allRows = rows.slice(1).filter(r => r.some(c => c && c.trim()));

  // デフォルト表示列初期化
  visibleCols = new Set();
  headers.forEach((h, i) => {
    const short = FIELD_MAP[h] || h;
    if (DEFAULT_VISIBLE.has(short) || DEFAULT_VISIBLE.has(h)) visibleCols.add(i);
  });
  if (visibleCols.size === 0) {
    // 全列表示
    headers.forEach((_, i) => visibleCols.add(i));
  }

  sortCol = -1; sortDir = 1; searchQ = ''; currentPage = 1;
  document.getElementById('searchInput').value = '';
  document.getElementById('totalCount').textContent = allRows.length.toLocaleString();
  applyFilter();
  buildColPanel();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mainTable').style.display = '';
  document.getElementById('pagination').style.display = '';
}

// ========== フィルタ / ソート ==========
function onSearch() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  if (searchQ) {
    filteredRows = allRows.filter(r => r.some(c => c && c.toLowerCase().includes(searchQ)));
  } else {
    filteredRows = allRows.slice();
  }
  if (sortCol >= 0) {
    filteredRows.sort((a, b) => {
      const av = a[sortCol] || '', bv = b[sortCol] || '';
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return av.localeCompare(bv, 'ja') * sortDir;
    });
  }
  renderTable();
  renderPagination();
}

function sortBy(colIdx) {
  if (sortCol === colIdx) sortDir = -sortDir;
  else { sortCol = colIdx; sortDir = 1; }
  applyFilter();
}

// ========== テーブル描画 ==========
function renderTable() {
  const visCols = [...visibleCols].sort((a,b)=>a-b);
  document.getElementById('visibleColCount').textContent = visCols.length;

  // ヘッダ
  const thead = document.getElementById('tableHead');
  let thHtml = '<tr><th class="row-num-h">#</th>';
  visCols.forEach(ci => {
    const orig = headers[ci] || '';
    const short = FIELD_MAP[orig] || orig;
    const sortIcon = sortCol === ci ? (sortDir === 1 ? '▲' : '▼') : '⇅';
    const sortClass = sortCol === ci ? (sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
    thHtml += `<th class="${sortClass}" onclick="sortBy(${ci})" title="${orig}">${short} <span class="sort-icon">${sortIcon}</span></th>`;
  });
  thHtml += '</tr>';
  thead.innerHTML = thHtml;

  // ボディ
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = filteredRows.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');
  let tbHtml = '';
  pageRows.forEach((row, ri) => {
    const globalIdx = start + ri;
    tbHtml += `<tr>`;
    tbHtml += `<td class="row-num" onclick="openDetail(${globalIdx})" title="詳細を表示">${start + ri + 1}</td>`;
    visCols.forEach(ci => {
      const val = row[ci] !== undefined ? row[ci] : '';
      const cleanVal = val.replace(/\\r\\n/g, ' ').replace(/\r\n|\r|\n/g, ' ');
      const dispVal = cleanVal.length > 50 ? cleanVal.slice(0,50) + '…' : cleanVal;
      const numVal = parseFloat(val);
      let tdClass = '';
      if (!isNaN(numVal) && val.trim() !== '' && /^[\d,\.]+$/.test(val.trim())) tdClass = 'num';
      else if (val === '可' || val === 'あり' || val === '有') tdClass = 'bool-yes';
      else if (val === '不可' || val === 'なし' || val === '無') tdClass = 'bool-no';
      tbHtml += `<td class="${tdClass}" title="${val.replace(/"/g,'&quot;')}">${escH(dispVal)}</td>`;
    });
    tbHtml += '</tr>';
  });
  tbody.innerHTML = tbHtml;

  // ページ情報
  const total = filteredRows.length;
  const end = Math.min(start + PAGE_SIZE, total);
  document.getElementById('pageInfo').textContent = `${start+1}–${end} / ${total.toLocaleString()} 件`;
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ========== ページネーション ==========
function renderPagination() {
  const total = filteredRows.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  html += `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  const pages = buildPageRange(currentPage, totalPages);
  pages.forEach(p => {
    if (p === '...') html += `<span class="pg-sep">…</span>`;
    else html += `<button class="pg-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });

  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function buildPageRange(cur, total) {
  const pages = [];
  if (total <= 7) { for(let i=1;i<=total;i++) pages.push(i); return pages; }
  pages.push(1);
  if (cur > 3) pages.push('...');
  for (let i = Math.max(2,cur-1); i <= Math.min(total-1,cur+1); i++) pages.push(i);
  if (cur < total-2) pages.push('...');
  pages.push(total);
  return pages;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  renderPagination();
  document.getElementById('tableWrap').scrollTop = 0;
}

// ========== 列パネル ==========
function buildColPanel() {
  const list = document.getElementById('colList');
  let html = '';
  headers.forEach((orig, i) => {
    const short = FIELD_MAP[orig] || orig;
    const checked = visibleCols.has(i) ? 'checked' : '';
    html += `<label class="col-item">
      <input type="checkbox" ${checked} onchange="toggleCol(${i}, this.checked)">
      <div class="col-item-names">
        <span class="col-item-short">${short}</span>
        <span class="col-item-orig">${orig}</span>
      </div>
    </label>`;
  });
  list.innerHTML = html;
}

function toggleCol(idx, show) {
  if (show) visibleCols.add(idx);
  else visibleCols.delete(idx);
  currentPage = 1;
  renderTable();
  renderPagination();
  document.getElementById('visibleColCount').textContent = visibleCols.size;
}

function selectAllCols(show) {
  if (show) headers.forEach((_,i) => visibleCols.add(i));
  else visibleCols.clear();
  buildColPanel();
  currentPage = 1;
  renderTable();
  renderPagination();
  document.getElementById('visibleColCount').textContent = visibleCols.size;
}

function openColPanel() {
  document.getElementById('colPanelOverlay').classList.add('open');
}
function closeColPanel(e) {
  if (!e || e.target === document.getElementById('colPanelOverlay')) {
    document.getElementById('colPanelOverlay').classList.remove('open');
  }
}

// ========== 詳細モーダル ==========
function openDetail(globalIdx) {
  const row = filteredRows[globalIdx];
  if (!row) return;

  const jobNum = row[headers.indexOf('求人番号')] || '';
  const company = row[headers.indexOf('事業所名')] || '';
  document.getElementById('modalTitle').textContent = `${company || '求人詳細'} ／ ${jobNum}`;

  const grid = document.getElementById('detailGrid');
  const longFields = new Set(['事業内容','会社の特長','仕事の内容','必要な知識・技能等','補足事項','特記事項','休日等']);

  let html = '';
  headers.forEach((orig, i) => {
    const short = FIELD_MAP[orig] || orig;
    const val = row[i] !== undefined ? row[i] : '';
    const clean = val.replace(/\\r\\n/g, '\n');
    const isEmpty = !clean || clean.trim() === '' || clean === 'NaN' || clean === 'nan';
    const isLong = longFields.has(orig) || clean.length > 60;
    html += `<div class="detail-item ${isLong ? 'full' : ''}">
      <div class="detail-label">${short}</div>
      <div class="detail-orig">${orig}</div>
      <div class="detail-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '（なし）' : escH(clean)}</div>
    </div>`;
  });
  grid.innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ========== エラー ==========
function setErr(msg) {
  document.getElementById('errMsg').textContent = msg;
}

// ========== 起動時：URL から自動読み込み ==========
window.addEventListener('load', () => {
  loadFromURL(DEFAULT_URL);
});

// ESCキーでモーダル/パネルを閉じる
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeColPanel();
  }
});
</script>
