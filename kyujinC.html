<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曽於高等学校 受付求人票</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0d14;
  --surface: #111620;
  --surface2: #161c2a;
  --surface3: #1d2538;
  --border: #252e45;
  --border-glow: #2a4080;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --accent-dim: #1e3a6e;
  --green: #10b981;
  --green-dim: #064e3b;
  --yellow: #f59e0b;
  --yellow-dim: #451a03;
  --red: #ef4444;
  --red-dim: #450a0a;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --salary-color: #34d399;
  --header-h: 56px;
  --search-h: 0px;
  --col-h: 42px;
  --row-h: 44px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }

/* ===== HEADER ===== */
#app-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(135deg, #0d1320 0%, #111927 100%);
  border-bottom: 1px solid var(--border-glow);
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
  z-index: 200;
  box-shadow: 0 2px 24px rgba(59,130,246,0.08);
}
#app-header::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, #3b82f6, #60a5fa, #3b82f6);
}
.header-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; font-weight: 600;
  color: var(--accent2);
  letter-spacing: 3px; text-transform: uppercase;
  border: 1px solid var(--accent-dim);
  padding: 2px 8px;
  border-radius: 2px;
  background: rgba(59,130,246,0.06);
  white-space: nowrap;
}
.header-title {
  font-size: 17px; font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
  white-space: nowrap;
}
.header-spacer { flex: 1; }
.total-count-badge {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 14px;
  white-space: nowrap;
}
.total-count-badge .label { color: var(--text-muted); font-size: 11px; }
.total-count-badge .num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px; font-weight: 700; color: var(--accent2);
  line-height: 1;
}
.total-count-badge .unit { color: var(--text-muted); font-size: 11px; }

/* Mobile toggle */
#mobile-toggle {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 10px;
  cursor: pointer; color: var(--text-dim);
  font-size: 11px; font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
#mobile-toggle:hover { border-color: var(--accent); color: var(--accent2); }
#mobile-toggle svg { width: 14px; height: 14px; }
#mobile-toggle.active { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }

/* ===== SEARCH PANEL ===== */
#search-panel {
  position: fixed; top: var(--header-h); left: 0; right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border-glow);
  z-index: 180;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease, box-shadow 0.3s;
}
#search-panel.open {
  max-height: 300px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.search-inner {
  padding: 14px 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
}
.search-group {
  display: flex; flex-direction: column; gap: 4px;
}
.search-group label {
  font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px;
  font-weight: 500; text-transform: uppercase;
}
.search-group input,
.search-group select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  padding: 5px 10px;
  font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
  height: 30px;
}
.search-group input:focus,
.search-group select:focus { border-color: var(--accent); }
.search-group input::placeholder { color: var(--text-muted); }
.search-group select option { background: var(--surface2); }
.sg-kyujin { width: 130px; }
.sg-jig { width: 160px; }
.sg-wide { width: 180px; }
.sg-narrow { width: 120px; }
.sg-num { width: 70px; }
.range-row { display: flex; align-items: center; gap: 6px; }
.range-sep { color: var(--text-muted); font-size: 11px; }

.search-actions {
  display: flex; gap: 8px; align-items: flex-end; margin-left: auto;
}
.btn-search, .btn-clear {
  height: 30px; padding: 0 16px;
  border-radius: 3px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
}
.btn-search {
  background: var(--accent); color: #fff;
}
.btn-search:hover { background: var(--accent2); }
.btn-clear {
  background: var(--surface2); color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-clear:hover { border-color: var(--accent); color: var(--accent2); }
.filtered-count {
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
  height: 30px; padding: 0 12px;
}
.filtered-count .fc-label { font-size: 10px; color: var(--text-muted); }
.filtered-count .fc-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px; font-weight: 700; color: var(--green);
}
.filtered-count .fc-unit { font-size: 10px; color: var(--text-muted); }

/* Search toggle button below header */
#search-toggle-bar {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  height: 32px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  z-index: 170;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.5px;
}
#search-toggle-bar:hover { background: var(--surface3); color: var(--accent2); }
#search-toggle-bar svg { width: 13px; height: 13px; transition: transform 0.3s; }
#search-toggle-bar.open svg { transform: rotate(180deg); }

/* ===== LAYOUT ===== */
#main-wrap {
  position: fixed;
  top: calc(var(--header-h) + 32px);
  bottom: 48px; left: 0; right: 0;
  display: flex; flex-direction: column;
  transition: top 0.3s;
}
#main-wrap.search-open {
  /* dynamically updated */
}

/* ===== COLUMN HEADERS ===== */
#col-header-wrap {
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: hidden;
  background: var(--surface);
  border-bottom: 2px solid var(--border-glow);
  scrollbar-width: none;
}
#col-header-wrap::-webkit-scrollbar { display: none; }
#col-header-row {
  display: flex;
  min-width: max-content;
  height: var(--col-h);
}
.col-th {
  display: flex; align-items: center; gap: 4px;
  padding: 0 8px;
  font-size: 11px; font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.3px;
  cursor: pointer;
  user-select: none;
  position: relative;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.col-th:hover { color: var(--accent2); background: rgba(59,130,246,0.05); }
.col-th.sorted-asc, .col-th.sorted-desc { color: var(--accent2); }
.sort-icon { font-size: 9px; color: var(--text-muted); }
.col-th.sorted-asc .sort-icon::after { content: ' ▲'; color: var(--accent2); }
.col-th.sorted-desc .sort-icon::after { content: ' ▼'; color: var(--accent2); }
.col-th:not(.sorted-asc):not(.sorted-desc) .sort-icon::after { content: ' ⇅'; }

/* Resize handle */
.resize-handle {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 4px; cursor: col-resize;
  background: transparent;
  transition: background 0.15s;
  z-index: 1;
}
.resize-handle:hover, .resize-handle.resizing { background: var(--accent); }

/* ===== TABLE BODY ===== */
#table-body-wrap {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
}
#table-body {
  min-width: max-content;
}
.data-row {
  display: flex;
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.data-row:nth-child(even) { background: var(--surface); }
.data-row:hover { background: rgba(59,130,246,0.07); }
.data-cell {
  display: flex; align-items: center;
  padding: 0 8px;
  font-size: 12px; color: var(--text-dim);
  border-right: 1px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
  white-space: nowrap;
}
.cell-num { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 13px; color: var(--text); }
.cell-salary {
  color: var(--salary-color) !important;
  font-weight: 600;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
}
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 8px; border-radius: 3px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge-ari { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.badge-nasi { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.badge-maishuu { background: var(--accent-dim); color: var(--accent2); border: 1px solid rgba(59,130,246,0.2); }
.badge-sono-ta { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); }
.badge-nashi2 { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }

/* ===== FOOTER / PAGINATION ===== */
#footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 48px;
  background: var(--surface);
  border-top: 1px solid var(--border-glow);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  z-index: 200;
  padding: 0 20px;
}
.page-btn {
  width: 32px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
.page-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-info { font-size: 11px; color: var(--text-muted); padding: 0 8px; white-space: nowrap; }
.page-input {
  width: 48px; height: 28px; text-align: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text); font-size: 12px;
  font-family: 'Rajdhani', sans-serif;
}
.page-input:focus { outline: none; border-color: var(--accent); }

/* ===== MOBILE VIEW ===== */
body.mobile-mode {
  overflow: auto;
}
body.mobile-mode #main-wrap {
  position: static;
  flex-direction: column;
  height: auto;
  top: auto; bottom: auto;
}
body.mobile-mode #col-header-wrap,
body.mobile-mode #col-header-row { display: none; }
body.mobile-mode #table-body-wrap {
  overflow: visible;
}
body.mobile-mode #table-body {
  min-width: 0;
}
body.mobile-mode .data-row {
  display: flex;
  flex-wrap: wrap;
  height: auto;
  padding: 10px 12px;
  gap: 4px;
  position: relative;
}
body.mobile-mode .data-cell {
  display: none;
}
body.mobile-mode .mc-show {
  display: flex !important;
  padding: 0;
  border: none;
  width: auto !important;
  white-space: normal;
  overflow: visible;
}
body.mobile-mode .mc-num { 
  position: absolute; top: 10px; left: 12px;
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 14px; color: var(--accent2);
}
body.mobile-mode .mc-name {
  width: 100% !important;
  font-size: 14px; font-weight: 700; color: var(--text);
  padding-left: 44px;
  margin-bottom: 4px;
}
body.mobile-mode .mc-shoku {
  width: 100% !important;
  font-size: 11px; color: var(--text-dim);
}
body.mobile-mode .mc-salary {
  font-size: 14px; font-weight: 700; color: var(--salary-color);
  font-family: 'Rajdhani', sans-serif;
}
body.mobile-mode .mc-badges { display: flex !important; gap: 4px; flex-wrap: wrap; align-items: center; }
body.mobile-mode #footer {
  position: sticky;
  bottom: 0;
}
body.mobile-mode #app-header,
body.mobile-mode #search-toggle-bar,
body.mobile-mode #search-panel { position: sticky; }
body.mobile-mode #app-header { top: 0; }
body.mobile-mode #search-toggle-bar { top: var(--header-h); }
body.mobile-mode #search-panel { top: calc(var(--header-h) + 32px); }

/* Mobile col header sync scroll */
#col-header-wrap, #table-body-wrap {
  /* sync horizontal scroll via JS */
}

/* scrollbar */
#table-body-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
#table-body-wrap::-webkit-scrollbar-track { background: var(--bg); }
#table-body-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#table-body-wrap::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
</style>
</head>

  ['安定所名','安定所名',150],
  ['求人番号','求人番号',130],
  ['事業所名','事業所名',200],

  ['職種','職種',260],
];

let colWidths = COLS.map(c=>c[2]);
let filteredData = [...ALL_DATA];
let sortKey = '独自番号';
let sortDir = 1; // 1=asc, -1=desc
let curPage = 1;
const PAGE_SIZE = 50;
let totalPages = 1;
let searchOpen = false;
let mobileMode = false;

// Init
document.getElementById('total-count').textContent = ALL_DATA.length;
buildColHeaders();
doSearch();

function buildColHeaders() {
  const row = document.getElementById('col-header-row');
  row.innerHTML = '';
  COLS.forEach((col, ci) => {
    const th = document.createElement('div');
    th.className = 'col-th' + (sortKey===col[0] ? (sortDir===1?' sorted-asc':' sorted-desc') : '');
    th.style.width = colWidths[ci]+'px';
    th.dataset.ci = ci;
    th.dataset.key = col[0];
    th.innerHTML = `${col[1]}<span class="sort-icon"></span><div class="resize-handle" data-ci="${ci}"></div>`;
    th.addEventListener('click', e => {
      if(e.target.classList.contains('resize-handle')) return;
      if(sortKey===col[0]) sortDir=-sortDir; else { sortKey=col[0]; sortDir=1; }
      sortData(); buildColHeaders(); renderPage();
    });
    row.appendChild(th);
  });
  // Resize handles
  row.querySelectorAll('.resize-handle').forEach(h => {
    h.addEventListener('mousedown', startResize);
  });
}

let resizing = null;
function startResize(e) {
  e.stopPropagation();
  const ci = +e.target.dataset.ci;
  const startX = e.clientX;
  const startW = colWidths[ci];
  resizing = { ci, startX, startW };
  e.target.classList.add('resizing');
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', stopResize);
}
function onResize(e) {
  if(!resizing) return;
  const dx = e.clientX - resizing.startX;
  colWidths[resizing.ci] = Math.max(40, resizing.startW + dx);
  // Update widths
  const ths = document.querySelectorAll('.col-th');
  const cells = document.querySelectorAll('.data-row');
  ths.forEach((th,i) => { if(i===resizing.ci) th.style.width=colWidths[i]+'px'; });
  cells.forEach(row => {
    const dc = row.querySelectorAll('.data-cell');
    if(dc[resizing.ci]) dc[resizing.ci].style.width=colWidths[resizing.ci]+'px';
  });
}
function stopResize() {
  if(!resizing) return;
  document.querySelectorAll('.resize-handle').forEach(h=>h.classList.remove('resizing'));
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', stopResize);
  resizing = null;
}

function sortData() {
  filteredData.sort((a,b) => {
    let av = a[sortKey]||'', bv = b[sortKey]||'';
    // numeric sort for certain cols
    if(['独自番号','社員数数','就業場所人数','求人数','月額賃金','時間外平均','年間休日数'].includes(sortKey)) {
      const an = parseFloat(av), bn = parseFloat(bv);
      if(!isNaN(an)&&!isNaN(bn)) return (an-bn)*sortDir;
    }
    return av.localeCompare(bv,'ja')*sortDir;
  });
}

function doSearch() {
  const ky = document.getElementById('s-kyujin').value.trim();
  const jg = document.getElementById('s-jig').value.trim();
  const ad = document.getElementById('s-addr').value.trim();
  const wk = document.getElementById('s-work').value.trim();
  const sk = document.getElementById('s-shoku').value.trim();
  const gy = document.getElementById('s-gyoshu').value;
  const sg = document.getElementById('s-sangyo').value;
  const hmin = document.getElementById('s-holiday-min').value;
  const hmax = document.getElementById('s-holiday-max').value;

  filteredData = ALL_DATA.filter(r => {
    if(ky && !r['求人番号'].startsWith(ky)) return false;
    if(jg && !r['事業所名'].includes(jg)) return false;
    if(ad && !r['所在地'].includes(ad)) return false;
    if(wk && !r['就業場所'].includes(wk)) return false;
    if(sk && !r['職種'].includes(sk)) return false;
    if(gy && r['業種8種']!==gy) return false;
    if(sg && r['産業分類']!==sg) return false;
    if(hmin) { const h=parseFloat(r['年間休日数']); if(isNaN(h)||h<parseFloat(hmin)) return false; }
    if(hmax) { const h=parseFloat(r['年間休日数']); if(isNaN(h)||h>parseFloat(hmax)) return false; }
    return true;
  });
  document.getElementById('filtered-count').textContent = filteredData.length;
  sortData();
  curPage = 1;
  totalPages = Math.max(1, Math.ceil(filteredData.length/PAGE_SIZE));
  renderPage();
  updatePagination();
}

function clearSearch() {
  ['s-kyujin','s-jig','s-addr','s-work','s-shoku'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('s-gyoshu').value='';
  document.getElementById('s-sangyo').value='';
  document.getElementById('s-holiday-min').value='';
  document.getElementById('s-holiday-max').value='';
  doSearch();
}

function formatSalary(v) {
  const n = parseFloat(v);
  if(isNaN(n)) return v||'';
  return n.toLocaleString('ja-JP')+'円';
}
function fmt独自(v) {
  const n = parseInt(v);
  if(isNaN(n)) return v||'';
  return String(n).padStart(4,'0');
}

function renderBonusBadge(v) {
  if(v==='あり') return '<span class="badge badge-ari">あり</span>';
  if(v==='なし') return '<span class="badge badge-nashi2">なし</span>';
  return v||'';
}
function renderShukyuBadge(v) {
  if(v==='毎週') return '<span class="badge badge-maishuu">毎週</span>';
  if(v==='その他') return '<span class="badge badge-sono-ta">その他</span>';
  if(v==='なし') return '<span class="badge badge-nashi2">なし</span>';
  return v||'';
}

function renderPage() {
  const body = document.getElementById('table-body');
  const start = (curPage-1)*PAGE_SIZE;
  const slice = filteredData.slice(start, start+PAGE_SIZE);
  
  const rows = slice.map(r => {
    const cells = COLS.map((col,ci) => {
      const key = col[0];
      let val = r[key]||'';
      let content = '';
      let extra = '';
      
      // Mobile classes
      let mcClass = '';
      if(key==='独自番号') { mcClass='mc-num mc-show'; }
      else if(key==='事業所名') { mcClass='mc-name mc-show'; }
      else if(key==='職種') { mcClass='mc-shoku mc-show'; }
      else if(key==='月額賃金') { mcClass='mc-salary mc-show'; }
      else if(key==='賞与'||key==='週休２日制') { mcClass='mc-badges mc-show'; }
      
      if(key==='独自番号') { content=`<span class="cell-num">${fmt独自(val)}</span>`; }
      else if(key==='月額賃金') { content=`<span class="cell-salary">${formatSalary(val)}</span>`; }
      else if(key==='賞与') { content=renderBonusBadge(val); }
      else if(key==='週休２日制') { content=renderShukyuBadge(val); }
      else if(key==='社員数数'||key==='就業場所人数'||key==='求人数'||key==='時間外平均'||key==='年間休日数') {
        const n=parseFloat(val); 
        content=isNaN(n)?val:(key==='時間外平均'?n+'h':key==='年間休日数'?n+'日':n.toLocaleString());
      }
      else { content=val; }
      
      return `<div class="data-cell ${mcClass}" style="width:${colWidths[ci]}px">${content}</div>`;
    }).join('');
    return `<div class="data-row">${cells}</div>`;
  }).join('');
  
  body.innerHTML = rows;
}

function updatePagination() {
  const pi = document.getElementById('page-info');
  const start = (curPage-1)*PAGE_SIZE+1;
  const end = Math.min(curPage*PAGE_SIZE, filteredData.length);
  pi.textContent = `${start}-${end} / ${filteredData.length}件`;
  
  document.getElementById('btn-first').disabled = curPage<=1;
  document.getElementById('btn-prev').disabled = curPage<=1;
  document.getElementById('btn-next').disabled = curPage>=totalPages;
  document.getElementById('btn-last').disabled = curPage>=totalPages;
  
  const pi2 = document.getElementById('page-input');
  pi2.value = curPage; pi2.max = totalPages;
  
  // Page buttons
  const pb = document.getElementById('page-btns');
  pb.innerHTML = '';
  let pages = [];
  if(totalPages<=7) { for(let i=1;i<=totalPages;i++) pages.push(i); }
  else {
    pages = [1];
    if(curPage>3) pages.push('...');
    for(let i=Math.max(2,curPage-1);i<=Math.min(totalPages-1,curPage+1);i++) pages.push(i);
    if(curPage<totalPages-2) pages.push('...');
    pages.push(totalPages);
  }
  pages.forEach(p => {
    const btn = document.createElement('div');
    if(p==='...') { btn.className='page-info'; btn.textContent='…'; }
    else {
      btn.className='page-btn'+(p===curPage?' active':'');
      btn.textContent=p;
      btn.onclick=()=>goPage(p);
    }
    pb.appendChild(btn);
  });
}

function goPage(p) {
  p = Math.max(1, Math.min(totalPages, p));
  if(p===curPage) return;
  curPage = p;
  renderPage();
  updatePagination();
  // Scroll to top of body
  document.getElementById('table-body-wrap').scrollTop = 0;
}
function goPageInput() {
  const v = parseInt(document.getElementById('page-input').value);
  if(!isNaN(v)) goPage(v);
}

function toggleSearch() {
  searchOpen = !searchOpen;
  const panel = document.getElementById('search-panel');
  const bar = document.getElementById('search-toggle-bar');
  const wrap = document.getElementById('main-wrap');
  panel.classList.toggle('open', searchOpen);
  bar.classList.toggle('open', searchOpen);
  if(searchOpen) {
    // Measure panel height after transition
    setTimeout(() => {
      const h = panel.offsetHeight;
      wrap.style.top = (56+32+h)+'px';
    }, 310);
  } else {
    wrap.style.top = '';
  }
}

function toggleMobile() {
  mobileMode = !mobileMode;
  document.body.classList.toggle('mobile-mode', mobileMode);
  document.getElementById('mobile-toggle').classList.toggle('active', mobileMode);
  if(mobileMode) {
    document.body.style.overflow='auto';
  } else {
    document.body.style.overflow='hidden';
  }
}

// Sync horizontal scroll between header and body
const headerWrap = document.getElementById('col-header-wrap');
const bodyWrap = document.getElementById('table-body-wrap');
bodyWrap.addEventListener('scroll', () => {
  headerWrap.scrollLeft = bodyWrap.scrollLeft;
});

// Enter key on search inputs
document.querySelectorAll('#search-panel input, #search-panel select').forEach(el => {
  el.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
});
</script>
