<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --border: #1e3a5f;
  --accent: #00c8ff;
  --accent2: #ff6b35;
  --accent3: #39d98a;
  --text: #e2e8f0;
  --text-dim: #8899aa;
  --green: #39d98a;
  --badge-weekly: #1a3a2a;
  --badge-weekly-text: #39d98a;
  --badge-other: #1a2a3a;
  --badge-other-text: #64b5f6;
  --badge-none: #3a1a1a;
  --badge-none-text: #ef5350;
  --badge-ari: #1a3a2a;
  --badge-ari-text: #39d98a;
  --badge-nashi: #3a1a1a;
  --badge-nashi-text: #ef5350;
  --header-h: 56px;
  --search-h: 0px;
  --col-h: 40px;
  --footer-h: 52px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* ===== HEADER ===== */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: linear-gradient(135deg, #0d1b3e 0%, #0a0e1a 60%, #0d2a1a 100%);
  border-bottom: 2px solid var(--accent);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  box-shadow: 0 2px 20px rgba(0,200,255,0.15);
}
#header .logo-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; color: var(--accent);
  letter-spacing: 2px; line-height: 1;
  text-shadow: 0 0 20px rgba(0,200,255,0.5);
}
#header .title-text {
  display: flex; flex-direction: column;
}
#header .school-name {
  font-size: 11px; font-weight: 300; color: var(--text-dim); letter-spacing: 3px;
}
#header .doc-title {
  font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 1px;
}
.header-right {
  margin-left: auto; display: flex; align-items: center; gap: 10px;
}
.total-badge {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; color: var(--accent);
}
.total-badge span { color: var(--text); font-weight: 700; font-size: 16px; }
.sp-toggle {
  background: linear-gradient(135deg, var(--accent2), #ff8c5a);
  color: #fff; border: none; border-radius: 6px;
  padding: 5px 12px; font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: 0.5px; white-space: nowrap;
  transition: opacity 0.2s;
}
.sp-toggle:hover { opacity: 0.85; }
.search-toggle {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 5px 14px;
  font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  display: flex; align-items: center; gap: 6px;
  transition: border-color 0.2s, background 0.2s;
}
.search-toggle:hover { border-color: var(--accent); background: rgba(0,200,255,0.05); }
.search-toggle .icon { font-size: 14px; }

/* ===== SEARCH PANEL ===== */
#search-panel {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 90;
  background: var(--surface); border-bottom: 1px solid var(--border);
  overflow: hidden; max-height: 0; transition: max-height 0.35s ease, padding 0.35s ease;
  padding: 0 16px;
}
#search-panel.open {
  max-height: 260px; padding: 14px 16px;
}
.search-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px; align-items: end;
}
.search-field label {
  font-size: 10px; color: var(--text-dim); letter-spacing: 1px;
  text-transform: uppercase; display: block; margin-bottom: 4px;
}
.search-field input, .search-field select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 7px 10px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
  transition: border-color 0.2s; outline: none;
}
.search-field input:focus, .search-field select:focus { border-color: var(--accent); }
.search-field select option { background: var(--surface); }
.range-row { display: flex; gap: 6px; align-items: center; }
.range-row span { color: var(--text-dim); font-size: 11px; }
.search-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
}
.filter-count {
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--accent3);
}
.filter-count span { font-size: 20px; font-weight: 700; }
.btn-reset {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; padding: 5px 14px; font-size: 12px;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: border-color 0.2s, color 0.2s;
}
.btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

/* ===== COLUMN HEADER ===== */
#col-header-wrapper {
  position: fixed; left: 0; right: 0; z-index: 80;
  background: var(--surface2); border-bottom: 2px solid var(--border);
  overflow: hidden;
}
#col-header {
  display: flex; align-items: center;
  min-width: max-content;
}
.col-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px; font-size: 10px; font-weight: 700;
  color: var(--text-dim); letter-spacing: 0.5px;
  height: var(--col-h); white-space: nowrap;
  cursor: pointer; user-select: none;
  border-right: 1px solid var(--border);
  transition: color 0.15s, background 0.15s;
  position: relative;
  overflow: hidden;
}
.col-hd:hover { color: var(--accent); background: rgba(0,200,255,0.05); }
.col-hd.sort-asc .sort-icon::after { content: " ▲"; color: var(--accent); }
.col-hd.sort-desc .sort-icon::after { content: " ▼"; color: var(--accent); }
.col-hd .sort-icon { font-size: 9px; }
.resize-handle {
  position: absolute; right: 0; top: 0; bottom: 0; width: 5px;
  cursor: col-resize; z-index: 5;
}
.resize-handle:hover { background: rgba(0,200,255,0.3); }

/* ===== TABLE AREA ===== */
#table-scroll {
  position: fixed; left: 0; right: 0;
  overflow: auto;
  background: var(--bg);
}
#table-body {
  min-width: max-content;
}
.trow {
  display: flex; align-items: stretch;
  border-bottom: 1px solid rgba(30,58,95,0.4);
  transition: background 0.1s;
}
.trow:hover { background: rgba(0,200,255,0.04); }
.trow:nth-child(even) { background: rgba(17,24,39,0.5); }
.trow:nth-child(even):hover { background: rgba(0,200,255,0.06); }
.tcell {
  display: flex; align-items: center; padding: 6px 8px;
  font-size: 11px; color: var(--text); border-right: 1px solid rgba(30,58,95,0.3);
  overflow: hidden; white-space: nowrap;
}
.tcell.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.tcell.salary { color: var(--green); font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.badge {
  display: inline-block; border-radius: 4px; padding: 2px 7px;
  font-size: 10px; font-weight: 700; white-space: nowrap;
}
.badge-weekly { background: var(--badge-weekly); color: var(--badge-weekly-text); }
.badge-other { background: var(--badge-other); color: var(--badge-other-text); }
.badge-none { background: var(--badge-none); color: var(--badge-none-text); }
.badge-ari { background: var(--badge-ari); color: var(--badge-ari-text); }
.badge-nashi { background: var(--badge-nashi); color: var(--badge-nashi-text); }

/* ===== FOOTER / PAGINATION ===== */
#footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: var(--footer-h);
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 0 16px;
}
.page-info {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim);
  min-width: 160px; text-align: center;
}
.page-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 5px 12px;
  font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: border-color 0.2s, color 0.2s;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-btn.current {
  background: var(--accent); color: var(--bg); border-color: var(--accent);
  font-weight: 700;
}
.page-btns { display: flex; gap: 4px; }

/* ===== LOADING ===== */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.loader {
  width: 48px; height: 48px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { color: var(--text-dim); font-size: 13px; letter-spacing: 2px; }

/* ===== SMARTPHONE MODE ===== */
body.sp-mode {
  overflow: auto;
}
body.sp-mode #header,
body.sp-mode #search-panel,
body.sp-mode #col-header-wrapper,
body.sp-mode #table-scroll,
body.sp-mode #footer {
  position: static;
  width: 100%;
}
body.sp-mode #header { position: fixed; top: 0; }
body.sp-mode #search-panel { position: fixed; top: var(--header-h); }
body.sp-mode #col-header-wrapper { position: sticky; top: 0; }
body.sp-mode #table-scroll { overflow-x: auto; height: auto; position: static; }
body.sp-mode #footer { position: fixed; bottom: 0; }
body.sp-mode #main-container {
  overflow: auto;
  padding-top: var(--header-h);
  padding-bottom: var(--footer-h);
}
body.sp-mode.search-open #main-container {
  padding-top: calc(var(--header-h) + var(--search-h));
}
</style>
</head>

async function decompressData(b64str) {
  const bin = atob(b64str);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const out = await new Response(ds.readable).arrayBuffer();
  return JSON.parse(new TextDecoder().decode(out));
}

let allData = [];
let filtered = [];
let currentPage = 1;
let totalPages = 1;
const PER_PAGE = 50;
let sortKey = '独自番号';
let sortDir = 1;
let colWidths = COLS.map(c => c.w);
let spMode = false;
let searchOpen = false;

// ===== LAYOUT CALC =====
function layoutCalc() {
  const headerH = 56;
  const searchH = searchOpen ? document.getElementById('search-panel').scrollHeight : 0;
  const colH = 40;
  const footerH = 52;
  const top = headerH + searchH + colH;

  document.getElementById('col-header-wrapper').style.top = (headerH + searchH) + 'px';
  const ts = document.getElementById('table-scroll');
  ts.style.top = top + 'px';
  ts.style.bottom = footerH + 'px';
}

// ===== TOGGLE SEARCH =====
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('search-panel').classList.toggle('open', searchOpen);
  setTimeout(layoutCalc, 350);
}

// ===== TOGGLE SP MODE =====
function toggleSP() {
  spMode = !spMode;
  document.body.classList.toggle('sp-mode', spMode);
  document.getElementById('sp-btn').textContent = spMode ? '🖥 PC' : '📱 スマホ';
  if (!spMode) layoutCalc();
}

// ===== BUILD HEADERS =====
function buildHeaders() {
  const hd = document.getElementById('col-header');
  hd.innerHTML = COLS.map((c, i) => `
    <div class="col-hd ${sortKey===c.key ? (sortDir===1?'sort-asc':'sort-desc') : ''}" 
         data-col="${i}" style="width:${colWidths[i]}px; min-width:${colWidths[i]}px;"
         onclick="doSort('${c.key}')">
      ${c.label}<span class="sort-icon"></span>
      <div class="resize-handle" onmousedown="startResize(event,${i})" onclick="e=>e.stopPropagation()"></div>
    </div>`).join('');
}

// ===== SORT =====
function doSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  sortData();
  currentPage = 1;
  buildHeaders();
  renderPage();
}

function sortData() {
  filtered.sort((a, b) => {
    const av = a[sortKey] || '', bv = b[sortKey] || '';
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
    return av.localeCompare(bv, 'ja') * sortDir;
  });
}

// ===== FILTER =====
function doFilter() {
  const kyujin = document.getElementById('s-kyujin').value.trim();
  const jigyosho = document.getElementById('s-jigyosho').value.trim().toLowerCase();
  const shozaichi = document.getElementById('s-shozaichi').value.trim().toLowerCase();
  const shugyo = document.getElementById('s-shugyo').value.trim().toLowerCase();
  const shokushu = document.getElementById('s-shokushu').value.trim().toLowerCase();
  const gyoshu = document.getElementById('s-gyoshu').value;
  const sangyo = document.getElementById('s-sangyo').value;
  const hMin = document.getElementById('s-holiday-min').value;
  const hMax = document.getElementById('s-holiday-max').value;

  filtered = allData.filter(r => {
    if (kyujin && !r['求人番号'].startsWith(kyujin)) return false;
    if (jigyosho && !r['事業所名'].toLowerCase().includes(jigyosho)) return false;
    if (shozaichi && !r['所在地'].toLowerCase().includes(shozaichi)) return false;
    if (shugyo && !r['就業場所'].toLowerCase().includes(shugyo)) return false;
    if (shokushu && !r['職種'].toLowerCase().includes(shokushu)) return false;
    if (gyoshu && r['業種8種'] !== gyoshu) return false;
    if (sangyo && r['産業分類'] !== sangyo) return false;
    if (hMin !== '') {
      const h = parseInt(r['年間休日数']);
      if (isNaN(h) || h < parseInt(hMin)) return false;
    }
    if (hMax !== '') {
      const h = parseInt(r['年間休日数']);
      if (isNaN(h) || h > parseInt(hMax)) return false;
    }
    return true;
  });

  document.getElementById('filter-count').textContent = filtered.length.toLocaleString();
  sortData();
  currentPage = 1;
  totalPages = Math.ceil(filtered.length / PER_PAGE);
  renderPage();
  renderPagination();
}

function resetFilter() {
  ['s-kyujin','s-jigyosho','s-shozaichi','s-shugyo','s-shokushu'].forEach(id => document.getElementById(id).value = '');
  ['s-gyoshu','s-sangyo'].forEach(id => document.getElementById(id).value = '');
  ['s-holiday-min','s-holiday-max'].forEach(id => document.getElementById(id).value = '');
  doFilter();
}

// ===== RENDER =====
function badgeBonus(v) {
  const cls = v === 'あり' ? 'badge-ari' : 'badge-nashi';
  return `<span class="badge ${cls}">${v||'—'}</span>`;
}
function badgeHoliday(v) {
  const cls = v === '毎週' ? 'badge-weekly' : v === 'なし' ? 'badge-none' : 'badge-other';
  return `<span class="badge ${cls}">${v||'—'}</span>`;
}
function fmtSalary(v) {
  const n = parseInt(v);
  if (isNaN(n)) return v || '—';
  return n.toLocaleString() + '円';
}

function renderPage() {
  const start = (currentPage - 1) * PER_PAGE;
  const rows = filtered.slice(start, start + PER_PAGE);
  const html = rows.map(r => `<div class="trow">${COLS.map((c, i) => {
    let val = r[c.key] || '';
    let content = '';
    if (c.badge === 'bonus') content = badgeBonus(val);
    else if (c.badge === 'holiday') content = badgeHoliday(val);
    else if (c.key === '月額賃金') content = fmtSalary(val);
    else content = val || '—';
    return `<div class="tcell ${c.cls||''}" style="width:${colWidths[i]}px;min-width:${colWidths[i]}px;">${content}</div>`;
  }).join('')}</div>`).join('');
  document.getElementById('table-body').innerHTML = html;
}

// ===== PAGINATION =====
function goPage(p) {
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
  renderPagination();
  document.getElementById('table-scroll').scrollTop = 0;
}

function renderPagination() {
  const info = `${(currentPage-1)*PER_PAGE+1}–${Math.min(currentPage*PER_PAGE, filtered.length)} / ${filtered.length.toLocaleString()}件`;
  document.getElementById('page-info').textContent = info;
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
  document.getElementById('btn-last').disabled = currentPage >= totalPages;

  // Page number buttons (show max 7)
  const btns = document.getElementById('page-btns');
  let pages = [];
  const r = 3;
  for (let i = Math.max(1, currentPage-r); i <= Math.min(totalPages, currentPage+r); i++) pages.push(i);
  btns.innerHTML = pages.map(p => `<button class="page-btn ${p===currentPage?'current':''}" onclick="goPage(${p})">${p}</button>`).join('');
}

// ===== COLUMN RESIZE =====
let resizing = null;
function startResize(e, colIndex) {
  e.stopPropagation(); e.preventDefault();
  resizing = { col: colIndex, startX: e.clientX, startW: colWidths[colIndex] };
}
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const diff = e.clientX - resizing.startX;
  colWidths[resizing.col] = Math.max(50, resizing.startW + diff);
  // Update header and cells
  const hds = document.querySelectorAll('.col-hd');
  if (hds[resizing.col]) {
    hds[resizing.col].style.width = colWidths[resizing.col] + 'px';
    hds[resizing.col].style.minWidth = colWidths[resizing.col] + 'px';
  }
  const cells = document.querySelectorAll(`.tcell:nth-child(${resizing.col+1})`);
  cells.forEach(c => { c.style.width = colWidths[resizing.col]+'px'; c.style.minWidth = colWidths[resizing.col]+'px'; });
});
document.addEventListener('mouseup', () => { resizing = null; });

// ===== SYNC SCROLL =====
document.addEventListener('DOMContentLoaded', () => {
  const ts = document.getElementById('table-scroll');
  const ch = document.getElementById('col-header');
  ts.addEventListener('scroll', () => { ch.parentElement.scrollLeft = ts.scrollLeft; });
});

// ===== INIT =====
async function init() {
  allData = await decompressData(B64);
  document.getElementById('total-count').textContent = allData.length.toLocaleString();
  filtered = [...allData];
  sortData();
  totalPages = Math.ceil(filtered.length / PER_PAGE);
  document.getElementById('filter-count').textContent = allData.length.toLocaleString();
  buildHeaders();
  renderPage();
  renderPagination();
  layoutCalc();
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
</body>
</html>
