<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>来訪者応接記録用紙</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #161922;
    --surface: #1c2030;
    --surface2: #232838;
    --border: #2e3448;
    --border-light: #252b3b;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-glow: rgba(201,168,76,0.25);
    --accent: #4a8fe8;
    --accent-light: rgba(74,143,232,0.12);
    --text: #e8eaf0;
    --text-sub: #9ba3b8;
    --text-muted: #5c6480;
    --danger: #e05252;
    --danger-dim: rgba(224,82,82,0.12);
    --success: #4caf82;
    --success-dim: rgba(76,175,130,0.12);
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 48px rgba(0,0,0,0.6);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 70%);
  }

  /* ===== WRAPPER ===== */
  .main-wrap {
    background: var(--bg2);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(201,168,76,0.08);
    overflow: hidden;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: linear-gradient(135deg, #0d1520 0%, #1a2235 50%, #0f1a2a 100%);
    border-bottom: 1px solid var(--border);
    padding: 22px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .app-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.04) 50%, transparent 100%);
    pointer-events: none;
  }
  .app-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }
  .app-header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.45rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-header h1 .icon-badge {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold), #a07830);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    box-shadow: 0 4px 12px rgba(201,168,76,0.3);
  }
  .app-header .subtitle {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: #0d1118;
    padding: 0 32px;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 26px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    transition: all 0.22s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    position: relative;
  }
  .tab:hover { color: var(--text-sub); }
  .tab.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
  }

  /* ===== VIEW ===== */
  .view { display: none; padding: 28px 32px; }
  .view.active { display: block; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border: none; border-radius: 7px;
    font-family: inherit; font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s; letter-spacing: 0.05em;
    white-space: nowrap; position: relative;
  }
  .btn-primary {
    background: linear-gradient(135deg, #3a7bd5, #2563b8);
    color: #fff;
    box-shadow: 0 2px 12px rgba(58,123,213,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(58,123,213,0.4); }
  .btn-success {
    background: linear-gradient(135deg, #3d9e70, #2d7a55);
    color: #fff;
    box-shadow: 0 2px 12px rgba(61,158,112,0.3);
  }
  .btn-success:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(61,158,112,0.4); }
  .btn-danger {
    background: linear-gradient(135deg, #d94f4f, #b83535);
    color: #fff;
    box-shadow: 0 2px 8px rgba(217,79,79,0.25);
  }
  .btn-danger:hover { transform: translateY(-1px); }
  .btn-outline {
    background: rgba(255,255,255,0.04);
    color: var(--text-sub);
    border: 1px solid var(--border);
    backdrop-filter: blur(4px);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }
  .btn-sm { padding: 5px 11px; font-size: 0.75rem; }

  /* header buttons special */
  .header-actions .btn-outline {
    color: rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
  }
  .header-actions .btn-outline:hover {
    color: var(--gold-light); border-color: var(--gold); background: var(--gold-dim);
  }

  /* ===== FORM CARD ===== */
  .form-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    overflow: hidden;
    margin-bottom: 18px;
    transition: box-shadow 0.2s;
  }
  .form-card:hover { box-shadow: 0 0 0 1px rgba(201,168,76,0.1), 0 8px 32px rgba(0,0,0,0.3); }
  .form-card-header {
    background: linear-gradient(90deg, var(--surface2), var(--surface));
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #kigyoHeader::before { display:none; }
  .form-card-header::before {
    content: '';
    width: 3px; height: 14px;
    background: linear-gradient(180deg, var(--gold), #a07830);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .form-card-body { padding: 20px; }

  /* ===== FORM LAYOUT ===== */
  .form-top-bar {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .form-top-bar .left { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label {
    font-size: 0.72rem; color: var(--text-muted); font-weight: 500;
    letter-spacing: 0.07em; text-transform: uppercase;
  }
  .field-group input[type="text"],
  .field-group input[type="date"],
  .field-group input[type="time"],
  .field-group input[type="number"],
  .field-group select,
  .field-group textarea {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 0.85rem;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .field-group input::placeholder,
  .field-group textarea::placeholder { color: var(--text-muted); }
  .field-group textarea { resize: vertical; min-height: 70px; }
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* ===== CHECKBOXES ===== */
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .cb-label {
    display: inline-flex; align-items: center; gap: 7px;
    cursor: pointer; font-size: 0.82rem; padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border-light);
    transition: all 0.15s; user-select: none; white-space: nowrap;
    color: var(--text-sub); background: var(--bg);
  }
  .cb-label:hover { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }
  .cb-label input[type="checkbox"] { display: none; }
  .cb-box {
    width: 15px; height: 15px; border: 1.5px solid var(--border);
    border-radius: 3px; display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; background: var(--surface2);
  }
  .cb-label input:checked + .cb-box {
    background: linear-gradient(135deg, var(--gold), #a07830);
    border-color: var(--gold);
  }
  .cb-label input:checked + .cb-box::after { content: '✓'; color: #1a1200; font-size: 10px; font-weight: 900; }
  .cb-label input:checked ~ .cb-text { color: var(--gold-light); font-weight: 600; }
  .cb-label:has(input:checked) { border-color: var(--gold); background: var(--gold-dim); }

  .radio-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .rb-label {
    display: inline-flex; align-items: center; gap: 7px;
    cursor: pointer; font-size: 0.82rem; padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border-light);
    transition: all 0.15s; user-select: none;
    color: var(--text-sub); background: var(--bg);
  }
  .rb-label:hover { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }
  .rb-label input[type="radio"] { display: none; }
  .rb-box {
    width: 15px; height: 15px; border: 1.5px solid var(--border);
    border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; background: var(--surface2);
  }
  .rb-label input:checked + .rb-box { border-color: var(--gold); }
  .rb-label input:checked + .rb-box::after {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
  }
  .rb-label input:checked ~ .rb-text { color: var(--gold-light); font-weight: 600; }
  .rb-label:has(input:checked) { border-color: var(--gold); background: var(--gold-dim); }

  /* ===== REGION TABLE ===== */
  .region-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .region-table th {
    background: var(--surface2);
    color: var(--gold);
    padding: 9px 14px; text-align: center; font-weight: 600;
    border: 1px solid var(--border); font-size: 0.75rem;
    letter-spacing: 0.08em;
  }
  .region-table td { border: 1px solid var(--border-light); padding: 6px 12px; text-align: center; }
  .region-table tr:hover td { background: rgba(201,168,76,0.04); }

  /* ===== LIST VIEW ===== */
  .list-controls {
    display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 200px;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 16px; font-family: inherit; font-size: 0.85rem; outline: none;
    transition: all 0.15s; background: var(--surface); color: var(--text);
  }
  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }

  .records-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .records-table thead tr {
    background: linear-gradient(90deg, #0d1118, #131825);
    border-bottom: 1px solid var(--gold);
  }
  .records-table th {
    color: var(--gold);
    padding: 11px 14px; text-align: left; font-weight: 600;
    letter-spacing: 0.08em; white-space: nowrap; font-size: 0.74rem;
  }
  .records-table td {
    padding: 11px 14px; border-bottom: 1px solid var(--border-light);
    vertical-align: middle; color: var(--text-sub);
  }
  .records-table td strong { color: var(--text); font-weight: 600; }
  .records-table tbody tr { transition: background 0.15s; }
  .records-table tbody tr:hover td { background: rgba(201,168,76,0.05); color: var(--text); }
  .records-table .actions { display: flex; gap: 6px; justify-content: center; }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.06em;
  }
  .badge-employment {
    background: rgba(74,143,232,0.15); color: #6bb3f5;
    border: 1px solid rgba(74,143,232,0.3);
  }
  .badge-education {
    background: rgba(76,175,130,0.15); color: #6dd4a8;
    border: 1px solid rgba(76,175,130,0.3);
  }

  .empty-state {
    text-align: center; padding: 70px 20px; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 14px; opacity: 0.3; }
  .empty-state p { font-size: 0.88rem; line-height: 1.7; }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-size: 0.72rem; font-weight: 700; color: var(--gold);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin: 20px 0 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 20px; height: 1px;
    background: var(--gold); display: inline-block;
  }

  /* ===== ALERT ===== */
  .alert {
    padding: 12px 18px; border-radius: 8px; margin-bottom: 18px;
    font-size: 0.84rem; display: flex; align-items: center; gap: 10px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .alert-success {
    background: var(--success-dim); color: #6dd4a8;
    border: 1px solid rgba(76,175,130,0.3);
  }
  .alert-error {
    background: var(--danger-dim); color: #f08080;
    border: 1px solid rgba(224,82,82,0.3);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px; padding: 32px;
    max-width: 420px; width: 90%;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp { from { transform: translateY(24px) scale(0.96); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h3 { margin-bottom: 12px; color: var(--danger); font-size: 1rem; }
  .modal p { font-size: 0.86rem; color: var(--text-sub); margin-bottom: 24px; line-height: 1.7; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ===== DETAIL VIEW ===== */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-item { padding: 10px 14px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border-light); }
  .detail-item .label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
  .detail-item .value { font-size: 0.88rem; font-weight: 500; }
  .detail-item.full { grid-column: 1/-1; }

  /* ===== STATS ===== */
  .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card {
    flex: 1; min-width: 120px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    padding: 16px 20px; text-align: center;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stat-card:hover::before { opacity: 1; }
  .stat-card .num {
    font-family: 'Shippori Mincho', serif;
    font-size: 2rem; font-weight: 700; color: var(--gold-light);
    line-height: 1;
  }
  .stat-card .lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.06em; }

  /* ===== SELECT in list ===== */
  select.btn-outline {
    background: var(--surface); color: var(--text-sub);
    border: 1px solid var(--border); border-radius: 8px;
  }
  select.btn-outline:hover { border-color: var(--gold); color: var(--gold-light); }
  select.btn-outline option { background: var(--surface2); color: var(--text); }

  .records-table th.sortable {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .records-table th.sortable:hover { color: var(--gold-light); }
  .records-table th.sort-active { color: var(--gold-light); }
  .sort-icon { font-size: 0.7rem; opacity: 0.6; margin-left: 3px; }
  .sort-active .sort-icon { opacity: 1; color: var(--gold); }

  @media (max-width: 640px) {
    body { padding: 12px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .view { padding: 16px; }
    .app-header { padding: 16px; }
    .tabs { padding: 0 16px; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="main-wrap">
  <div class="app-header">
    <div>
      <h1><span class="icon-badge">📋</span>来訪者応接記録</h1>
      <div class="subtitle">VISITOR RECEPTION RECORD SYSTEM</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="exportExcel()">📊 就職Excel出力</button>
      <button class="btn btn-outline" onclick="exportExcelGakkou()">📊 進学Excel出力</button>
      <button class="btn btn-outline" onclick="exportJSON()">💾 エクスポート</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📂 インポート</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('form')">＋ 新規記録</div>
    <div class="tab" onclick="switchTab('list')">≡ 記録一覧</div>
  </div>

  <!-- ===== FORM VIEW ===== -->
  <div class="view active" id="view-form">
    <div id="formAlert"></div>

    <!-- TOP: 種別・受付No・来訪日・来訪時刻・応対者 -->
    <div class="form-card">
      <div class="form-card-header">基本情報</div>
      <div class="form-card-body">
        <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;">
          <div class="field-group">
            <label>種　別</label>
            <div class="radio-group">
              <label class="rb-label"><input type="radio" name="category" value="就職" checked tabindex="1"><span class="rb-box"></span><span class="rb-text">就　職</span></label>
              <label class="rb-label"><input type="radio" name="category" value="進学" tabindex="2"><span class="rb-box"></span><span class="rb-text">進　学</span></label>
            </div>
          </div>
          <div class="field-group">
            <label>受付 No. <span style="font-size:0.72rem;color:var(--gold);font-weight:400;letter-spacing:0.04em;">自動採番</span></label>
            <input type="text" id="f_receiptNo" readonly tabindex="-1" style="width:110px;background:var(--bg2);cursor:default;font-weight:700;color:var(--gold-light);letter-spacing:0.12em;border-color:var(--border)">
          </div>
          <div class="field-group">
            <label>来　訪　日</label>
            <div style="display:flex;align-items:center;gap:8px;">
              <input type="date" id="f_date" tabindex="3" style="width:150px;">
              <span id="f_weekday" style="font-size:0.85rem;color:var(--gold-light);font-weight:600;white-space:nowrap;min-width:40px;"></span>
            </div>
          </div>
          <div class="field-group">
            <label>来訪時刻</label>
            <input type="time" id="f_time" step="600" tabindex="4" style="width:120px;">
          </div>
          <div class="field-group" style="flex:1;min-width:140px;">
            <label>応　対　者</label>
            <input type="text" id="f_handler" list="handlerList" placeholder="担当者名" tabindex="5" oninput="updateHandlerList()">
            <datalist id="handlerList"></datalist>
          </div>
        </div>
        <div id="editingId" style="display:none;"></div>
      </div>
    </div>

    <!-- 企業／学校情報 -->
    <div class="form-card">

<script>
// ===== DATA =====
const STORAGE_KEY = 'visitor_records_v2';
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const REGIONS = ['鹿児島県','宮崎県','九州','関西','中京','関東','その他'];

let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let editingId = null;
let deleteTargetId = null;
let categoryFilter = '';
let sortKey = 'date';
let sortDir = 'desc'; // 最新順をデフォルト

// ===== INIT =====
function nextReceiptNo(category) {
  const prefix = category === '進学' ? 'e' : 'w';
  const same = records.filter(r => (r.receiptNo || '').startsWith(prefix));
  const max = same.reduce((m, r) => {
    const n = parseInt((r.receiptNo || '0').replace(/\D/g, ''), 10);
    return isNaN(n) ? m : Math.max(m, n);
  }, 0);
  return prefix + String(max + 1).padStart(4, '0');
}

function getCategory() {
  return document.querySelector('input[name="category"]:checked')?.value || '就職';
}

function refreshReceiptNo() {
  if (editingId) return; // 編集中は採番しない
  document.getElementById('f_receiptNo').value = nextReceiptNo(getCategory());
}

function updateCompanyLabel() {
  const isGakkou = getCategory() === '進学';
  const label = document.getElementById('companyLabel');
  const input = document.getElementById('f_company');
  const header = document.getElementById('kigyoCardHeader');
  if (label) label.textContent = isGakkou ? '学　校　名' : '企　業　名';
  if (input) input.placeholder = isGakkou ? '学校名を入力' : '企業名を入力';
  if (header) header.textContent = isGakkou ? '学　校　情　報' : '企　業　情　報';
  // 就職専用セクションの表示切替
  const empSec = document.getElementById('employmentSections');
  if (empSec) empSec.style.display = isGakkou ? 'none' : 'block';
  // 学校種別ラジオの表示切替
  const stWrap = document.getElementById('schoolTypeWrap');
  if (stWrap) stWrap.style.display = isGakkou ? 'flex' : 'none';
  // 応対記録は進学のみ表示
  const recSec = document.getElementById('recordSection');
  if (recSec) recSec.style.display = isGakkou ? 'block' : 'none';
}

function updateHandlerList() {
  const names = [...new Set(records.map(r => r.handler).filter(Boolean))].sort();
  const dl = document.getElementById('handlerList');
  dl.innerHTML = names.map(n => `<option value="${n}">`).join('');
}

function init() {
  setToday();
  document.getElementById('f_receiptNo').value = nextReceiptNo(getCategory());
  document.getElementById('tour_no').checked = true;
  document.getElementById('intern_no').checked = true;
  document.getElementById('dorm_no').checked = true;
  updateHandlerList();
  // 種別変更時に受付No・ラベル更新
  document.querySelectorAll('input[name="category"]').forEach(r => {
    r.addEventListener('change', () => { refreshReceiptNo(); updateCompanyLabel(); });
  });
  updateCompanyLabel();
  renderList();
  renderStats();
  document.getElementById('f_date').addEventListener('change', updateWeekday);
}

function setToday() {
  const today = new Date();
  document.getElementById('f_date').value = today.toISOString().slice(0,10);
  updateWeekday();
  document.getElementById('f_time').value = today.toTimeString().slice(0,5);
}

function updateWeekday() {
  const v = document.getElementById('f_date').value;
  const el = document.getElementById('f_weekday');
  if (!v) { el.textContent = ''; return; }
  const d = new Date(v);
  el.textContent = WEEKDAYS[d.getDay()] + '曜日';
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='form'?0:1)===i));
  document.getElementById('view-form').classList.toggle('active', tab==='form');
  document.getElementById('view-list').classList.toggle('active', tab==='list');
  if (tab==='list') { renderList(); renderStats(); }
}

// ===== COLLECT / FILL =====
function collectChecks(field) {
  return Array.from(document.querySelectorAll(`input[data-field="${field}"]:checked`)).map(c=>c.value);
}

function collectRegions() {
  const region = document.getElementById('f_region').value;
  const dorm = document.querySelector('input[name="dorm"]:checked')?.value || '';
  if (!region) return [];
  return [{ region, dorm }];
}

function getRecommendCount() {
  const checked = document.querySelector('input[name="recommend"]:checked');
  if (!checked) return '';
  if (checked.value === 'other') return document.getElementById('f_recOther').value || 'その他';
  return checked.value;
}

function collectForm() {
  return {
    id: editingId || Date.now().toString(),
    category: document.querySelector('input[name="category"]:checked')?.value || '就職',
    receiptNo: document.getElementById('f_receiptNo').value.trim(),
    handler: document.getElementById('f_handler').value.trim(),
    date: document.getElementById('f_date').value,
    weekday: document.getElementById('f_weekday').textContent,
    time: document.getElementById('f_time').value,
    company: document.getElementById('f_company').value.trim(),
    visitor: document.getElementById('f_visitor').value.trim(),
    regions: collectRegions(),
    regionOther: document.getElementById('f_regionOther').value.trim(),
    work: collectChecks('work'),
    workOther: document.getElementById('f_workOther').value.trim(),
    gender: document.querySelector('input[name="gender"]:checked')?.value || '',
    recommendCount: getRecommendCount(),
    dept: collectChecks('dept'),
    material: collectChecks('material'),
    materialOther: document.getElementById('f_materialOther').value.trim(),
    schoolType: document.querySelector('input[name="schoolType"]:checked')?.value || '',
    tour: document.querySelector('input[name="tour"]:checked')?.value || '',
    intern: document.querySelector('input[name="intern"]:checked')?.value || '',
    talent: document.getElementById('f_talent').value.trim(),
    appeal: document.getElementById('f_appeal').value.trim(),
    record: document.getElementById('f_record').value.trim(),
    note: document.getElementById('f_note').value.trim(),
    createdAt: editingId ? (records.find(r=>r.id===editingId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
}

function fillForm(rec) {
  document.querySelector(`input[name="category"][value="${rec.category}"]`).checked = true;
  document.getElementById('f_receiptNo').value = rec.receiptNo || '';
  document.getElementById('f_handler').value = rec.handler || '';
  document.getElementById('f_date').value = rec.date || '';
  document.getElementById('f_weekday').textContent = rec.weekday || '';
  document.getElementById('f_time').value = rec.time || '';
  document.getElementById('f_company').value = rec.company || '';
  document.getElementById('f_visitor').value = rec.visitor || '';
  document.getElementById('f_regionOther').value = rec.regionOther || '';

  // 地区・寮
  const firstRegion = (rec.regions||[])[0];
  document.getElementById('f_region').value = firstRegion?.region || '';
  const dormVal = firstRegion?.dorm || '無';
  const dormCb = document.querySelector(`input[name="dorm"][value="${dormVal}"]`);
  if (dormCb) dormCb.checked = true;
  toggleRegionOther();

  ['work','dept','material'].forEach(field => {
    document.querySelectorAll(`input[data-field="${field}"]`).forEach(c => {
      c.checked = (rec[field]||[]).includes(c.value);
    });
  });
  // その他職業テキスト復元
  document.getElementById('f_workOther').value = rec.workOther || '';
  const workOtherCb = document.querySelector('input[data-field="work"][value="その他の職業"]');
  document.getElementById('workOtherWrap').style.display = (workOtherCb && workOtherCb.checked) ? 'block' : 'none';

  // Recommend
  const isOther = rec.recommendCount && !['1','2'].includes(rec.recommendCount);
  const recVal = isOther ? 'other' : (rec.recommendCount || '');
  const recRb = document.querySelector(`input[name="recommend"][value="${recVal}"]`);
  if (recRb) recRb.checked = true;
  document.getElementById('f_recOther').value = isOther ? rec.recommendCount : '';
  toggleRecOther();

  if (rec.schoolType) { const r = document.querySelector(`input[name="schoolType"][value="${rec.schoolType}"]`); if (r) r.checked = true; }
  if (rec.gender) { const r = document.querySelector(`input[name="gender"][value="${rec.gender}"]`); if (r) r.checked = true; }

  document.getElementById('f_materialOther').value = rec.materialOther || '';
  const matOtherCb = document.querySelector('input[data-field="material"][value="その他"]');
  document.getElementById('materialOtherWrap').style.display = (matOtherCb && matOtherCb.checked) ? 'block' : 'none';

  if (rec.tour) { const r = document.querySelector(`input[name="tour"][value="${rec.tour}"]`); if (r) r.checked = true; }
  if (rec.intern) { const r = document.querySelector(`input[name="intern"][value="${rec.intern}"]`); if (r) r.checked = true; }

  document.getElementById('f_talent').value = rec.talent || '';
  document.getElementById('f_appeal').value = rec.appeal || '';
  document.getElementById('f_record').value = rec.record || '';
  document.getElementById('f_note').value = rec.note || '';
}

// ===== SAVE =====
function saveRecord() {
  const rec = collectForm();
  if (!rec.company) { showAlert('企業名を入力してください。', 'error'); return; }
  if (!rec.date) { showAlert('来訪日を入力してください。', 'error'); return; }

  if (editingId) {
    const idx = records.findIndex(r => r.id === editingId);
    if (idx >= 0) records[idx] = rec;
  } else {
    records.unshift(rec);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  showAlert(editingId ? '✅ 記録を更新しました。' : '✅ 新しい記録を保存しました。', 'success');
  editingId = null;
  document.getElementById('saveBtn').textContent = '💾 保存する';
  updateHandlerList();
  resetForm();
  renderList();
  renderStats();
}

// ===== RESET =====
function resetForm() {
  editingId = null;
  document.getElementById('saveBtn').textContent = '💾 保存する';
  document.querySelector('input[name="category"][value="就職"]').checked = true;
  ['f_receiptNo','f_handler','f_company','f_visitor','f_regionOther','f_materialOther','f_talent','f_appeal','f_recOther','f_record','f_note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_weekday').textContent = '';
  document.querySelectorAll('input[name="schoolType"]').forEach(r => r.checked = false);
  document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
  document.querySelectorAll('input[name="tour"], input[name="intern"], input[name="gender"], input[name="recommend"]').forEach(r => r.checked = false);
  document.getElementById('tour_no').checked = true;
  document.getElementById('intern_no').checked = true;
  document.getElementById('f_region').value = '';
  document.getElementById('dorm_no').checked = true;
  document.getElementById('recOtherWrap').style.display = 'none';
  document.getElementById('materialOtherWrap').style.display = 'none';
  document.getElementById('regionOtherWrap').style.display = 'none';
  document.getElementById('workOtherWrap').style.display = 'none';
  document.getElementById('f_workOther').value = '';
  setToday();
  document.getElementById('formAlert').innerHTML = '';
  if (!editingId) {
    document.getElementById('f_receiptNo').value = nextReceiptNo(getCategory());
    updateCompanyLabel();
  }
}

// ===== EDIT =====
function editRecord(id) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  editingId = id;
  fillForm(rec);
  updateCompanyLabel();
  document.getElementById('saveBtn').textContent = '✏️ 更新する';
  switchTab('form');
  window.scrollTo(0,0);
}

// ===== DELETE =====
function deleteRecord(id) {
  deleteTargetId = id;
  const rec = records.find(r => r.id === id);
  document.getElementById('deleteModalMsg').innerHTML = `<strong>${rec?.company || '（企業名なし）'}</strong> の記録を削除してもよろしいですか？<br>削除した記録は元に戻せません。`;
  document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  deleteTargetId = null;
}
function confirmDelete() {
  records = records.filter(r => r.id !== deleteTargetId);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  closeDeleteModal();
  renderList();
  renderStats();
}

// ===== FILTER =====
function filterCategory(val) { categoryFilter = val; renderList(); }

// ===== SORT =====
function setSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortDir = key === 'date' ? 'desc' : 'asc';
  }
  renderList();
}

function updateSortHeaders() {
  ['receiptNo', 'date'].forEach(key => {
    const th = document.getElementById(`th-${key}`);
    if (!th) return;
    const icon = th.querySelector('.sort-icon');
    if (sortKey === key) {
      th.classList.add('sort-active');
      icon.textContent = sortDir === 'asc' ? '↑' : '↓';
    } else {
      th.classList.remove('sort-active');
      icon.textContent = '↕';
    }
  });
}

// ===== RENDER LIST =====
function renderList() {
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase();
  let filtered = records.filter(r => {
    const matchCat = !categoryFilter || r.category === categoryFilter;
    const matchQ = !q || [r.company,r.visitor,r.handler,r.receiptNo].some(v => (v||'').toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  // ソート
  filtered.sort((a, b) => {
    let va, vb;
    if (sortKey === 'receiptNo') {
      va = parseInt((a.receiptNo || '0').replace(/\D/g, ''), 10) || 0;
      vb = parseInt((b.receiptNo || '0').replace(/\D/g, ''), 10) || 0;
    } else {
      va = (a.date || '') + (a.time || '');
      vb = (b.date || '') + (b.time || '');
    }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  updateSortHeaders();

  // 企業名／学校名ヘッダーを種別フィルターに応じて切替
  const thCompany = document.getElementById('th-company');
  if (thCompany) {
    thCompany.textContent = categoryFilter === '就職' ? '企　業　名'
                          : categoryFilter === '進学' ? '学　校　名'
                          : '企業名／学校名';
  }

  const tbody = document.getElementById('recordsBody');
  const empty = document.getElementById('emptyState');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach((rec, i) => {
    const regionStr = (rec.regions||[]).map(r=>r.region).join('、') + (rec.regionOther ? `（${rec.regionOther}）` : '');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${rec.receiptNo||'—'}</td>
      <td style="white-space:nowrap;">${rec.date||'—'}<br><span style="font-size:0.75rem;color:var(--text-muted);">${rec.weekday||''} ${rec.time||''}</span></td>
      <td><strong>${rec.company||'—'}</strong></td>
      <td>${rec.visitor||'—'}</td>
      <td>${rec.handler||'—'}</td>
      <td><span class="badge ${rec.category==='就職'?'badge-employment':'badge-education'}">${rec.category||'—'}</span></td>
      <td style="font-size:0.8rem;">${regionStr||'—'}</td>
      <td>
        <div class="actions">
          <button class="btn btn-outline btn-sm" onclick="editRecord('${rec.id}')">✏️ 編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecord('${rec.id}')">🗑️</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

// ===== STATS =====
function renderStats() {
  const total = records.length;
  const emp = records.filter(r=>r.category==='就職').length;
  const edu = records.filter(r=>r.category==='進学').length;
  const today = new Date().toISOString().slice(0,10);
  const todayCount = records.filter(r=>r.date===today).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">総記録数</div></div>
    <div class="stat-card"><div class="num" style="color:#1e40af;">${emp}</div><div class="lbl">就職</div></div>
    <div class="stat-card"><div class="num" style="color:#166534;">${edu}</div><div class="lbl">進学</div></div>
    <div class="stat-card"><div class="num" style="color:#92400e;">${todayCount}</div><div class="lbl">本日</div></div>`;
}

// ===== HELPERS =====
function showAlert(msg, type) {
  const el = document.getElementById('formAlert');
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function toggleWorkOther(cb) {
  document.getElementById('workOtherWrap').style.display = cb.checked ? 'block' : 'none';
  if (!cb.checked) document.getElementById('f_workOther').value = '';
}

function toggleMaterialOther(cb) {
  document.getElementById('materialOtherWrap').style.display = cb.checked ? 'block' : 'none';
  if (!cb.checked) document.getElementById('f_materialOther').value = '';
}

function toggleRegionOther() {
  const sel = document.getElementById('f_region');
  const show = sel && sel.value === 'その他';
  document.getElementById('regionOtherWrap').style.display = show ? 'block' : 'none';
  if (!show && document.getElementById('f_regionOther')) document.getElementById('f_regionOther').value = '';
}

function toggleRecOther() {
  const checked = document.querySelector('input[name="recommend"]:checked');
  document.getElementById('recOtherWrap').style.display =
    (checked && checked.value === 'other') ? 'block' : 'none';
}


// ===== EXPORT / IMPORT =====
function exportExcel() {
  // 就職データのみ対象
  const target = records.filter(r => r.category === '就職');
  if (target.length === 0) {
    alert('就職の記録データがありません。');
    return;
  }

  // ファイル名判定：就職 かつ 地区が鹿児島県 → 県内企業、それ以外 → 県外企業
  const firstRegion = (target[0].regions||[])[0]?.region || '';
  const isKagoshima = target.every(r => {
    const reg = (r.regions||[])[0]?.region || r.regionOther || '';
    return reg.includes('鹿児島');
  });
  // 全件で判定するのでなく、出力データ全体で「鹿児島のみ」か確認
  const allKagoshima = target.every(r =>
    ((r.regions||[])[0]?.region || '').includes('鹿児島')
  );
  const fileName = allKagoshima ? '県内企業' : '県外企業';

  // ヘッダー定義（募集・学科をG/A/M/B個別列に）
  const headers = [
    'No', '日付', '企業名', '訪問者氏名', '業務内容',
    '地区', '寮', '男女', '人数',
    'G', 'A', 'M', 'B',
    '見学', '求める人材', '企業アピール',
    '応対者', '資料等', '備考欄'
  ];

  const DEPT_COLS = ['G', 'A', 'M', 'B'];

  const rows = target.map(r => {
    // No: 英字除去して数値
    const no = parseInt((r.receiptNo || '0').replace(/[^\d]/g, ''), 10) || '';

    // 日付: Excelの日付型
    let dateVal = '';
    if (r.date) {
      const parts = r.date.split('-');
      if (parts.length === 3) {
        dateVal = new Date(
          parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])
        );
      }
    }

    // 企業名
    const company = r.company || '';

    // 業務内容: ・区切り（その他の職業はworkOtherを付加）
    const workList = (r.work||[]).map(w =>
      w === 'その他の職業' && r.workOther ? `その他(${r.workOther})` : w
    );
    const work = workList.join('・');

    // 地区
    const region = (r.regions||[])[0]?.region || '';
    const regionDisp = [region, r.regionOther].filter(Boolean).join(' ');

    // 寮: 有なら〇
    const dorm = (r.regions||[])[0]?.dorm === '有' ? '〇' : '';

    // 男女
    const gender = r.gender || '';

    // 人数
    const recCount = r.recommendCount || '';

    // 募集・学科: G/A/M/B 個別〇
    const dept = r.dept || [];
    const isFumon = dept.includes('不問');
    const deptCols = DEPT_COLS.map(d => (isFumon || dept.includes(d)) ? '〇' : '');

    // 見学: 有なら〇
    const tour = r.tour === '有' ? '〇' : '';

    // 求める人材・企業アピール
    const talent = r.talent || '';
    const appeal = r.appeal || '';

    // 応対者
    const handler = r.handler || '';

    // 資料等: 資料名 + [その他資料]
    const matList = (r.material||[]).join('・');
    const matOther = r.materialOther ? `  [${r.materialOther}]` : '';
    const material = matList + matOther;

    // 備考欄
    const note = r.note || '';

    return [
      no, dateVal, company, r.visitor || '', work,
      regionDisp, dorm, gender, recCount,
      ...deptCols,
      tour, talent, appeal,
      handler, material, note
    ];
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // 日付列（B列=index 1）のフォーマット設定
  rows.forEach((_, ri) => {
    const cellRef = XLSX.utils.encode_cell({r: ri+1, c: 1});
    if (ws[cellRef] && ws[cellRef].v instanceof Date) {
      ws[cellRef].t = 'd';
      ws[cellRef].z = 'yyyy/mm/dd';
    }
  });

  // 列幅
  ws['!cols'] = [
    {wch:8},  // No
    {wch:12}, // 日付
    {wch:22}, // 企業名
    {wch:12}, // 訪問者氏名
    {wch:28}, // 業務内容
    {wch:12}, // 地区
    {wch:5},  // 寮
    {wch:6},  // 男女
    {wch:5},  // 人数
    {wch:4},{wch:4},{wch:4},{wch:4}, // G A M B
    {wch:5},  // 見学
    {wch:24}, // 求める人材
    {wch:24}, // 企業アピール
    {wch:10}, // 応対者
    {wch:24}, // 資料等
    {wch:24}, // 備考欄
  ];

  // ヘッダースタイル
  headers.forEach((_, ci) => {
    const cellRef = XLSX.utils.encode_cell({r:0, c:ci});
    if (!ws[cellRef]) return;
    ws[cellRef].s = {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { fgColor: { rgb: '1A3A5C' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border: {
        top:    { style:'thin', color:{rgb:'AAAAAA'} },
        bottom: { style:'thin', color:{rgb:'AAAAAA'} },
        left:   { style:'thin', color:{rgb:'AAAAAA'} },
        right:  { style:'thin', color:{rgb:'AAAAAA'} }
      }
    };
  });

  // データ行スタイル（交互背景・〇は中央揃え）
  const centerCols = new Set([0,6,7,8,9,10,11,12,13]); // No,寮,男女,人数,G,A,M,B,見学
  rows.forEach((_, ri) => {
    const bg = ri % 2 === 0 ? 'FFFFFF' : 'EEF2FA';
    headers.forEach((__, ci) => {
      const cellRef = XLSX.utils.encode_cell({r: ri+1, c: ci});
      if (!ws[cellRef]) ws[cellRef] = {v:'', t:'s'};
      ws[cellRef].s = {
        fill: { fgColor: { rgb: bg } },
        alignment: {
          horizontal: centerCols.has(ci) ? 'center' : 'left',
          vertical: 'center', wrapText: true
        },
        border: {
          top:    { style:'thin', color:{rgb:'D0D8E8'} },
          bottom: { style:'thin', color:{rgb:'D0D8E8'} },
          left:   { style:'thin', color:{rgb:'D0D8E8'} },
          right:  { style:'thin', color:{rgb:'D0D8E8'} }
        }
      };
    });
  });

  XLSX.utils.book_append_sheet(wb, ws, '来訪者応接記録');
  XLSX.writeFile(wb, `${fileName}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `来訪者応接記録_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      records = data;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      renderList(); renderStats();
      alert(`✅ ${data.length} 件の記録をインポートしました。`);
    } catch {
      alert('❌ JSONファイルの読み込みに失敗しました。');
    }
  };
  reader.readAsText(file);
  input.value = '';
}
