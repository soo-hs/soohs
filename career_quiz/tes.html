<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2236;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --gold: #ffd700;
    --text: #e8eaf0;
    --muted: #7a8499;
    --correct: #00e676;
    --wrong: #ff5252;
    --border: rgba(0,212,255,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255,107,53,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .school-badge {
    display: inline-block;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 14px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 900;
    letter-spacing: 0.05em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.05em;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    height: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.4s cubic-bezier(.4,0,.2,1);
  }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .question-num {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 14px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .question-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* OPTIONS */
  .options {
    display: grid;
    gap: 10px;
  }

  .option {
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.06);
    transform: translateX(4px);
  }

  .option-letter {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 20px;
    font-weight: 700;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(0,230,118,0.1);
  }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,82,82,0.1);
  }

  .option:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.3); color: var(--correct); }
  .feedback.wrong-fb   { background: rgba(255,82,82,0.08);  border: 1px solid rgba(255,82,82,0.3);  color: var(--wrong); }

  /* NEXT BUTTON */
  .btn-next {
    display: none;
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; animation: fadeIn 0.3s ease; }

  /* RESULT */
  .result-screen {
    display: none;
    text-align: center;
    animation: cardIn 0.5s cubic-bezier(.4,0,.2,1);
  }

  .result-screen.show { display: block; }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 32px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2));
  }

  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 24px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .score-denom {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .result-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-msg {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .stat-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 32px;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 700;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .btn-retry {
    padding: 16px 40px;
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    background: transparent;
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-retry:hover {
    background: rgba(0,212,255,0.1);
    transform: translateY(-2px);
  }

  .review-list {
    margin-top: 32px;
    text-align: left;
  }

  .review-item {
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }

  .review-icon { font-size: 16px; min-width: 20px; }
  .review-q { color: var(--muted); margin-bottom: 4px; }
  .review-a { font-weight: 700; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="school-badge">曽於高等学校</div>
    <div class="title">IQ TEST</div>
    <div class="subtitle">論理・数列・言語・図形 — 10問チャレンジ</div>
  </div>

  <!-- QUIZ SECTION -->
  <div id="quiz-section">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label">
      <span id="progress-text">問題 1 / 10</span>
      <span id="score-live">スコア: 0</span>
    </div>

    <div class="question-card" id="qcard">
      <div class="question-num" id="q-num">QUESTION 01</div>
      <div class="question-text" id="q-text"></div>
      <div class="question-hint" id="q-hint"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
  </div>

  <!-- RESULT SECTION -->
  <div class="result-screen" id="result-screen">
    <div class="result-card">
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="58" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10"/>
          <circle id="ring-progress" cx="70" cy="70" r="58" fill="none"
            stroke="url(#ringGrad)" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="364.4"
            stroke-dashoffset="364.4"
            style="transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"/>
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#ff6b35"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="score-ring-text">
          <div class="score-number" id="score-num">0</div>
          <div class="score-denom">/ 10</div>
        </div>
      </div>

      <div class="result-title" id="result-title">---</div>
      <div class="result-msg" id="result-msg"></div>

      <div class="stat-row">
        <div class="stat">
          <div class="stat-val" id="stat-correct" style="color: var(--correct)">0</div>
          <div class="stat-label">正解</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-wrong" style="color: var(--wrong)">0</div>
          <div class="stat-label">不正解</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-pct" style="color: var(--gold)">0%</div>
          <div class="stat-label">正答率</div>
        </div>
      </div>

      <button class="btn-retry" onclick="retryQuiz()">もう一度挑戦する</button>

      <div class="review-list" id="review-list"></div>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    text: "次の数列の□に入る数字はどれか？",
    hint: "2, 4, 8, 16, □",
    options: ["24", "30", "32", "36"],
    answer: 2,
    explanation: "各項は前の項の2倍。16×2 = 32"
  },
  {
    text: "「熱い」の対義語として最も適切なものはどれか？",
    hint: "反対の意味を持つ言葉を選べ。",
    options: ["暖かい", "冷たい", "涼しい", "ぬるい"],
    answer: 1,
    explanation: "「熱い」の対義語は「冷たい」"
  },
  {
    text: "正方形の1辺が6cmのとき、面積は何cm²か？",
    hint: "面積 = 辺 × 辺",
    options: ["24cm²", "30cm²", "36cm²", "42cm²"],
    answer: 2,
    explanation: "6 × 6 = 36cm²"
  },
  {
    text: "次の仲間外れはどれか？",
    hint: "リンゴ、ミカン、キャベツ、イチゴ",
    options: ["リンゴ", "ミカン", "キャベツ", "イチゴ"],
    answer: 2,
    explanation: "リンゴ・ミカン・イチゴは果物。キャベツだけが野菜"
  },
  {
    text: "1時間15分は何分か？",
    hint: "1時間 = 60分",
    options: ["65分", "70分", "75分", "80分"],
    answer: 2,
    explanation: "60 + 15 = 75分"
  },
  {
    text: "AはBより背が高く、BはCより背が高い。最も背が低いのは誰か？",
    hint: "論理的に順番を考えよう。",
    options: ["A", "B", "C", "同じ"],
    answer: 2,
    explanation: "A > B > C の順。最も低いのはC"
  },
  {
    text: "次の数列の□に入る数字は？",
    hint: "1, 3, 6, 10, 15, □",
    options: ["18", "20", "21", "24"],
    answer: 2,
    explanation: "+2, +3, +4, +5, +6 と差が1ずつ増える。15+6=21"
  },
  {
    text: "「速い」の類義語として最も近いものはどれか？",
    hint: "同じような意味の言葉を選べ。",
    options: ["遅い", "強い", "敏速", "長い"],
    answer: 2,
    explanation: "「敏速」は「素早いこと」で「速い」に最も近い"
  },
  {
    text: "円の直径が10cmのとき、半径は何cmか？",
    hint: "直径 = 半径 × 2",
    options: ["3cm", "4cm", "5cm", "6cm"],
    answer: 2,
    explanation: "半径 = 直径 ÷ 2 = 10 ÷ 2 = 5cm"
  },
  {
    text: "3人が1人ずつ握手をすると、握手の回数は合計何回か？",
    hint: "A-B, A-C, B-C の組み合わせを数えよう。",
    options: ["2回", "3回", "4回", "6回"],
    answer: 1,
    explanation: "3C2 = 3×2÷2 = 3回。(A-B, A-C, B-C)"
  }
];

let current = 0;
let score = 0;
let answered = [];
let userAnswers = [];

function renderQuestion() {
  const q = questions[current];
  const letters = ['A','B','C','D'];

  document.getElementById('q-num').textContent = `QUESTION ${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint;
  document.getElementById('progress-text').textContent = `問題 ${current+1} / 10`;
  document.getElementById('score-live').textContent = `スコア: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current/10)*100}%`;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('show');

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    optEl.appendChild(btn);
  });

  // re-animate card
  const card = document.getElementById('qcard');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; card.style.animation = 'cardIn 0.4s cubic-bezier(.4,0,.2,1)'; });
}

function selectAnswer(chosen) {
  const q = questions[current];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.disabled = true);

  const isCorrect = chosen === q.answer;
  opts[chosen].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) opts[q.answer].classList.add('correct');

  if (isCorrect) score++;
  userAnswers[current] = chosen;
  document.getElementById('score-live').textContent = `スコア: ${score}`;

  const fb = document.getElementById('feedback');
  fb.textContent = (isCorrect ? '✓ 正解！　' : '✗ 不正解。　') + q.explanation;
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');

  document.getElementById('btn-next').classList.add('show');
  document.getElementById('btn-next').textContent = current < 9 ? '次の問題へ →' : '結果を見る';
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  document.getElementById('score-num').textContent = score;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = 10 - score;
  document.getElementById('stat-pct').textContent = `${score*10}%`;

  // Ring animation
  const circumference = 364.4;
  const offset = circumference - (score/10) * circumference;
  setTimeout(() => {
    document.getElementById('ring-progress').style.strokeDashoffset = offset;
  }, 200);

  // Title & message
  const titles = ['', '', 'もう少し！', '頑張った！', '良い調子！', '良い調子！', '優秀！', '優秀！', '素晴らしい！', 'ほぼ完璧！', '完璧！'];
  const msgs = [
    'もう一度復習して再挑戦してみよう。',
    'もう一度復習して再挑戦してみよう。',
    '基礎をしっかり固めれば必ず伸びる！',
    '少しずつ正答率を上げていこう。',
    '半分以上正解！引き続き練習しよう。',
    '半分以上正解！引き続き練習しよう。',
    '論理的思考力が育っている証拠だ。',
    '高い思考力を持っている。さらに上を目指せ！',
    '素晴らしい集中力と論理力！',
    'ほぼ全問正解！IQは非常に高い。',
    '全問正解！完璧なIQスコア！'
  ];
  document.getElementById('result-title').textContent = titles[score] || '結果';
  document.getElementById('result-msg').textContent = msgs[score] || '';

  // Review list
  const letters = ['A','B','C','D'];
  const rl = document.getElementById('review-list');
  rl.innerHTML = '<div style="font-size:12px;color:var(--muted);letter-spacing:.1em;margin-bottom:12px;font-family:Orbitron,monospace;">REVIEW</div>';
  questions.forEach((q, i) => {
    const correct = userAnswers[i] === q.answer;
    const item = document.createElement('div');
    item.className = 'review-item';
    item.style.borderColor = correct ? 'rgba(0,230,118,0.2)' : 'rgba(255,82,82,0.2)';
    item.innerHTML = `
      <span class="review-icon">${correct ? '✓' : '✗'}</span>
      <div>
        <div class="review-q">Q${i+1}. ${q.text} (${q.hint})</div>
        <div class="review-a" style="color:${correct?'var(--correct)':'var(--wrong)'}">
          あなたの答え: ${letters[userAnswers[i]]}. ${q.options[userAnswers[i]]}
          ${!correct ? ` → 正解: ${letters[q.answer]}. ${q.options[q.answer]}` : ''}
        </div>
      </div>`;
    rl.appendChild(item);
  });
}

function retryQuiz() {
  current = 0;
  score = 0;
  userAnswers = [];
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-section').style.display = '';
  document.getElementById('ring-progress').style.strokeDashoffset = '364.4';
  renderQuestion();
}

// Start
renderQuestion();
</script>
</body>
</html>
