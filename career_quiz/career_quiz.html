<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたにピッタリの仕事は？ 職種診断</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #14142a;
    --surface2: #1c1c38;
    --border: #2e2e5e;
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e8e8f5;
    --text-sub: #9898c0;
    --white: #ffffff;
    --green: #10b981;
    --red: #ef4444;
    --radius: 16px;
    --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background animated mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,58,237,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(245,158,11,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ====== START SCREEN ====== */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 92vh;
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,58,237,0.2);
    border: 1px solid rgba(124,58,237,0.5);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #c4b5fd;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .main-title {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(2rem, 8vw, 3.6rem);
    font-weight: 700;
    line-height: 1.15;
    background: linear-gradient(135deg, #c4b5fd 0%, #67e8f9 50%, #fde68a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }

  .sub-title {
    font-size: 1.05rem;
    color: var(--text-sub);
    line-height: 1.7;
    margin-bottom: 40px;
    max-width: 480px;
  }

  .info-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 48px;
    width: 100%;
    max-width: 500px;
  }

  .info-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
  }

  .info-card .num {
    font-family: 'Kaisei Decol', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .info-card .label {
    font-size: 0.72rem;
    color: var(--text-sub);
    margin-top: 4px;
  }

  .start-btn {
    padding: 18px 56px;
    font-size: 1.15rem;
    font-weight: 900;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: var(--white);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.06em;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
    box-shadow: 0 0 40px rgba(124,58,237,0.4);
  }

  .start-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 60px rgba(124,58,237,0.6);
  }

  .start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  }

  /* ====== QUIZ SCREEN ====== */
  #quiz-screen { display: none; }

  .progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .q-num {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.1em;
  }

  .q-num span { color: var(--accent2); font-size: 1.1rem; }

  .progress-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    margin: 0 16px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px 32px;
    margin-bottom: 20px;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  }

  .q-icon {
    font-size: 2.4rem;
    margin-bottom: 14px;
    display: block;
  }

  .q-text {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.15rem, 3.5vw, 1.5rem);
    font-weight: 700;
    line-height: 1.55;
    color: var(--white);
    margin-bottom: 8px;
  }

  .q-hint {
    font-size: 0.82rem;
    color: var(--text-sub);
    margin-bottom: 28px;
  }

  .options-grid {
    display: grid;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    cursor: pointer;
    transition: var(--transition);
    text-align: left;
  }

  .option-btn .opt-letter {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-sub);
    transition: var(--transition);
    flex-shrink: 0;
  }

  .option-btn:hover {
    border-color: var(--accent1);
    background: rgba(124,58,237,0.12);
    transform: translateX(4px);
  }

  .option-btn:hover .opt-letter {
    background: var(--accent1);
    color: white;
  }

  .option-btn.selected {
    border-color: var(--accent2);
    background: rgba(6,182,212,0.12);
  }

  .option-btn.selected .opt-letter {
    background: var(--accent2);
    color: white;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .btn-back {
    padding: 12px 28px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    color: var(--text-sub);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: var(--transition);
  }

  .btn-back:hover { border-color: var(--text-sub); color: var(--text); }

  .btn-next {
    padding: 12px 36px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    border-radius: 999px;
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    opacity: 0.4;
    pointer-events: none;
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next.active:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
  }

  /* ====== RESULT SCREEN ====== */
  #result-screen { display: none; animation: fadeUp 0.7s ease both; }

  .result-hero {
    text-align: center;
    padding: 48px 24px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.2) 0%, transparent 70%);
  }

  .result-label {
    position: relative;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .result-emoji {
    position: relative;
    font-size: 5rem;
    margin-bottom: 16px;
    animation: pop 0.6s cubic-bezier(0.68,-0.55,0.27,1.55) 0.3s both;
  }

  .result-type-name {
    position: relative;
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #c4b5fd, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .result-desc {
    position: relative;
    font-size: 0.95rem;
    color: var(--text-sub);
    line-height: 1.75;
    max-width: 480px;
    margin: 0 auto;
  }

  .result-jobs-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-sub);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .job-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 700;
    color: #c4b5fd;
    cursor: default;
    transition: var(--transition);
  }

  .job-tag:hover {
    background: rgba(124,58,237,0.3);
    transform: translateY(-1px);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    text-align: center;
  }

  .stat-card .st-val {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent3);
  }

  .stat-card .st-label {
    font-size: 0.72rem;
    color: var(--text-sub);
    margin-top: 4px;
  }

  .traits-list {
    display: grid;
    gap: 10px;
    margin-top: 4px;
  }

  .trait-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88rem;
    color: var(--text);
  }

  .trait-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    flex-shrink: 0;
  }

  .retry-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text-sub);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 12px;
  }

  .retry-btn:hover {
    border-color: var(--accent1);
    color: var(--text);
    background: rgba(124,58,237,0.08);
  }

  /* ====== Score bar ====== */
  .score-breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 20px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .score-row:last-child { margin-bottom: 0; }

  .score-row .sc-label {
    min-width: 110px;
    font-size: 0.8rem;
    color: var(--text-sub);
  }

  .sc-track {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }

  .sc-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1) 0.5s;
  }

  .sc-val {
    min-width: 30px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text);
    text-align: right;
  }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 480px) {
    .q-card { padding: 24px 18px 20px; }
    .info-cards { grid-template-columns: repeat(3, 1fr); }
    .result-jobs-section { padding: 20px 16px; }
    .score-breakdown { padding: 18px 16px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- ====== START SCREEN ====== -->
  <div id="start-screen">
    <div class="badge">🎯 Career Compass 2025</div>
    <h1 class="main-title">あなたにピッタリ<br>の仕事は？</h1>
    <p class="sub-title">
      21問の質問に答えるだけで、<br>
      あなたの個性・価値観に合った職種がわかる。<br>
      宮崎県の求人データ2,940件をもとに作成。
    </p>
    <div class="info-cards">
      <div class="info-card">
        <div class="num">21</div>
        <div class="label">質問数</div>
      </div>
      <div class="info-card">
        <div class="num">8</div>
        <div class="label">職種タイプ</div>
      </div>
      <div class="info-card">
        <div class="num">3分</div>
        <div class="label">所要時間</div>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">診断スタート →</button>
  </div>

  <!-- ====== QUIZ SCREEN ====== -->
  <div id="quiz-screen">
    <div class="progress-header">
      <div class="q-num">Q<span id="q-current">1</span> / 21</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="q-card" id="q-card">
      <span class="q-icon" id="q-icon">💭</span>
      <div class="q-text" id="q-text"></div>
      <div class="q-hint" id="q-hint"></div>
      <div class="options-grid" id="options-container"></div>
    </div>

    <div class="nav-row">
      <button class="btn-back" id="btn-back" onclick="prevQuestion()">← もどる</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">つぎへ →</button>
    </div>
  </div>

  <!-- ====== RESULT SCREEN ====== -->
  <div id="result-screen">
    <div class="result-hero">
      <div class="result-label">あなたの診断結果</div>
      <div class="result-emoji" id="r-emoji"></div>
      <div class="result-type-name" id="r-type-name"></div>
      <div class="result-desc" id="r-desc"></div>
    </div>

    <div class="stats-grid" id="r-stats-grid"></div>

    <div class="score-breakdown">
      <div class="section-title">各分野との相性スコア</div>
      <div id="score-bars"></div>
    </div>

    <div class="result-jobs-section">
      <div class="section-title">おすすめ職種</div>
      <div class="job-tags" id="r-job-tags"></div>
    </div>

    <div class="result-jobs-section">
      <div class="section-title">あなたの強み・特徴</div>
      <div class="traits-list" id="r-traits"></div>
    </div>

    <button class="retry-btn" onclick="resetQuiz()">🔄 もう一度診断する</button>
  </div>

</div>

// ==============================
// Quiz State
// ==============================
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.4s ease both';

  document.getElementById('q-current').textContent = currentQ + 1;
  document.getElementById('progress-fill').style.width = ((currentQ + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('q-icon').textContent = q.icon;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = q.hint;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  if (answers[currentQ] !== null) {
    nextBtn.classList.add('active');
    nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? '結果を見る 🎉' : 'つぎへ →';
  } else {
    nextBtn.classList.remove('active');
    nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? '結果を見る 🎉' : 'つぎへ →';
  }

  document.getElementById('btn-back').style.display = currentQ === 0 ? 'none' : '';
}

function selectOption(idx) {
  answers[currentQ] = idx;
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.add('active');
  nextBtn.textContent = currentQ === QUESTIONS.length - 1 ? '結果を見る 🎉' : 'つぎへ →';
}

function nextQuestion() {
  if (answers[currentQ] === null) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResult() {
  // スコア集計
  const scores = {};
  Object.keys(CATEGORIES).forEach(k => scores[k] = 0);

  QUESTIONS.forEach((q, qi) => {
    const ans = answers[qi];
    if (ans !== null) {
      const opt = q.options[ans];
      Object.entries(opt.scores).forEach(([cat, val]) => {
        scores[cat] = (scores[cat] || 0) + val;
      });
    }
  });

  // 最高スコアのカテゴリを決定
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topKey = sorted[0][0];
  const cat = CATEGORIES[topKey];

  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';
  rs.style.animation = 'none';
  void rs.offsetWidth;
  rs.style.animation = 'fadeUp 0.7s ease both';

  document.getElementById('r-emoji').textContent = cat.emoji;
  document.getElementById('r-type-name').textContent = cat.name + ' タイプ';
  document.getElementById('r-desc').textContent = cat.desc;

  // Stats
  const statsGrid = document.getElementById('r-stats-grid');
  statsGrid.innerHTML = cat.stats.map(s => `
    <div class="stat-card">
      <div class="st-val">${s.val}</div>
      <div class="st-label">${s.label}</div>
    </div>
  `).join('');

  // Score bars
  const maxScore = sorted[0][1] || 1;
  const colors = ['#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6','#14b8a6'];
  document.getElementById('score-bars').innerHTML = sorted.map(([key, val], i) => `
    <div class="score-row">
      <div class="sc-label">${CATEGORIES[key].name.split('・')[0]}</div>
      <div class="sc-track">
        <div class="sc-fill" style="width:${Math.round(val/maxScore*100)}%; background:${colors[i]}"></div>
      </div>
      <div class="sc-val">${val}pt</div>
    </div>
  `).join('');

  // Jobs
  document.getElementById('r-job-tags').innerHTML = cat.jobs.map(j =>
    `<span class="job-tag">✦ ${j}</span>`
  ).join('');

  // Traits
  document.getElementById('r-traits').innerHTML = cat.traits.map(t =>
    `<div class="trait-item"><div class="trait-dot"></div><span>${t}</span></div>`
  ).join('');

  // Scroll top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
